<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fiches de paie — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info"><div class="header-title">Fiches de paie</div></div>
    <div class="header-right"><button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button></div>
  </header>
  <main class="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
      <div>
        <div style="font-weight:700;font-size:1rem">🧾 Bulletins de salaire</div>
        <div style="font-size:.78rem;color:var(--muted)">Consultation et dépôt des fiches de paie</div>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn btn-primary admin-only" onclick="openFichePaieModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Ajouter une fiche de paie
        </button>
      </div>
    </div>

    <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap">
      <select id="pieFiltreEmploye" class="form-input admin-only" style="width:200px;display:none" onchange="renderPaie()"><option value="">Tous les employés</option></select>
      <select id="pieFiltreAnnee" class="form-input" style="width:140px" onchange="renderPaie()"><option value="">Toutes les années</option></select>
    </div>

    <div id="pieList"><div class="empty" style="padding:3rem;text-align:center"><p>Aucune fiche de paie</p></div></div>
  </main>
</div></div>
<div id="toast-container" class="toast-container"></div>

<div class="modal-overlay" id="modalFichePaie">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <span class="modal-title">🧾 Nouvelle fiche de paie</span>
      <button class="modal-close" onclick="closeModal('modalFichePaie')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:.75rem">
      <div class="form-group"><label>Employé *</label><select id="pieFormEmploye" class="form-input"></select></div>
      <div class="form-group"><label>Période *</label><input type="month" id="pieFormPeriode" class="form-input"/></div>
      <div class="form-group"><label>Fichier (PDF) *</label><input type="file" id="pieFormFile" accept=".pdf,.png,.jpg,.jpeg"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalFichePaie')">Annuler</button>
      <button class="btn btn-primary" onclick="saveFichePaie()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/paie.js"></script>
<script>Auth.requireAuth(); if (!requireModule('access_paie')) { document.querySelector('.content').innerHTML = ''; }</script>
</body></html>
