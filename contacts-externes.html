<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Contacts extérieurs — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
.ce-cards-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;padding:1.25rem 0;align-items:start}
@media(max-width:1100px){.ce-cards-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:820px){.ce-cards-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:560px){.ce-cards-grid{grid-template-columns:1fr}}
.card-c{background:#fff;border-radius:18px;box-shadow:0 6px 20px rgba(15,23,42,.06);
  position:relative;overflow:hidden;
  transition:transform .2s ease,box-shadow .2s ease;display:flex;flex-direction:column}
.card-c:hover{transform:translateY(-4px);box-shadow:0 14px 28px rgba(15,23,42,.12)}
.c-banner{background:linear-gradient(135deg,var(--avatar-b),var(--avatar-a));
  padding:18px 18px 16px;position:relative;overflow:hidden}
.c-watermark{position:absolute;top:-8px;right:-4px;font-size:72px;font-weight:900;
  color:rgba(255,255,255,.15);line-height:1;user-select:none;pointer-events:none}
.c-head{display:flex;align-items:center;gap:12px;position:relative;z-index:1}
.c-avatar{width:58px;height:58px;border-radius:50%;flex-shrink:0;overflow:hidden;
  background:rgba(255,255,255,.25);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-weight:800;font-size:18px;
  border:2.5px solid rgba(255,255,255,.6);
  box-shadow:0 4px 12px rgba(0,0,0,.18)}
.c-name{font-size:14.5px;font-weight:800;color:#fff;margin:0;line-height:1.2;
  text-shadow:0 1px 2px rgba(0,0,0,.15)}
.c-role-badge{display:inline-block;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:6px;margin-top:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px;
  background:rgba(255,255,255,.22);color:#fff;border:1px solid rgba(255,255,255,.3)}
.c-body{padding:14px 18px 18px;display:flex;flex-direction:column;flex:1}
.c-status{display:inline-block;font-size:11px;font-weight:700;margin-bottom:10px;
  color:#92400e;background-color:#fef3c7;padding:3px 10px;border-radius:6px}
.c-info{font-size:12.5px;color:#4b5563;flex:1}
.c-info .row-field{display:flex;align-items:center;gap:9px;padding:4px 0}
.c-info svg{stroke:var(--accent);flex-shrink:0}
.c-info span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.c-info .empty{color:#cbd5e1}
.c-actions{display:flex;gap:.6rem;justify-content:center;padding:.4rem 0}
.c-action-icon{transition:transform .15s ease,color .15s ease;border-radius:8px;padding:4px}
.c-action-icon:hover{transform:scale(1.22);color:var(--accent)!important;background:rgba(0,0,0,.05)}
.c-btn{margin-top:14px;width:100%;padding:9px;border-radius:10px;
  border:1.5px solid var(--accent);background:#fff;color:var(--accent-text);
  font-weight:700;font-size:12.5px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .15s ease}
.c-btn:hover{background:var(--accent-hover)}
</style>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info"><div class="header-title">📇 Contacts extérieurs</div></div>
    <div class="header-right">
    </div>
  </header>

  <main class="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
      <div>
        <div style="font-weight:700;font-size:1rem">📇 Vacataires & intervenants extérieurs</div>
        <div style="font-size:.78rem;color:var(--muted)">Contacts ponctuels (vacataires, intervenants, bénévoles, prestataires…) — pas de fiche complète, juste leurs coordonnées</div>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
        <input type="search" id="ceSearch" class="form-input" style="width:240px" placeholder="Rechercher un contact, une fonction…" oninput="renderContactsExternes()"/>
        <span id="ceCount" style="font-size:.78rem;color:var(--muted)"></span>
        <button class="btn btn-accent btn-sm" onclick="openCeModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouveau contact
        </button>
      </div>
    </div>

    <div id="ceList"></div>
  </main>
</div></div>
<div id="toast-container" class="toast-container"></div>

<div class="modal-overlay" id="modalContactExterne">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="ceModalTitle">Nouveau contact</span>
      <button class="modal-close" onclick="closeModal('modalContactExterne')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:.85rem">
      <input type="hidden" id="ceId"/>
      <div class="form-row">
        <div class="form-group"><label class="required">Prénom</label><input type="text" id="cePrenom" placeholder="Prénom"/></div>
        <div class="form-group"><label class="required">Nom</label><input type="text" id="ceNom" placeholder="Nom"/></div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Type</label>
          <select id="ceType">
            <option value="vacataire">Vacataire</option>
            <option value="intervenant">Intervenant</option>
            <option value="benevole">Bénévole</option>
            <option value="prestataire">Prestataire</option>
            <option value="autre">Autre</option>
          </select>
        </div>
        <div class="form-group"><label>Fonction</label><input type="text" id="ceFonction" placeholder="Ex : Animateur sportif, Psychologue…"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Téléphone</label><input type="tel" id="ceTel" placeholder="06 00 00 00 00"/></div>
        <div class="form-group"><label>Email</label><input type="email" id="ceEmail" placeholder="contact@exemple.fr"/></div>
      </div>
      <div class="form-group"><label>Notes</label><textarea id="ceNotes" rows="2" placeholder="Disponibilités, mission, informations complémentaires…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="ceBtnDelete" style="color:#dc2626;margin-right:auto;display:none" onclick="deleteContactExterne()">Supprimer</button>
      <button class="btn btn-ghost" onclick="closeModal('modalContactExterne')">Annuler</button>
      <button class="btn btn-primary" onclick="saveContactExterne()">Enregistrer</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/contacts-externes-supabase.js"></script>
<script src="js/contacts-externes.js"></script>
<script>Auth.requireAuth(); if (!requireModule('access_annuaire')) { document.querySelector('.content').innerHTML = ''; }</script>
</body></html>
