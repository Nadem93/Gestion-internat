<script>
Auth.requireAuth();
  if (!Auth.isAdmin()) {
    document.querySelector('.content').innerHTML = '<div class="empty" style="padding:3rem;text-align:center"><h3>Accès réservé</h3><p>Ce module est réservé aux administrateurs.</p><a href="accueil.html" class="btn btn-accent">← Accueil</a></div>';
  }

  function updateRhNotifs() {
    const counts = {};
    const conges = JSON.parse(localStorage.getItem('ftr_conges') || '[]');
    counts.conges = conges.filter(c => c.statut === 'en_attente').length;

    const todayStr = today();
    const in30d = (() => { const d = new Date(todayStr+'T00:00:00'); d.setDate(d.getDate()+30); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; })();
    const entretiens = DB.get(DB.keys.entretiens) || [];
    counts.entretiens = entretiens.filter(e => e.statut === 'planifie' && e.date && e.date >= todayStr && e.date <= in30d).length;

    document.querySelectorAll('.am-card[data-module]').forEach(el => {
      const mod = el.dataset.module;
      const c = counts[mod] || 0;
      let badge = el.querySelector('.notif-badge');
      if (c > 0) {
        if (!badge) { badge = document.createElement('span'); badge.className = 'notif-badge'; badge.style.cssText = 'position:absolute;top:-6px;right:-6px;background:#dc2626;color:#fff;font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:99px'; el.appendChild(badge); }
        badge.textContent = c > 99 ? '99+' : c;
      } else if (badge) { badge.remove(); }
    });
  }
  document.addEventListener('DOMContentLoaded', updateRhNotifs);
</script>
