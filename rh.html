<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>RH — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    html,body{margin:0;height:100%}
    .rh-layout{display:flex;height:calc(100vh - var(--header-h));overflow:hidden;background:#eef0f3}
    .rh-sidebar{width:78px;flex-shrink:0;background:#f7f8fa;border-right:1px solid #e5e7eb;color:#475569;height:100%;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;align-items:center;padding:1rem .5rem;transition:width .2s}
    .rh-sidebar.collapsed{width:78px}
    .rh-sidebar:not(.collapsed){width:max-content;max-width:226px;align-items:stretch}
    .rh-sidebar-top{display:flex;align-items:center;gap:.5rem;margin-bottom:1.1rem;width:100%}
    .rh-sidebar-logo{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0;overflow:hidden}
    .rh-sidebar-logo .rh-logo-badge{width:38px;height:38px;border-radius:11px;background:#4f46e5;border:none;color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;box-shadow:0 3px 10px rgba(79,70,229,.35)}
    .rh-sidebar-logo .rh-logo-badge svg{width:18px;height:18px}
    .rh-sidebar-logo .rh-logo-text{white-space:nowrap;min-width:0}
    .rh-sidebar-logo h1{font-size:.85rem;font-weight:800;letter-spacing:-.2px;white-space:nowrap;color:#1e293b}
    .rh-sidebar-logo p{font-size:.62rem;color:#94a3b8;margin-top:.1rem;white-space:nowrap}
    .rh-collapse-btn{width:30px;height:30px;border-radius:9px;border:1px solid #e5e7eb;background:#fff;color:#64748b;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .rh-collapse-btn:hover{background:#eef2ff;color:#4f46e5}
    .rh-collapse-btn svg{width:14px;height:14px;transition:transform .2s}
    .rh-sidebar.collapsed .rh-collapse-btn svg{transform:rotate(180deg)}
    .rh-nav-group{width:100%}
    .rh-nav-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#94a3b8;padding:.6rem .6rem .3rem;white-space:nowrap;overflow:hidden}
    .rh-nav-link{display:flex;align-items:center;gap:.65rem;padding:.5rem .6rem;color:#475569;text-decoration:none;font-size:.82rem;font-weight:500;transition:all .12s;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;border-radius:9px;margin-bottom:2px;white-space:nowrap;overflow:hidden}
    .rh-nav-link:hover{background:#eef0f3;color:#1e293b}
    .rh-nav-link.active{background:#fff;color:#1e293b;font-weight:700;box-shadow:0 1px 4px rgba(15,23,42,.1)}
    .rh-nav-icon{width:30px;height:30px;border-radius:10px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;
      box-shadow:0 3px 8px var(--ic2,rgba(99,102,241,.4)),inset 0 1px 1px rgba(255,255,255,.5),inset 0 -2px 3px rgba(0,0,0,.15);
      transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
      transform-style:preserve-3d}
    .rh-nav-icon svg{width:16px;height:16px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
    .rh-nav-link:hover .rh-nav-icon{transform:scale(1.15) rotate(-8deg) translateY(-2px);box-shadow:0 6px 14px var(--ic2,rgba(99,102,241,.5)),inset 0 1px 1px rgba(255,255,255,.6),inset 0 -2px 3px rgba(0,0,0,.15)}
    .rh-nav-link.active .rh-nav-icon{animation:rhIconPulse 1.8s ease-in-out infinite}
    @keyframes rhIconPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08) rotate(3deg)}}
    .rh-sidebar.collapsed .rh-nav-label{height:0;padding:0;margin:.55rem .4rem;border-top:1px solid #e5e7eb;overflow:hidden;text-indent:-9999px}
    .rh-sidebar.collapsed .rh-nav-link span:not(.rh-nav-icon),.rh-sidebar.collapsed .rh-sidebar-logo .rh-logo-text{display:none}
    .rh-sidebar.collapsed .rh-nav-link{justify-content:center;padding:.85rem .3rem;margin-bottom:.4rem}
    .rh-sidebar.collapsed .rh-nav-icon{width:36px;height:36px}
    .rh-sidebar.collapsed .rh-nav-icon svg{width:19px;height:19px}
    .rh-sidebar.collapsed .rh-sidebar-top{justify-content:center}
    .rh-sidebar.collapsed .rh-sidebar-logo{display:none}
    .rh-sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:.65rem;padding-top:.85rem;width:100%}
    .rh-sidebar:not(.collapsed) .rh-sidebar-bottom{align-items:stretch}
    .rh-sidebar-gear{width:34px;height:34px;border-radius:9px;border:none;background:transparent;color:#94a3b8;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s;align-self:center}
    .rh-sidebar-gear:hover{background:#eef0f3;color:#475569}
    .rh-sidebar-gear svg{width:18px;height:18px}
    .rh-sidebar-user{display:flex;align-items:center;gap:.5rem;justify-content:center}
    .rh-sidebar-user .rh-user-avatar{width:38px;height:38px;border-radius:50%;background:#4f46e5;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;box-shadow:0 0 0 2.5px #fff,0 0 0 4px #6366f1}
    .rh-sidebar:not(.collapsed) .rh-sidebar-user{justify-content:flex-start;padding:0 .2rem}
    .rh-sidebar:not(.collapsed) .rh-sidebar-user .rh-user-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.78rem;font-weight:600;color:#1e293b}
    .rh-sidebar.collapsed .rh-user-text{display:none}
    .rh-main{flex:1;min-width:0;display:flex;flex-direction:column;height:100%}
    #rhFrame{flex:1;width:100%;border:none}
    .rh-avatar-rail{width:64px;flex-shrink:0;background:#f7f8fa;border-left:1px solid #e5e7eb;height:100%;overflow-y:auto;display:flex;flex-direction:column;align-items:center;gap:.85rem;padding:1rem .5rem}
    .rh-rail-item{position:relative;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .rh-avatar-rail img,.rh-avatar-rail .rh-rail-initials{width:42px;height:42px;border-radius:50%;cursor:pointer;transition:transform .15s,filter .15s;filter:grayscale(.55);object-fit:cover;flex-shrink:0}
    .rh-avatar-rail .rh-rail-initials{display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:.78rem}
    .rh-rail-item:hover img,.rh-rail-item:hover .rh-rail-initials{transform:scale(1.08);filter:grayscale(0)}
    .rh-rail-tooltip{display:none}
    .rh-float-tooltip{position:fixed;background:#6366f1;color:#fff;font-size:.78rem;font-weight:600;padding:.4rem .8rem;border-radius:8px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .12s;box-shadow:0 4px 12px rgba(99,102,241,.4);z-index:200}
    .rh-float-tooltip::after{content:'';position:absolute;left:100%;top:50%;transform:translateY(-50%);border:5px solid transparent;border-left-color:#6366f1}
    .rh-float-tooltip.show{opacity:1}
    .rh-qc-overlay{position:fixed;inset:0;background:rgba(15,23,42,.25);opacity:0;pointer-events:none;transition:opacity .2s;z-index:90}
    .rh-qc-overlay.open{opacity:1;pointer-events:auto}
    .rh-qc-panel{position:fixed;top:1.25rem;right:1.25rem;height:560px;width:380px;max-width:92vw;max-height:calc(100vh - 2.5rem);background:#fff;border-radius:18px;box-shadow:0 20px 50px rgba(15,23,42,.25);display:flex;flex-direction:column;overflow:hidden;transform:translateX(calc(100% + 1.25rem));transition:transform .25s ease;z-index:91}
    .rh-qc-panel.open{transform:translateX(0)}
    .rh-qc-header{display:flex;align-items:center;gap:.65rem;padding:.85rem 1rem;border-bottom:1px solid #e5e7eb;flex-shrink:0}
    .rh-qc-header-info{display:flex;align-items:center;gap:.6rem;flex:1;min-width:0}
    .rh-qc-avatar{width:38px;height:38px;border-radius:50%;background:#6366f1;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;object-fit:cover}
    .rh-qc-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover}
    .rh-qc-name{font-weight:700;font-size:.88rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .rh-qc-sub{font-size:.72rem;color:#94a3b8}
    .rh-qc-close{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:#94a3b8;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:1rem}
    .rh-qc-close:hover{background:#f1f5f9;color:#475569}
    .rh-qc-body{flex:1;overflow-y:auto;padding:1rem;display:flex;flex-direction:column;gap:.55rem;background:#fafbfc}
    .rh-qc-row{display:flex;flex-direction:column;max-width:78%}
    .rh-qc-row.mine{align-self:flex-end;align-items:flex-end}
    .rh-qc-row.theirs{align-self:flex-start;align-items:flex-start}
    .rh-qc-bubble{padding:.55rem .85rem;border-radius:14px;font-size:.85rem;line-height:1.4;white-space:pre-wrap;word-break:break-word}
    .rh-qc-row.mine .rh-qc-bubble{background:#6366f1;color:#fff;border-radius:14px 14px 4px 14px}
    .rh-qc-row.theirs .rh-qc-bubble{background:#fff;color:#1e293b;border:1px solid #e5e7eb;border-radius:14px 14px 14px 4px}
    .rh-qc-time{font-size:.66rem;color:#94a3b8;margin-top:.2rem}
    .rh-qc-footer{display:flex;gap:.5rem;align-items:center;padding:.75rem 1rem;border-top:1px solid #e5e7eb;flex-shrink:0;background:#fff}
    .rh-qc-input{flex:1;border:1px solid #e5e7eb;border-radius:999px;padding:.55rem 1rem;font-size:.85rem;font-family:inherit;outline:none}
    .rh-qc-input:focus{border-color:#6366f1}
    .rh-qc-send{background:#6366f1;color:#fff;border:none;border-radius:999px;padding:.55rem 1.1rem;font-size:.82rem;font-weight:700;cursor:pointer;flex-shrink:0}
    .rh-qc-send:hover{background:#4f46e5}
    .rh-qc-empty{font-size:.8rem;color:#94a3b8;text-align:center;margin:auto}
    @media(max-width:900px){.rh-avatar-rail{display:none}}
    @media(max-width:700px){.rh-sidebar{position:fixed;left:0;top:0;z-index:50;transform:translateX(-100%);transition:transform .2s}.rh-sidebar.open{transform:translateX(0)}}
  </style>
</head>

<script>
  Auth.requireAuth();
  if (!Auth.isAdmin()) {
    document.body.innerHTML = '<div class="empty" style="padding:3rem;text-align:center"><h3>Accès réservé</h3><p>Ce module est réservé aux administrateurs.</p><a href="accueil.html" class="btn btn-accent">← Accueil</a></div>';
  } else {
    const frame = document.getElementById('rhFrame');
    const title = document.getElementById('rhTopTitle');
    const links = document.querySelectorAll('.rh-nav-link');
    const sidebar = document.getElementById('rhSidebar');
    const collapseBtn = document.getElementById('rhCollapseBtn');

    function labelOf(l) { return l.querySelector('span:not(.rh-nav-icon)').textContent.trim(); }

    function loadPage(page, label) {
      frame.src = page;
      title.textContent = label;
      links.forEach(l => l.classList.toggle('active', l.dataset.page === page));
      sessionStorage.setItem('rh_last_page', page);
    }

    links.forEach(l => {
      l.addEventListener('click', () => loadPage(l.dataset.page, labelOf(l)));
    });

    // Si une page chargée dans le panneau navigue vers l'accueil (clic sur la maison),
    // on sort de l'iframe pour afficher l'accueil en plein écran au lieu de le coincer
    // dans le panneau RH avec le menu latéral autour.
    frame.addEventListener('load', () => {
      try {
        const loadedFile = frame.contentWindow.location.pathname.split('/').pop();
        if (loadedFile === 'accueil.html') window.top.location.href = 'accueil.html';
      } catch (e) { /* origine différente, on ignore */ }
    });

    // Reprend la page affichée avant un rafraîchissement, sinon le tableau de bord par défaut
    const lastPage = sessionStorage.getItem('rh_last_page');
    const lastLink = lastPage && Array.from(links).find(l => l.dataset.page === lastPage);
    if (lastLink) {
      loadPage(lastPage, labelOf(lastLink));
    } else {
      links[0].classList.add('active');
    }

    // Menu réductible (icônes seules), état mémorisé
    if (localStorage.getItem('rh_sidebar_collapsed') !== '0') sidebar.classList.add('collapsed');
    collapseBtn.addEventListener('click', () => {
      sidebar.classList.toggle('collapsed');
      localStorage.setItem('rh_sidebar_collapsed', sidebar.classList.contains('collapsed') ? '1' : '0');
    });

    // Utilisateur connecté, en bas de la colonne menu
    const session = Auth.getSession();
    if (session) {
      const userEl = document.getElementById('rhSidebarUser');
      const nom = [session.prenom, session.nom].filter(Boolean).join(' ') || session.username || 'Utilisateur';
      userEl.innerHTML = `<div class="rh-user-avatar">${initials(session.prenom || '', session.nom || session.username || '')}</div><span class="rh-user-text">${escHtml(nom)}</span>`;
    }

    // Colonne d'avatars du personnel à droite — clic = ouvre le Quick Chat
    const railEl = document.getElementById('rhAvatarRail');
    const employes = (DB.get(DB.keys.employes) || []).filter(e => e.statut !== 'inactif');
    railEl.innerHTML = employes.map(e => {
      const nom = `${e.prenom || ''} ${e.nom || ''}`.trim();
      const animatedAvatarUrl = `https://api.dicebear.com/7.x/adventurer/svg?seed=${encodeURIComponent(e.id || nom)}&backgroundType=gradientLinear`;
      const avatar = `<img src="${escHtml(e.photo || animatedAvatarUrl)}" alt="${escHtml(nom)}" onclick="openQuickChat('${e.id}')"/>`;
      return `<div class="rh-rail-item" data-name="${escHtml(nom)}">${avatar}</div>`;
    }).join('');

    // Bulle de nom flottante (position:fixed, échappe au défilement de la colonne)
    const floatTip = document.getElementById('rhFloatTooltip');
    railEl.querySelectorAll('.rh-rail-item').forEach(item => {
      item.addEventListener('mouseenter', () => {
        const rect = item.getBoundingClientRect();
        floatTip.textContent = item.dataset.name;
        floatTip.style.top = (rect.top + rect.height / 2) + 'px';
        floatTip.style.left = (rect.left - 11) + 'px';
        floatTip.style.transform = 'translate(-100%,-50%)';
        floatTip.classList.add('show');
      });
      item.addEventListener('mouseleave', () => floatTip.classList.remove('show'));
    });

    // ── QUICK CHAT — même stockage que la page Messages (DB.keys.messages + ftr_conversations) ──
    let qcConvId = null;
    let qcTargetEmploye = null;

    function qcConvKey(userIds) { return [...userIds].sort().join('_'); }
    function qcGetOrCreateConv(userIds) {
      const id = qcConvKey(userIds);
      const convs = DB.get('ftr_conversations') || {};
      if (!convs[id]) {
        convs[id] = { id, userIds: [...new Set(userIds)], createdAt: new Date().toISOString() };
        DB.set('ftr_conversations', convs);
      }
      return id;
    }
    function qcConvMessages(convId) {
      return (DB.get(DB.keys.messages) || []).filter(m => m.convId === convId).sort((a, b) => new Date(a.date) - new Date(b.date));
    }
    // Le planning/messages identifient le personnel par compte utilisateur (DB.keys.users),
    // les fiches employé par DB.keys.employes — on résout par id puis par prénom+nom.
    function qcResolveUserId(employe) {
      const users = DB.get(DB.keys.users) || [];
      const u = users.find(x => String(x.id) === String(employe.id)) || users.find(x => x.prenom === employe.prenom && x.nom === employe.nom);
      return u ? String(u.id) : null;
    }

    function openQuickChat(employeId) {
      const employe = employes.find(e => String(e.id) === String(employeId));
      if (!employe) return;
      const targetUserId = qcResolveUserId(employe);
      if (!targetUserId) { toast("Aucun compte utilisateur lié à cet employé", 'error'); return; }
      if (!session) return;
      qcTargetEmploye = employe;
      qcConvId = qcGetOrCreateConv([session.userId, targetUserId]);
      const nom = `${employe.prenom || ''} ${employe.nom || ''}`.trim();
      document.getElementById('rhQcName').textContent = nom;
      document.getElementById('rhQcAvatar').innerHTML = employe.photo
        ? `<img src="${escHtml(employe.photo)}" alt="${escHtml(nom)}"/>`
        : initials(employe.prenom || '', employe.nom || '');
      renderQuickChat();
      document.getElementById('rhQcOverlay').classList.add('open');
      document.getElementById('rhQcPanel').classList.add('open');
      document.getElementById('rhQcInput').focus();
    }

    function closeQuickChat() {
      document.getElementById('rhQcOverlay').classList.remove('open');
      document.getElementById('rhQcPanel').classList.remove('open');
    }

    function renderQuickChat() {
      const body = document.getElementById('rhQcBody');
      if (!qcConvId) return;
      const msgs = qcConvMessages(qcConvId);
      if (!msgs.length) {
        body.innerHTML = '<div class="rh-qc-empty">Aucun message — démarrez la conversation.</div>';
        return;
      }
      body.innerHTML = msgs.map(m => {
        const mine = String(m.from) === String(session.userId);
        const time = new Date(m.date).toLocaleTimeString('fr-FR', { hour: '2-digit', minute: '2-digit' });
        return `<div class="rh-qc-row ${mine ? 'mine' : 'theirs'}">
          <div class="rh-qc-bubble">${escHtml(m.body)}</div>
          <div class="rh-qc-time">${time}</div>
        </div>`;
      }).join('');
      body.scrollTop = body.scrollHeight;
    }

    function sendQuickChatMsg() {
      const input = document.getElementById('rhQcInput');
      const body = input.value.trim();
      if (!body || !qcConvId || !session) return;
      const msgs = DB.get(DB.keys.messages) || [];
      msgs.push({
        id: Date.now().toString(36) + Math.random().toString(36).slice(2, 6),
        convId: qcConvId, from: session.userId, body,
        date: new Date().toISOString(), readBy: [session.userId]
      });
      DB.set(DB.keys.messages, msgs);
      input.value = '';
      renderQuickChat();
    }

    document.getElementById('rhQcInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') sendQuickChatMsg();
    });
  }
</script>
</body></html>
