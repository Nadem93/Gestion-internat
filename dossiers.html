<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Dossiers & suivi — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    html,body{margin:0;height:100%}
    .rh-layout{display:flex;height:calc(100vh - var(--header-h));overflow:hidden;background:#eef0f3}
    .rh-sidebar{width:230px;flex-shrink:0;background:#f7f8fa;border-right:1px solid #e5e7eb;color:#475569;height:100%;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;align-items:stretch;padding:1rem .5rem;transition:width .2s}
    .rh-sidebar.collapsed{width:78px;align-items:center}
    .rh-sidebar-top{display:flex;align-items:center;gap:.5rem;margin-bottom:1.1rem;width:100%}
    .rh-sidebar-logo{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0;overflow:hidden;cursor:pointer;border-radius:9px;padding:.15rem}
    .rh-sidebar-logo:hover{background:#eef0f3}
    .rh-sidebar-logo .rh-logo-badge{width:38px;height:38px;border-radius:11px;background:#6366f1;border:none;color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;box-shadow:0 3px 10px rgba(99,102,241,.35)}
    .rh-sidebar-logo .rh-logo-badge svg{width:18px;height:18px}
    .rh-sidebar-logo .rh-logo-text{white-space:nowrap;min-width:0}
    .rh-sidebar-logo h1{font-size:.85rem;font-weight:800;letter-spacing:-.2px;white-space:nowrap;color:#1e293b}
    .rh-sidebar-logo p{font-size:.62rem;color:#94a3b8;margin-top:.1rem;white-space:nowrap}
    .rh-collapse-btn{width:30px;height:30px;border-radius:9px;border:1px solid #e5e7eb;background:#fff;color:#64748b;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .rh-collapse-btn:hover{background:#eef2ff;color:#6366f1}
    .rh-collapse-btn svg{width:14px;height:14px;transition:transform .2s}
    .rh-sidebar.collapsed .rh-collapse-btn svg{transform:rotate(180deg)}
    .rh-nav-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#94a3b8;padding:.6rem .6rem .3rem;white-space:nowrap;overflow:hidden}
    .rh-nav-link{display:flex;align-items:center;gap:.65rem;padding:.5rem .6rem;color:#475569;text-decoration:none;font-size:.82rem;font-weight:500;transition:all .12s;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;border-radius:9px;margin-bottom:2px;white-space:nowrap;overflow:hidden}
    .rh-nav-link:hover{background:#eef0f3;color:#1e293b}
    .rh-nav-link.active{background:#fff;color:#1e293b;font-weight:700;box-shadow:0 1px 4px rgba(15,23,42,.1)}
    .rh-nav-icon{position:relative;width:30px;height:30px;border-radius:10px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;
      box-shadow:0 3px 8px var(--ic2,rgba(99,102,241,.4)),inset 0 1px 1px rgba(255,255,255,.5),inset 0 -2px 3px rgba(0,0,0,.15);
      transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
      transform-style:preserve-3d}
    .rh-nav-icon svg{width:16px;height:16px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
    .rh-nav-link:hover .rh-nav-icon{transform:scale(1.15) rotate(-8deg) translateY(-2px);box-shadow:0 6px 14px var(--ic2,rgba(99,102,241,.5)),inset 0 1px 1px rgba(255,255,255,.6),inset 0 -2px 3px rgba(0,0,0,.15)}
    .rh-nav-link.active .rh-nav-icon{animation:rhIconPulse 1.8s ease-in-out infinite}
    @keyframes rhIconPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08) rotate(3deg)}}
    .rh-sidebar.collapsed .rh-nav-label{height:0;padding:0;margin:.55rem .4rem;border-top:1px solid #e5e7eb;overflow:hidden;text-indent:-9999px}
    .rh-sidebar.collapsed .rh-nav-link span:not(.rh-nav-icon),.rh-sidebar.collapsed .rh-sidebar-logo .rh-logo-text{display:none}
    .rh-sidebar.collapsed .rh-nav-link{justify-content:center;padding:.85rem .3rem;margin-bottom:.4rem}
    .rh-sidebar.collapsed .rh-nav-icon{width:36px;height:36px}
    .rh-sidebar.collapsed .rh-nav-icon svg{width:19px;height:19px}
    .rh-sidebar.collapsed .rh-sidebar-top{justify-content:center}
    .rh-sidebar.collapsed .rh-sidebar-logo{display:none}
    .rh-main{flex:1;min-width:0;display:flex;flex-direction:column;height:100%;position:relative}
    #dsFrame{flex:1;width:100%;border:none;background:#fff}
    .pl-burger{display:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:#fff;color:#475569;cursor:pointer;align-items:center;justify-content:center}
    .pl-burger svg{width:18px;height:18px}
    @media(max-width:700px){
      .rh-sidebar{position:fixed;left:0;top:var(--header-h);height:calc(100vh - var(--header-h));z-index:50;transform:translateX(-100%);transition:transform .2s;box-shadow:0 8px 30px rgba(15,23,42,.18)}
      .rh-sidebar.open{transform:translateX(0)}
      .pl-burger{display:flex}
    }
  </style>
</head>
<body>
<header class="header">
  <div class="header-info" style="display:flex;align-items:center;gap:.7rem">
    <button class="pl-burger" id="dsBurger" aria-label="Ouvrir le menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="header-title" id="dsTitle">📂 Dossiers &amp; suivi</div>
  </div>
  <div class="header-right"></div>
</header>

<div class="rh-layout">
  <nav class="rh-sidebar" id="dsSidebar">
    <div class="rh-sidebar-top">
      <div class="rh-sidebar-logo" id="dsHomeBtn" title="Accueil des dossiers">
        <div class="rh-logo-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div>
        <div class="rh-logo-text"><h1>Dossiers &amp; suivi</h1><p>Dossier du résident</p></div>
      </div>
      <button class="rh-collapse-btn" id="dsCollapseBtn" title="Réduire / agrandir le menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>

    <div class="rh-nav-label">Admission &amp; parcours</div>
    <button class="rh-nav-link" data-page="admissions.html" data-perm="access_admissions"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#4f46e5,#818cf8);--ic2:#818cf888"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg></span><span>Admissions</span></button>
    <button class="rh-nav-link" data-page="ppe.html" data-perm="access_ppe" data-module="ppe"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#dc2626,#f87171);--ic2:#f8717188"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></span><span>Avenants</span></button>
    <button class="rh-nav-link" data-page="echeances.html" data-perm="view_residents"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#0369a1,#38bdf8);--ic2:#38bdf888"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l2 2"/><path d="M5 3 2 6"/><path d="m22 6-3-3"/></svg></span><span>Échéancier</span></button>

    <div class="rh-nav-label">Documents &amp; évaluations</div>
    <button class="rh-nav-link" data-page="documents.html" data-perm="access_documents"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#8b5cf6,#a78bfa);--ic2:#a78bfa88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span><span>Documents</span></button>
    <button class="rh-nav-link" data-page="evaluations.html" data-perm="view_residents"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#6366f1,#a5b4fc);--ic2:#a5b4fc88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span><span>Grilles d'évaluation</span></button>
    <button class="rh-nav-link" data-page="plan-soins.html" data-perm="view_residents"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#0891b2,#38bdf8);--ic2:#38bdf888"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12h6m-3-3v6"/><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg></span><span>Plan de soins</span></button>
    <button class="rh-nav-link" data-page="fiche-liaison.html" data-perm="view_residents"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#dc2626,#f87171);--ic2:#f8717188"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg></span><span>Fiche de liaison hosp.</span></button>

    <div class="rh-nav-label">Vie sociale &amp; qualité</div>
    <button class="rh-nav-link" data-page="cvs.html" data-perm="access_cvs"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#16a34a,#4ade80);--ic2:#4ade8088"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg></span><span>Vie sociale (CVS)</span></button>
    <button class="rh-nav-link" data-page="satisfaction.html" data-perm="view_residents"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#f59e0b,#fcd34d);--ic2:#fcd34d88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span><span>Satisfaction résidents</span></button>
    <button class="rh-nav-link" data-page="eig.html" data-perm="view_incidents"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#b91c1c,#ef4444);--ic2:#ef444488"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></span><span>Registre EIG</span></button>
    <button class="rh-nav-link" data-page="repertoire.html" data-perm="access_repertoire"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#7c3aed,#a78bfa);--ic2:#a78bfa88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></span><span>Répertoire</span></button>
  </nav>

  <div class="rh-main">
    <main class="content" id="dsHome" style="flex:1;overflow:auto;padding:1.75rem 1.5rem">
      <div style="max-width:640px;margin:0 auto">
        <div id="dsWelcome"></div>
      </div>
    </main>
    <iframe id="dsFrame" title="Contenu des dossiers" style="display:none"></iframe>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>
  Auth.requireAuth();

  const dsSidebar = document.getElementById('dsSidebar');
  const dsFrame = document.getElementById('dsFrame');
  const dsHome = document.getElementById('dsHome');
  const dsTitle = document.getElementById('dsTitle');
  const dsLinks = document.querySelectorAll('.rh-nav-link[data-page]');
  const labelOf = l => (l.querySelector('span:not(.rh-nav-icon)')?.textContent || '').trim();

  // ── Navigation interne : la page s'ouvre dans le panneau, le menu reste visible ──
  function showHome() {
    dsFrame.style.display = 'none';
    dsFrame.src = 'about:blank';
    dsHome.style.display = '';
    dsLinks.forEach(l => l.classList.remove('active'));
    dsTitle.textContent = '📂 Dossiers & suivi';
    sessionStorage.removeItem('ds_last_page');
  }
  function loadPage(page, link) {
    dsHome.style.display = 'none';
    dsFrame.style.display = '';
    dsFrame.src = page + (page.includes('?') ? '&' : '?') + 'embed=1';
    dsLinks.forEach(l => l.classList.toggle('active', l === link));
    dsTitle.textContent = labelOf(link);
    sessionStorage.setItem('ds_last_page', page);
    dsSidebar.classList.remove('open');
  }
  dsLinks.forEach(l => l.addEventListener('click', () => loadPage(l.dataset.page, l)));
  document.getElementById('dsHomeBtn').addEventListener('click', showHome);

  // Si une page chargée renvoie vers l'accueil ou les dossiers, on sort de l'iframe
  dsFrame.addEventListener('load', () => {
    try {
      const f = dsFrame.contentWindow.location.pathname.split('/').pop();
      if (f === 'accueil.html') window.top.location.href = 'accueil.html';
      else if (f === 'dossiers.html') window.top.location.href = 'dossiers.html';
    } catch (e) { /* origine différente, on ignore */ }
  });

  // Reprend la rubrique affichée avant un rafraîchissement
  const lastPage = sessionStorage.getItem('ds_last_page');
  const lastLink = lastPage && Array.from(dsLinks).find(l => l.dataset.page === lastPage);
  if (lastLink && lastLink.style.display !== 'none') loadPage(lastPage, lastLink);

  // ── Menu : repli / déploiement (réduit par défaut, état mémorisé) ──
  (function () {
    const collapseBtn = document.getElementById('dsCollapseBtn');
    const burger = document.getElementById('dsBurger');
    if (localStorage.getItem('ds_sidebar_collapsed') !== '0') dsSidebar.classList.add('collapsed');
    collapseBtn.addEventListener('click', () => {
      dsSidebar.classList.toggle('collapsed');
      localStorage.setItem('ds_sidebar_collapsed', dsSidebar.classList.contains('collapsed') ? '1' : '0');
    });
    burger.addEventListener('click', () => dsSidebar.classList.toggle('open'));
  })();

  // ── Accueil de la rubrique ──
  (function () {
    const s = Auth.getSession();
    const el = document.getElementById('dsWelcome');
    if (!el) return;
    const prenom = (s && (s.prenom || s.username) || '').trim();
    el.innerHTML = `
      <div style="font-size:1.35rem;font-weight:800;color:var(--primary);letter-spacing:-.02em">📂 Dossiers & suivi</div>
      <div style="font-size:.86rem;color:var(--muted);margin-top:.25rem">${prenom ? 'Bonjour ' + escHtml(prenom) + ' — c' : 'C'}hoisissez une rubrique dans le menu à gauche — elle s'ouvre ici, sans quitter la page.</div>`;
  })();

  // ── Masquer les rubriques sans permission ──
  document.querySelectorAll('.rh-nav-link[data-perm]').forEach(el => {
    const s = Auth.getSession();
    const ok = s && (s.role === 'admin' || s.role === 'superadmin' || hasPermission(s.userId, el.dataset.perm));
    if (!ok) el.style.display = 'none';
  });
</script>
</body></html>
