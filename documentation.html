<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Documentation — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info"><div class="header-title">Documentation</div></div>
    <div class="header-right"><button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button></div>
  </header>
  <main class="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
      <div>
        <div style="font-weight:700;font-size:1rem">📚 Documentation de l'établissement</div>
        <div style="font-size:.78rem;color:var(--muted)">Projet d'établissement, notes de service, règlement intérieur, procédures…</div>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn btn-primary admin-only" onclick="openDocumentationModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Ajouter un document
        </button>
      </div>
    </div>

    <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap">
      <input type="search" id="docuSearch" class="form-input" style="flex:1;min-width:180px" placeholder="Rechercher un document…" oninput="renderDocumentation()"/>
      <select id="docuFiltreCategorie" class="form-input" style="width:220px" onchange="renderDocumentation()">
        <option value="">Toutes les catégories</option>
        <option value="Projet d'établissement">Projet d'établissement</option>
        <option value="Notes de service">Notes de service</option>
        <option value="Règlement intérieur">Règlement intérieur</option>
        <option value="Procédures">Procédures</option>
        <option value="Comptes-rendus de réunion">Comptes-rendus de réunion</option>
        <option value="Autre">Autre</option>
      </select>
    </div>

    <div id="docuList"><div class="empty" style="padding:3rem;text-align:center"><p>Aucun document</p></div></div>
  </main>
</div></div>
<div id="toast-container" class="toast-container"></div>

<div class="modal-overlay" id="modalDocumentation">
  <div class="modal" style="max-width:480px">
    <div class="modal-header">
      <span class="modal-title">📚 Ajouter un document</span>
      <button class="modal-close" onclick="closeModal('modalDocumentation')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:.75rem">
      <div class="form-group"><label>Titre *</label><input type="text" id="docuFormTitre" class="form-input" placeholder="Ex : Projet d'établissement 2026-2030"/></div>
      <div class="form-group"><label>Catégorie *</label>
        <select id="docuFormCategorie" class="form-input">
          <option value="Projet d'établissement">Projet d'établissement</option>
          <option value="Notes de service">Notes de service</option>
          <option value="Règlement intérieur">Règlement intérieur</option>
          <option value="Procédures">Procédures</option>
          <option value="Comptes-rendus de réunion">Comptes-rendus de réunion</option>
          <option value="Autre">Autre</option>
        </select>
      </div>
      <div class="form-group"><label>Fichier * (PDF, Word, image — max 3 Mo)</label><input type="file" id="docuFormFile" class="form-input" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg"/></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalDocumentation')">Annuler</button>
      <button class="btn btn-primary" onclick="saveDocumentation()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/documentation.js"></script>
<script>Auth.requireAuth(); if (!requireModule('access_documentation')) { document.querySelector('.content').innerHTML = ''; }</script>
</body></html>
