<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Contrats — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Georgia&display=swap" rel="stylesheet"/>
  <style>
    @keyframes ctPop{0%{opacity:0;transform:scale(.85) translateY(18px)}60%{opacity:1;transform:scale(1.02) translateY(-2px)}100%{opacity:1;transform:scale(1) translateY(0)}}
    @keyframes ctShine{0%{background-position:-150% 0}100%{background-position:250% 0}}
    @keyframes ctFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
    @keyframes ctRing{0%{stroke-dashoffset:283}100%{stroke-dashoffset:var(--ring-offset,283)}}
    .ctcard{padding:1.5rem;animation:ctPop .45s cubic-bezier(.22,1,.36,1) both}
    .ctcard-hero{border-radius:18px;padding:1.4rem 1.5rem;margin-bottom:1.1rem;position:relative;overflow:hidden;color:#fff;box-shadow:0 10px 28px -8px rgba(0,0,0,.28)}
    .ctcard-hero::after{content:'';position:absolute;inset:0;background:linear-gradient(100deg,transparent 30%,rgba(255,255,255,.22) 50%,transparent 70%);background-size:200% 100%;animation:ctShine 2.8s ease-in-out infinite}
    .ctcard-avatar{width:52px;height:52px;border-radius:50%;background:rgba(255,255,255,.25);border:2px solid rgba(255,255,255,.5);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.15rem;flex-shrink:0;animation:ctFloat 3.2s ease-in-out infinite}
    .ctcard-badge{display:inline-flex;align-items:center;gap:.3rem;font-size:.66rem;font-weight:700;letter-spacing:.05em;text-transform:uppercase;padding:.25rem .65rem;border-radius:99px;background:rgba(255,255,255,.22);backdrop-filter:blur(2px)}
    .ctcard-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:.6rem;margin-bottom:1rem}
    .ctcard-stat{border-radius:12px;padding:.7rem .6rem;text-align:center;background:var(--g50);border:1px solid var(--border);animation:ctPop .5s cubic-bezier(.22,1,.36,1) both}
    .ctcard-stat:nth-child(2){animation-delay:.06s}
    .ctcard-stat:nth-child(3){animation-delay:.12s}
    .ctcard-stat .v{font-size:1.05rem;font-weight:800;color:var(--primary)}
    .ctcard-stat .l{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-top:2px}
    .ctcard-section{border-radius:12px;border:1px solid var(--border);padding:.85rem 1rem;margin-bottom:.7rem;animation:ctPop .5s cubic-bezier(.22,1,.36,1) both;animation-delay:.15s}
    .ctcard-section h4{font-size:.72rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin-bottom:.4rem;display:flex;align-items:center;gap:.35rem}
    .ctcard-section p{font-size:.84rem;margin:0;color:var(--text)}
    .ctcard-timeline{position:relative;padding-left:1.1rem}
    .ctcard-timeline::before{content:'';position:absolute;left:3px;top:4px;bottom:4px;width:2px;background:linear-gradient(to bottom,var(--g300),transparent)}
    .ctcard-tl-item{position:relative;padding-bottom:.6rem;font-size:.8rem}
    .ctcard-tl-item::before{content:'';position:absolute;left:-1.1rem;top:4px;width:8px;height:8px;border-radius:50%;background:var(--accent);box-shadow:0 0 0 3px var(--g50)}
    .ctcard-pulse{display:inline-block;width:7px;height:7px;border-radius:50%;background:#dc2626;margin-right:4px;animation:ctPulse 1.4s ease-in-out infinite}
    @keyframes ctPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(1.4)}}

    /* ── Cartes contrat (liste) — style unique « badge » ── */
    .ctx-grid{ display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:1.1rem; }
    @media(max-width:900px){ .ctx-grid{ grid-template-columns:repeat(2,minmax(0,1fr)); } }
    @media(max-width:560px){ .ctx-grid{ grid-template-columns:1fr; } }
    .ctx-card{ position:relative; background:#fff; border:1px solid var(--border); border-radius:18px; overflow:hidden; display:flex; flex-direction:column; box-shadow:0 4px 24px rgba(15,43,74,.07),0 1px 3px rgba(15,43,74,.05); transition:transform .25s,box-shadow .25s,border-color .25s; }
    .ctx-card:hover{ transform:translateY(-4px); box-shadow:0 18px 44px rgba(15,43,74,.14); border-color:color-mix(in srgb,var(--type) 38%,var(--border)); }
    .ctx-card.termine{ opacity:.62; }
    .ctx-wm{ position:absolute; top:52px; right:-6px; font-size:3.4rem; font-weight:900; letter-spacing:-.05em; color:var(--type); opacity:.06; pointer-events:none; line-height:1; }
    .ctx-head{ display:flex; align-items:center; gap:.7rem; padding:1rem 1.1rem; border-bottom:1px solid color-mix(in srgb,var(--type) 18%,var(--border)); background:linear-gradient(135deg, color-mix(in srgb,var(--type) 15%,#fff), color-mix(in srgb,var(--type) 4%,#fff)); }
    .ctx-avatar{ width:42px; height:42px; border-radius:12px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.9rem; color:#fff; background:var(--type); box-shadow:0 4px 10px -2px color-mix(in srgb,var(--type) 60%,transparent); }
    .ctx-head-text{ flex:1; min-width:0; }
    .ctx-name{ font-weight:700; font-size:.92rem; color:var(--text); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .ctx-type{ font-size:.7rem; font-weight:800; color:var(--type); text-transform:uppercase; letter-spacing:.05em; margin-top:1px; }
    .ctx-status{ flex-shrink:0; font-size:.6rem; font-weight:800; text-transform:uppercase; letter-spacing:.03em; padding:.24rem .55rem; border-radius:99px; }
    .ctx-status.actif{ background:#dcfce7; color:#16a34a; display:inline-flex; align-items:center; gap:.3rem; }
    .ctx-status.actif::before{ content:""; width:6px; height:6px; border-radius:50%; background:#16a34a; animation:ctxpulse 1.8s infinite; }
    .ctx-status.fini{ background:var(--g100); color:var(--g600); }
    @keyframes ctxpulse{ 0%{box-shadow:0 0 0 0 rgba(22,163,74,.5)} 70%{box-shadow:0 0 0 5px rgba(22,163,74,0)} 100%{box-shadow:0 0 0 0 rgba(22,163,74,0)} }
    .ctx-body{ padding:.95rem 1.1rem 1rem; flex:1; display:flex; flex-direction:column; gap:.7rem; }
    .ctx-period-dates{ display:flex; justify-content:space-between; font-size:.72rem; font-weight:600; color:var(--g600); margin-bottom:.35rem; }
    .ctx-bar{ height:7px; border-radius:99px; background:var(--g100); overflow:hidden; }
    .ctx-bar-fill{ height:100%; border-radius:99px; background:linear-gradient(90deg,var(--type),color-mix(in srgb,var(--type) 55%,#fff)); }
    .ctx-bar.cdi{ background:repeating-linear-gradient(90deg, color-mix(in srgb,var(--type) 22%,#fff) 0 7px, transparent 7px 14px); }
    .ctx-period-lbl{ font-size:.68rem; color:var(--muted); margin-top:.3rem; text-align:right; }
    .ctx-chips{ display:flex; flex-wrap:wrap; gap:.4rem; }
    .ctx-chip{ display:inline-flex; align-items:center; gap:.3rem; font-size:.72rem; font-weight:600; color:var(--g700); background:var(--g100); padding:.28rem .55rem; border-radius:8px; }
    .ctx-chip.warn{ background:#fee2e2; color:#dc2626; font-weight:700; }
    .ctx-chip.essai{ background:#f5f3ff; color:#7c3aed; }
    .ctx-chip.avenant{ background:#eff6ff; color:#2563eb; }
    .ctx-foot{ display:flex; gap:.4rem; align-items:center; padding:.6rem .8rem; border-top:1px solid var(--border); background:#fcfcfd; }
    .ctx-foot .sp{ flex:1; }
    .ctx-btn{ font-size:.74rem; font-weight:600; padding:.34rem .6rem; border-radius:8px; border:1px solid var(--border); background:#fff; color:var(--g700); cursor:pointer; display:inline-flex; align-items:center; gap:.3rem; transition:background .15s; }
    .ctx-btn:hover{ background:var(--g100); }
    .ctx-btn.primary{ border-color:color-mix(in srgb,var(--type) 40%,var(--border)); color:var(--type); }
    .ctx-btn.primary:hover{ background:color-mix(in srgb,var(--type) 8%,#fff); }

    /* ── Modal contrat — en-tête teinté par type (écho des cartes) ── */
    .cmx-hero{ position:relative; display:flex; align-items:center; gap:.85rem; padding:1.15rem 1.35rem; border-radius:20px 20px 0 0; border-bottom:1px solid color-mix(in srgb,var(--type) 22%,var(--border)); background:linear-gradient(135deg, color-mix(in srgb,var(--type) 17%,#fff), color-mix(in srgb,var(--type) 5%,#fff)); transition:background .3s; }
    .cmx-close{ position:absolute; top:.85rem; right:.95rem; width:30px; height:30px; border-radius:9px; border:none; background:rgba(15,43,74,.06); color:var(--muted); cursor:pointer; font-size:.95rem; line-height:1; display:flex; align-items:center; justify-content:center; transition:background .15s; }
    .cmx-close:hover{ background:rgba(15,43,74,.12); }
    .cmx-badge{ width:48px; height:48px; border-radius:13px; flex-shrink:0; display:flex; align-items:center; justify-content:center; font-weight:800; font-size:.92rem; color:#fff; background:var(--type); box-shadow:0 5px 14px -3px color-mix(in srgb,var(--type) 60%,transparent); transition:background .3s; }
    .cmx-hero-txt{ flex:1; min-width:0; }
    .cmx-title{ font-size:1.05rem; font-weight:800; color:var(--text); letter-spacing:-.01em; }
    .cmx-sub{ font-size:.74rem; font-weight:700; color:var(--type); text-transform:uppercase; letter-spacing:.04em; margin-top:.12rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; transition:color .3s; }
    .cmx-body{ gap:.9rem !important; }
    .cmx-section{ border:1px solid var(--border); border-radius:12px; padding:.85rem .9rem; display:flex; flex-direction:column; gap:.7rem; background:#fcfcfd; }
    .cmx-sec-head{ display:flex; align-items:center; gap:.4rem; font-size:.7rem; font-weight:800; text-transform:uppercase; letter-spacing:.05em; color:var(--type); transition:color .3s; }
    .cmx-sec-head span{ font-size:1rem; }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Gestion des contrats</div></div>
      <div class="header-right">
        <button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button>
        <a href="pilotage.html" class="btn btn-ghost btn-sm">Portail</a>
      </div>
    </header>

    <main class="content" style="max-width:1200px">
      <div id="ctStats" class="grid grid-4" style="margin-bottom:1.5rem"></div>

      <div id="ctAlerts" style="margin-bottom:1.25rem"></div>

      <div class="toolbar" style="margin-bottom:1.25rem">
        <select id="ctFilterEmploye" style="width:auto"><option value="">Tous les employés</option></select>
        <select id="ctFilterType" style="width:auto">
          <option value="">Tous les types</option>
          <option value="cdi">CDI</option>
          <option value="cdd">CDD</option>
          <option value="vacation">Vacation</option>
          <option value="stage">Stage</option>
          <option value="alternance">Alternance</option>
        </select>
        <select id="ctFilterStatut" style="width:auto">
          <option value="">Tous statuts</option>
          <option value="actif">Actif</option>
          <option value="termine">Terminé</option>
        </select>
        <button id="btnAddContrat" class="btn btn-accent btn-sm" style="margin-left:auto" onclick="openContratModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouveau contrat
        </button>
      </div>

      <div id="ctList"></div>
    </main>
  </div>
</div>

<!-- MODAL CONTRAT -->
<div class="modal-overlay" id="modalContrat">
  <div class="modal cmx-modal" style="max-width:560px;--type:#16a34a">
    <div class="cmx-hero">
      <button class="cmx-close" onclick="closeModal('modalContrat')" aria-label="Fermer">✕</button>
      <div class="cmx-badge" id="cmxBadge">CDI</div>
      <div class="cmx-hero-txt">
        <div class="cmx-title" id="ctModalTitle">Nouveau contrat</div>
        <div class="cmx-sub" id="cmxSub">Contrat de travail</div>
      </div>
    </div>
    <div class="modal-body cmx-body">
      <div class="cmx-section">
        <div class="cmx-sec-head"><span>👤</span> Salarié &amp; type</div>
        <div class="form-row">
          <div class="form-group"><label class="required">Employé</label><select id="ctEmploye" onchange="cmxSyncType()"></select></div>
          <div class="form-group"><label class="required">Type de contrat</label>
            <select id="ctType" onchange="cmxSyncType()">
              <option value="cdi">CDI</option>
              <option value="cdd">CDD</option>
              <option value="vacation">Vacation</option>
              <option value="stage">Stage</option>
              <option value="alternance">Alternance</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Poste</label><select id="ctPoste"><option value="">— Sélectionner un poste —</option></select></div>
      </div>

      <div class="cmx-section">
        <div class="cmx-sec-head"><span>📅</span> Période &amp; temps de travail</div>
        <div class="form-row">
          <div class="form-group"><label class="required">Date de début</label><input type="date" id="ctDebut"/></div>
          <div class="form-group" id="ctFinWrap"><label>Date de fin</label><input type="date" id="ctFin"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Temps de travail</label>
            <select id="ctTemps"><option value="plein">Temps plein</option><option value="partiel">Temps partiel</option></select>
          </div>
          <div class="form-group"><label>Heures / semaine</label><input type="number" id="ctHeures" min="0" max="48" step="0.5" placeholder="35"/></div>
        </div>
        <div class="form-group" id="ctEssaiWrap">
          <label>Fin de période d'essai</label><input type="date" id="ctEssai"/>
          <span class="form-hint">Une alerte sera affichée jusqu'à validation.</span>
        </div>
      </div>

      <div class="cmx-section">
        <div class="cmx-sec-head"><span>📎</span> Document &amp; notes</div>
        <div class="form-group">
          <label>Contrat signé / document (PDF ou image) — optionnel</label>
          <input type="file" id="ctFichier" accept="image/*,application/pdf"/>
          <div id="ctFichierInfo" style="font-size:.74rem;color:var(--muted);margin-top:.3rem"></div>
        </div>
        <div class="form-group"><label>Notes</label><textarea id="ctNotes" rows="2" placeholder="Particularités, clauses…"></textarea></div>
      </div>

      <div id="ctAvenantsSection" style="display:none">
        <div class="section-label" style="margin-top:.25rem">🔄 Historique des avenants</div>
        <div id="ctAvenantsList" style="margin-bottom:.5rem"></div>
        <div class="form-row">
          <div class="form-group" style="flex:1"><input type="text" id="ctAvenantTxt" placeholder="Ex : passage à 28h/semaine au 01/09/2026"/></div>
          <div class="form-group" style="flex:0"><button class="btn btn-outline btn-sm" onclick="addAvenant()">+ Avenant</button></div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" style="color:#dc2626;margin-right:auto" id="ctDeleteBtn" onclick="deleteContrat()">Supprimer</button>
      <button class="btn btn-primary" onclick="saveContrat()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL DÉTAIL — CARTE ANIMÉE -->
<div class="modal-overlay" id="modalContratDoc">
  <div class="modal" style="max-width:520px;max-height:92vh;display:flex;flex-direction:column;padding:0;overflow:hidden">
    <div class="modal-header" style="border-bottom:1px solid var(--border)">
      <span class="modal-title">📑 Détail du contrat</span>
      <button class="modal-close" onclick="closeModal('modalContratDoc')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div style="overflow-y:auto;flex:1;background:var(--g50)">
      <div class="ctcard" id="ctDocBody"></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalContratDoc')">Fermer</button>
      <button class="btn btn-primary" id="ctDocEditBtn" onclick="">✎ Modifier</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/employes-supabase.js"></script>
<script src="js/absences-supabase.js"></script>
<script src="js/contrats-supabase.js"></script>
<script src="js/contrats.js"></script>
</body>
</html>
