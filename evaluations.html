<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><link rel="manifest" href="manifest.json"/><meta name="theme-color" content="#0f2b4a"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Grilles d'évaluation — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Grilles d'évaluation</div></div>
      <div class="header-right">
        <button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button>
        <button id="btnAddEv" class="btn btn-accent btn-sm btn-add-resident" onclick="openEvModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px;flex-shrink:0"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="btn-add-label">Nouvelle évaluation</span>
        </button>
      </div>
    </header>

    <main class="content" style="max-width:1100px">
      <div id="evStats" class="grid grid-4" style="margin-bottom:1.5rem"></div>
      <div class="toolbar" style="margin-bottom:1.25rem">
        <select id="evResident" style="width:auto">
          <option value="">Tous les résidents</option>
        </select>
        <select id="evGrille" style="width:auto">
          <option value="">Toutes les grilles</option>
          <option value="mif">🧠 MIF</option>
          <option value="barthel">🚶 Barthel</option>
        </select>
      </div>
      <div id="evList"></div>
    </main>
  </div>
</div>

<!-- MODAL SAISIE ÉVALUATION -->
<div class="modal-overlay" id="modalEv">
  <div class="modal" style="max-width:600px;max-height:90vh;display:flex;flex-direction:column">
    <div class="modal-header">
      <h3 id="evModalTitle">Nouvelle évaluation</h3>
      <button class="modal-close" onclick="closeModal('modalEv')">&times;</button>
    </div>
    <div class="modal-body" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:.85rem">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group">
          <label>Résident</label>
          <select id="evModalResidentSel"></select>
        </div>
        <div class="form-group">
          <label>Grille</label>
          <select id="evModalGrille">
            <option value="mif">MIF (18–126)</option>
            <option value="barthel">Barthel (0–100)</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Date d'évaluation *</label>
        <input type="date" id="evModalDate"/>
      </div>

      <!-- Score en temps réel -->
      <div style="padding:.6rem .85rem;background:#f8fafc;border-radius:8px;border:1px solid var(--border);text-align:center" id="evLiveScore">
        <span style="color:var(--muted);font-size:.85rem">Remplissez les items ci-dessous…</span>
      </div>

      <!-- Corps du formulaire (MIF ou Barthel) -->
      <div id="evFormBody"></div>

      <div class="form-group">
        <label>Note clinique</label>
        <textarea id="evModalNote" rows="2" placeholder="Observations, contexte de l'évaluation…" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalEv')">Annuler</button>
      <button class="btn btn-primary" onclick="saveEvaluation()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL DÉTAIL -->
<div class="modal-overlay" id="modalEvDetail">
  <div class="modal" style="max-width:540px;max-height:90vh;display:flex;flex-direction:column">
    <div class="modal-header">
      <h3>Détail de l'évaluation</h3>
      <button class="modal-close" onclick="closeModal('modalEvDetail')">&times;</button>
    </div>
    <div class="modal-body" style="flex:1;overflow-y:auto" id="evDetailBody"></div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalEvDetail')">Fermer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/evaluations-supabase.js"></script>
<script src="js/evaluations.js"></script>
</body>
</html>
