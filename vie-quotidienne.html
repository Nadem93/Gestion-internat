<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Vie quotidienne — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    html,body{margin:0;height:100%}
    .rh-layout{display:flex;height:calc(100vh - var(--header-h));overflow:hidden;background:#eef0f3}
    .rh-sidebar{width:226px;flex-shrink:0;background:#f7f8fa;border-right:1px solid #e5e7eb;color:#475569;height:100%;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;align-items:stretch;padding:1rem .5rem;transition:width .2s}
    .rh-sidebar.collapsed{width:78px;align-items:center}
    .rh-sidebar-top{display:flex;align-items:center;gap:.5rem;margin-bottom:1.1rem;width:100%}
    .rh-sidebar-logo{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0;overflow:hidden;cursor:pointer;border-radius:9px;padding:.15rem}
    .rh-sidebar-logo:hover{background:#eef0f3}
    .rh-sidebar-logo .rh-logo-badge{width:38px;height:38px;border-radius:11px;background:#0d9488;border:none;color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;box-shadow:0 3px 10px rgba(13,148,136,.35)}
    .rh-sidebar-logo .rh-logo-badge svg{width:18px;height:18px}
    .rh-sidebar-logo .rh-logo-text{white-space:nowrap;min-width:0}
    .rh-sidebar-logo h1{font-size:.85rem;font-weight:800;letter-spacing:-.2px;white-space:nowrap;color:#1e293b}
    .rh-sidebar-logo p{font-size:.62rem;color:#94a3b8;margin-top:.1rem;white-space:nowrap}
    .rh-collapse-btn{width:30px;height:30px;border-radius:9px;border:1px solid #e5e7eb;background:#fff;color:#64748b;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .rh-collapse-btn:hover{background:#ecfdf5;color:#0d9488}
    .rh-collapse-btn svg{width:14px;height:14px;transition:transform .2s}
    .rh-sidebar.collapsed .rh-collapse-btn svg{transform:rotate(180deg)}
    .rh-nav-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#94a3b8;padding:.6rem .6rem .3rem;white-space:nowrap;overflow:hidden}
    .rh-nav-link{display:flex;align-items:center;gap:.65rem;padding:.5rem .6rem;color:#475569;text-decoration:none;font-size:.82rem;font-weight:500;transition:all .12s;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;border-radius:9px;margin-bottom:2px;white-space:nowrap;overflow:hidden}
    .rh-nav-link:hover{background:#eef0f3;color:#1e293b}
    .rh-nav-link.active{background:#fff;color:#1e293b;font-weight:700;box-shadow:0 1px 4px rgba(15,23,42,.1)}
    .rh-nav-icon{position:relative;width:30px;height:30px;border-radius:10px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;
      box-shadow:0 3px 8px var(--ic2,rgba(99,102,241,.4)),inset 0 1px 1px rgba(255,255,255,.5),inset 0 -2px 3px rgba(0,0,0,.15);
      transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
      transform-style:preserve-3d}
    .rh-nav-icon svg{width:16px;height:16px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
    .rh-nav-link:hover .rh-nav-icon{transform:scale(1.15) rotate(-8deg) translateY(-2px);box-shadow:0 6px 14px var(--ic2,rgba(99,102,241,.5)),inset 0 1px 1px rgba(255,255,255,.6),inset 0 -2px 3px rgba(0,0,0,.15)}
    .rh-nav-link.active .rh-nav-icon{animation:rhIconPulse 1.8s ease-in-out infinite}
    @keyframes rhIconPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08) rotate(3deg)}}
    .rh-sidebar.collapsed .rh-nav-label{height:0;padding:0;margin:.55rem .4rem;border-top:1px solid #e5e7eb;overflow:hidden;text-indent:-9999px}
    .rh-sidebar.collapsed .rh-nav-link span:not(.rh-nav-icon),.rh-sidebar.collapsed .rh-sidebar-logo .rh-logo-text{display:none}
    .rh-sidebar.collapsed .rh-nav-link{justify-content:center;padding:.85rem .3rem;margin-bottom:.4rem}
    .rh-sidebar.collapsed .rh-nav-icon{width:36px;height:36px}
    .rh-sidebar.collapsed .rh-nav-icon svg{width:19px;height:19px}
    .rh-sidebar.collapsed .rh-sidebar-top{justify-content:center}
    .rh-sidebar.collapsed .rh-sidebar-logo{display:none}
    .rh-main{flex:1;min-width:0;display:flex;flex-direction:column;height:100%;position:relative}
    #vqFrame{flex:1;width:100%;border:none;background:#fff}
    .pl-burger{display:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:#fff;color:#475569;cursor:pointer;align-items:center;justify-content:center}
    .pl-burger svg{width:18px;height:18px}
    @media(max-width:700px){
      .rh-sidebar{position:fixed;left:0;top:var(--header-h);height:calc(100vh - var(--header-h));z-index:50;transform:translateX(-100%);transition:transform .2s;box-shadow:0 8px 30px rgba(15,23,42,.18)}
      .rh-sidebar.open{transform:translateX(0)}
      .pl-burger{display:flex}
    }
  </style>
</head>
<body>
<header class="header">
  <div class="header-info" style="display:flex;align-items:center;gap:.7rem">
    <button class="pl-burger" id="vqBurger" aria-label="Ouvrir le menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="header-title" id="vqTitle">🏠 Vie quotidienne</div>
  </div>
  <div class="header-right"></div>
</header>

<div class="rh-layout">
  <nav class="rh-sidebar" id="vqSidebar">
    <div class="rh-sidebar-top">
      <div class="rh-sidebar-logo" id="vqHomeBtn" title="Accueil de la vie quotidienne">
        <div class="rh-logo-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg></div>
        <div class="rh-logo-text"><h1>Vie quotidienne</h1><p>Le quotidien du résident</p></div>
      </div>
      <button class="rh-collapse-btn" id="vqCollapseBtn" title="Réduire / agrandir le menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>

    <div class="rh-nav-label">Suivi quotidien</div>
    <button class="rh-nav-link" data-page="transmissions.html" data-perm="access_journal"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#3b82f6,#93c5fd);--ic2:#93c5fd88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 8h2a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2h-2v4l-4-4H9a1.994 1.994 0 0 1-1.414-.586m0 0L11 14h4a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2H5a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2v4l.586-.586z"/></svg></span><span>Transmissions</span></button>
    <button class="rh-nav-link" data-page="presences.html" data-perm="access_presences"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#16a34a,#4ade80);--ic2:#4ade8088"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></span><span>Présences</span></button>
    <button class="rh-nav-link" data-page="nuit.html" data-perm="access_journal"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#312e81,#6366f1);--ic2:#6366f188"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg></span><span>Cahier de nuit</span></button>

    <div class="rh-nav-label">Cadre de vie</div>
    <button class="rh-nav-link" data-page="chambres.html" data-perm="view_residents"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#be185d,#f472b6);--ic2:#f472b688"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 4v16"/><path d="M2 8h18a2 2 0 0 1 2 2v10"/><path d="M2 17h20"/><path d="M6 8v9"/></svg></span><span>Chambres</span></button>
    <button class="rh-nav-link" data-page="repas.html" data-perm="view_residents"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#ea580c,#fb923c);--ic2:#fb923c88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 2v7c0 1.1.9 2 2 2h4a2 2 0 0 0 2-2V2"/><path d="M7 2v20"/><path d="M21 15V2a5 5 0 0 0-5 5v6c0 1.1.9 2 2 2h3zm0 0v7"/></svg></span><span>Repas &amp; régimes</span></button>
    <button class="rh-nav-link" data-page="visites.html" data-perm="view_residents"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#65a30d,#a3e635);--ic2:#a3e63588"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M19 8v6"/><path d="M22 11h-6"/></svg></span><span>Visites &amp; famille</span></button>
    <button class="rh-nav-link" data-page="activites.html" data-perm="access_activites"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#6366f1,#a5b4fc);--ic2:#a5b4fc88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="13.5" cy="6.5" r=".5"/><circle cx="17.5" cy="10.5" r=".5"/><circle cx="8.5" cy="7.5" r=".5"/><circle cx="6.5" cy="12.5" r=".5"/><path d="M12 2C6.5 2 2 6.5 2 12s4.5 10 10 10c.926 0 1.648-.746 1.648-1.688 0-.437-.18-.835-.437-1.125-.29-.289-.438-.652-.438-1.125a1.64 1.64 0 0 1 1.668-1.668h1.996c3.051 0 5.555-2.503 5.555-5.554C21.965 6.012 17.461 2 12 2z"/></svg></span><span>Activités éducatives</span></button>

    <div class="rh-nav-label">Soins</div>
    <button class="rh-nav-link" data-page="medicaments.html" data-perm="access_medicaments"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#dc2626,#f87171);--ic2:#f8717188"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.5 20.5 21 10a4.95 4.95 0 1 0-7-7L3.5 13.5a4.95 4.95 0 1 0 7 7z"/><path d="m8.5 8.5 7 7"/></svg></span><span>Médicaments</span></button>
    <button class="rh-nav-link" data-page="plan-soins.html" data-perm="view_residents"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#0891b2,#38bdf8);--ic2:#38bdf888"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 12h6m-3-3v6"/><path d="M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0z"/></svg></span><span>Plan de soins</span></button>
  </nav>

  <div class="rh-main">
    <main class="content" id="vqHome" style="flex:1;overflow:auto;padding:1.75rem 1.5rem">
      <div style="max-width:640px;margin:0 auto">
        <div id="vqWelcome"></div>
      </div>
    </main>
    <iframe id="vqFrame" title="Contenu de la vie quotidienne" style="display:none"></iframe>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>
  Auth.requireAuth();

  const vqSidebar = document.getElementById('vqSidebar');
  const vqFrame = document.getElementById('vqFrame');
  const vqHome = document.getElementById('vqHome');
  const vqTitle = document.getElementById('vqTitle');
  const vqLinks = document.querySelectorAll('.rh-nav-link[data-page]');
  const labelOf = l => (l.querySelector('span:not(.rh-nav-icon)')?.textContent || '').trim();

  // ── Navigation interne : la page s'ouvre dans le panneau, le menu reste visible ──
  function showHome() {
    vqFrame.style.display = 'none';
    vqFrame.src = 'about:blank';
    vqHome.style.display = '';
    vqLinks.forEach(l => l.classList.remove('active'));
    vqTitle.textContent = '🏠 Vie quotidienne';
    sessionStorage.removeItem('vq_last_page');
  }
  function loadPage(page, link) {
    vqHome.style.display = 'none';
    vqFrame.style.display = '';
    vqFrame.src = page + (page.includes('?') ? '&' : '?') + 'embed=1';
    vqLinks.forEach(l => l.classList.toggle('active', l === link));
    vqTitle.textContent = labelOf(link);
    sessionStorage.setItem('vq_last_page', page);
    vqSidebar.classList.remove('open');
  }
  vqLinks.forEach(l => l.addEventListener('click', () => loadPage(l.dataset.page, l)));
  document.getElementById('vqHomeBtn').addEventListener('click', showHome);

  // Si une page chargée renvoie vers l'accueil ou la vie quotidienne, on sort de l'iframe
  vqFrame.addEventListener('load', () => {
    try {
      const f = vqFrame.contentWindow.location.pathname.split('/').pop();
      if (f === 'accueil.html') window.top.location.href = 'accueil.html';
      else if (f === 'vie-quotidienne.html') window.top.location.href = 'vie-quotidienne.html';
    } catch (e) { /* origine différente, on ignore */ }
  });

  // Reprend la rubrique affichée avant un rafraîchissement
  const lastPage = sessionStorage.getItem('vq_last_page');
  const lastLink = lastPage && Array.from(vqLinks).find(l => l.dataset.page === lastPage);
  if (lastLink && lastLink.style.display !== 'none') loadPage(lastPage, lastLink);

  // ── Menu : repli / déploiement (réduit par défaut, état mémorisé) ──
  (function () {
    const collapseBtn = document.getElementById('vqCollapseBtn');
    const burger = document.getElementById('vqBurger');
    if (localStorage.getItem('vq_sidebar_collapsed') !== '0') vqSidebar.classList.add('collapsed');
    collapseBtn.addEventListener('click', () => {
      vqSidebar.classList.toggle('collapsed');
      localStorage.setItem('vq_sidebar_collapsed', vqSidebar.classList.contains('collapsed') ? '1' : '0');
    });
    burger.addEventListener('click', () => vqSidebar.classList.toggle('open'));
  })();

  // ── Accueil de la rubrique ──
  (function () {
    const s = Auth.getSession();
    const el = document.getElementById('vqWelcome');
    if (!el) return;
    const prenom = (s && (s.prenom || s.username) || '').trim();
    el.innerHTML = `
      <div style="font-size:1.35rem;font-weight:800;color:var(--primary);letter-spacing:-.02em">🏠 Vie quotidienne</div>
      <div style="font-size:.86rem;color:var(--muted);margin-top:.25rem">${prenom ? 'Bonjour ' + escHtml(prenom) + ' — c' : 'C'}hoisissez une rubrique dans le menu à gauche — elle s'ouvre ici, sans quitter la page.</div>`;
  })();

  // ── Masquer les rubriques sans permission ──
  document.querySelectorAll('.rh-nav-link[data-perm]').forEach(el => {
    const s = Auth.getSession();
    const ok = s && (s.role === 'admin' || s.role === 'superadmin' || hasPermission(s.userId, el.dataset.perm));
    if (!ok) el.style.display = 'none';
  });
</script>
</body></html>
