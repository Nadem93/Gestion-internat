<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><link rel="manifest" href="manifest.json"/><meta name="theme-color" content="#0f2b4a"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Distribution des médicaments — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .med-content{background:linear-gradient(135deg,#e6f2fc 0%,#d1e8fa 100%);border-radius:18px;padding:22px;margin-top:.5rem}
    .med-stats-wrap{background:rgba(255,255,255,.95);border-radius:20px;padding:20px 24px;margin-bottom:20px;display:grid;grid-template-columns:repeat(4,1fr)}
    .med-stat-sep{border-right:1px solid #e2e8f0}
    .med-stat-sep:last-child{border-right:none}
    .med-stat-num{font-size:34px;font-weight:700;margin-bottom:4px}
    .med-stat-lbl{font-size:12px;text-transform:uppercase;letter-spacing:.5px;color:#64748b;font-weight:600}
    .med-patient-section{background:rgba(255,255,255,.97);border-radius:20px;padding:20px 22px;margin-bottom:16px}
    .med-patient-header{display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:10px;border-bottom:2px solid #f1f5f9}
    .med-avatar{width:40px;height:40px;border-radius:50%;background:#eff6ff;display:flex;align-items:center;justify-content:center;font-weight:700;color:#2563eb;font-size:13px;flex-shrink:0}
    .med-patient-name{font-size:16px;font-weight:700;color:#1e293b}
    .med-med-row{background:#fff;border-radius:14px;padding:14px 16px;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between;border:1px solid #e2e8f0;gap:12px;flex-wrap:wrap}
    .med-med-name{font-size:14px;font-weight:600;color:#334155;margin-bottom:3px}
    .med-med-meta{font-size:12px;color:#64748b}
    .med-btn{padding:7px 16px;border-radius:20px;border:1.5px solid;font-size:13px;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;gap:5px;transition:.15s;font-family:inherit}
    .med-btn-ok{background:#f0fdf4;color:#166534;border-color:#bbf7d0}
    .med-btn-ok.on{background:#10b981;color:#fff;border-color:#10b981}
    .med-btn-ref{background:#fef2f2;color:#991b1b;border-color:#fecaca}
    .med-btn-ref.on{background:#ef4444;color:#fff;border-color:#ef4444}
    .med-btn-abs{background:#f8fafc;color:#475569;border-color:#e2e8f0}
    .med-btn-abs.on{background:#6b7280;color:#fff;border-color:#6b7280}
    .med-btn-rep{background:#fffbeb;color:#92400e;border-color:#fde68a}
    .med-btn-rep.on{background:#d97706;color:#fff;border-color:#d97706}
    .med-note-btn{padding:7px 10px;border-radius:20px;border:1.5px solid #e2e8f0;background:#f8fafc;color:#94a3b8;cursor:pointer;font-size:13px;font-family:inherit}
    .med-alert{background:#fef2f2;border-left:4px solid #ef4444;padding:9px 14px;border-radius:0 10px 10px 0;margin-top:8px;font-size:12px;color:#991b1b}
    @media print{.med-content{background:none;padding:0}.med-patient-section,.med-stats-wrap{box-shadow:none}}
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">💊 Distribution des médicaments</div></div>
      <div class="header-right">
        <button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button>
        <input type="date" id="medDate" style="width:auto"/>
        <button class="btn btn-outline btn-sm" onclick="printMedSheet()">🖨 Feuille du jour</button>
        <a href="accueil.html" class="btn btn-ghost btn-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Accueil
        </a>
      </div>
    </header>

    <main class="content" style="max-width:1080px">
      <div class="med-content">
        <div id="medStats"></div>
        <div id="medList"></div>
      </div>
    </main>
  </div>
</div>

<!-- MODAL OBSERVATION -->
<div class="modal-overlay" id="modalMedNote">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title">Observation</span>
      <button class="modal-close" onclick="closeModal('modalMedNote')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Note (motif de refus, remarque…)</label><textarea id="mnTexte" rows="3" placeholder="Ex : médicament refusé, résident absent, prise reportée au soir…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalMedNote')">Annuler</button>
      <button class="btn btn-primary" onclick="saveMedNote()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/medicaments.js"></script>
</body>
</html>
