<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fiche employé — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title" id="pageTitle">Fiche employé</div></div>
      <div class="header-right">
        <button class="btn btn-outline btn-sm btn-add-resident" onclick="history.back()">←<span class="btn-add-label"> Retour</span></button>
        <button class="btn btn-accent btn-sm btn-add-resident" id="btnEdit" onclick="togglePageEdit()">✎<span class="btn-add-label"> Modifier</span></button>
      </div>
    </header>
    <main class="content" id="employeContent"></main>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>Auth.requireAuth();</script>
<script>
const EMP_DOCS_KEY = 'ftr_employes_docs';
const DOC_CAT_LABELS = {
  contrat:'Contrat', fiche:'Fiche de poste', administratif:'Administratif',
  formation:'Formation', sanction:'Sanction', autre:'Autre'
};

let currentEmployeId = null;
let pageEditMode = false;
let pageDocFile = null;
let empPlanningMonth = new Date();
empPlanningMonth.setDate(1);
empPlanningMonth.setHours(0,0,0,0);

const PE_TYPES = {
  matin:       { label: 'Matin',       color: '#f59e0b' },
  apresmidi:   { label: 'Après-midi',  color: '#3b82f6' },
  journee:     { label: 'Journée',     color: '#10b981' },
  nuit:        { label: 'Nuit',        color: '#6366f1' }
};

function peDuration(debut, fin) {
  const [h1,m1] = debut.split(':').map(Number);
  const [h2,m2] = fin.split(':').map(Number);
  let mins = (h2*60+m2) - (h1*60+m1);
  if (mins <= 0) mins += 24*60;
  return mins;
}

function peFormatDuration(mins) {
  const h = Math.floor(mins/60), m = Math.round(mins%60);
  return m === 0 ? `${h}h` : `${h}h${String(m).padStart(2,'0')}`;
}

function peShiftType(debut, fin) {
  const [h1,m1] = debut.split(':').map(Number);
  const [h2,m2] = fin.split(':').map(Number);
  const startMin = h1*60+m1, endMin = h2*60+m2;
  if (endMin <= startMin || h1 >= 19) return 'nuit';
  if (peDuration(debut,fin) >= 420 && h1 < 14) return 'journee';
  if (h1 < 13) return 'matin';
  return 'apresmidi';
}

function docTypeIcon(mime) {
  if (!mime) return '📎';
  if (mime.includes('pdf')) return '📄';
  if (mime.includes('image')) return '🖼️';
  if (mime.includes('word') || mime.includes('document')) return '📝';
  return '📎';
}

function fmtSize(b) {
  if (b < 1024) return b + ' o';
  if (b < 1024*1024) return Math.round(b/1024) + ' Ko';
  return (b/1024/1024).toFixed(1) + ' Mo';
}

function getPosteOptions() {
  const fonctions = DB.get(DB.keys.fonctionColors) || {};
  const opts = [['', '— Sélectionner —']];
  Object.keys(fonctions).forEach(f => opts.push([f, f]));
  return opts;
}

function getEmploye(id) {
  const targetId = id || currentEmployeId;
  const users = DB.get(DB.keys.users) || [];
  const u = users.find(x => String(x.id) === String(targetId));
  if (!u) return null;
  const empStore = JSON.parse(localStorage.getItem(DB.keys.employes) || '[]');
  const empById   = empStore.find(x => String(x.id) === String(targetId));
  const empByName = empStore.find(x => x.prenom === u.prenom && x.nom === u.nom);
  const emp = empById || empByName || {};
  return {
    id: String(u.id), prenom: u.prenom||'', nom: u.nom||'',
    poste: emp.poste||u.fonction||'', telephone: emp.telephone||u.telephone||'',
    email: emp.email||u.email||'', statut: emp.statut||(u.role==='admin'?'admin':'actif'),
    dateEmbauche: emp.dateEmbauche||'', notes: emp.notes||'',
    color: emp.color||'', heuresContrat: emp.heuresContrat??35,
    login: u.login||'', photo: emp.photo||u.photo||''
  };
}

function canEditEmploye() {
  const session = Auth.getSession();
  return session && (session.role === 'admin' || session.role === 'moderator');
}

function loadEmploye() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { document.getElementById('employeContent').innerHTML = '<div class="empty"><h3>Employé non trouvé</h3><p>Aucun ID fourni.</p><a href="accueil.html" class="btn btn-accent">← Retour</a></div>'; return; }
  currentEmployeId = id;
  const e = getEmploye();
  if (!e) { document.getElementById('employeContent').innerHTML = '<div class="empty"><h3>Employé introuvable</h3><p>Cet employé n\'existe pas ou a été supprimé.</p><a href="accueil.html" class="btn btn-accent">← Retour</a></div>'; return; }
  document.getElementById('pageTitle').textContent = `${e.prenom||''} ${e.nom||''}`;
  const editBtn = document.getElementById('btnEdit');
  if (editBtn) {
    if (!canEditEmploye()) { editBtn.style.display = 'none'; }
    else { editBtn.style.display = ''; editBtn.textContent = pageEditMode ? '✕ Annuler' : '✎ Modifier'; }
  }
  if (pageEditMode) { renderEditMode(e); return; }
  renderViewMode(e);
}

function renderViewMode(e) {
  const docs = (JSON.parse(localStorage.getItem(EMP_DOCS_KEY) || '{}'))[currentEmployeId] || [];
  const allPaie = JSON.parse(localStorage.getItem(PAIE_KEY) || '{}');
  const paies = (allPaie[currentEmployeId] || []).slice().sort((a,b) => b.periode.localeCompare(a.periode));
  const congesList = (JSON.parse(localStorage.getItem('ftr_conges') || '[]')).filter(d => d.employeId === currentEmployeId);
  const curYear = new Date().getFullYear();
  const joursPris = congesList.filter(d => d.statut === 'accepte' && new Date(d.debut).getFullYear() === curYear)
    .reduce((sum,d) => sum + (Math.ceil((new Date(d.fin) - new Date(d.debut)) / 86400000) + 1), 0);
  const congesEnAttente = congesList.filter(d => d.statut === 'en_attente').length;
  const shifts = (DB.get(DB.keys.planningEquipe) || []).filter(s => s.employeId === currentEmployeId);
  const today = new Date(); today.setHours(0,0,0,0);
  const upcomingShifts = shifts.filter(s => new Date(s.date+'T00:00:00') >= today).sort((a,b) => a.date.localeCompare(b.date) || a.debut.localeCompare(b.debut)).slice(0,3);

  const initiales = ((e.prenom||'')[0]||'') + ((e.nom||'')[0]||'');
  const bannerColor = e.color || 'var(--primary)';

  const miniWidget = (icon, label, value, sub, color, id) =>
    `<div id="widget-${id}" style="background:#fff;border-radius:14px;padding:1.1rem 1.25rem;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid var(--border);display:flex;flex-direction:column;gap:.35rem;cursor:pointer;transition:box-shadow .15s" onclick="scrollToSection('${id}')" onmouseenter="this.style.boxShadow='0 4px 16px rgba(0,0,0,.12)'" onmouseleave="this.style.boxShadow='0 1px 4px rgba(0,0,0,.07)'">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:1.25rem">${icon}</span>
        <span style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${color};background:${color}18;padding:2px 7px;border-radius:99px">${label}</span>
      </div>
      <div style="font-size:1.55rem;font-weight:800;color:var(--text);line-height:1">${value}</div>
      <div style="font-size:.72rem;color:var(--muted)">${sub}</div>
    </div>`;

  document.getElementById('employeContent').innerHTML = `
    <div style="background:linear-gradient(135deg,${bannerColor},${bannerColor}cc);border-radius:var(--r);padding:2rem 2rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;align-items:center">
      <div style="width:80px;height:80px;border-radius:12px;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.6rem;color:#fff;box-shadow:0 2px 12px rgba(0,0,0,.18);flex-shrink:0;overflow:hidden">${e.photo ? `<img src="${e.photo}" style="width:100%;height:100%;object-fit:cover">` : escHtml(initiales)}</div>
      <div style="flex:1;min-width:0">
        <h1 style="font-size:1.6rem;font-weight:800;color:#fff;margin:0;text-shadow:0 1px 3px rgba(0,0,0,.15)">${escHtml(e.prenom||'')} ${escHtml(e.nom||'')}</h1>
        <div style="display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap">
          <span style="background:rgba(255,255,255,.22);color:#fff;font-size:.75rem;font-weight:600;padding:2px 10px;border-radius:99px">${escHtml(e.poste||'Sans poste')}</span>
          <span style="background:rgba(255,255,255,.22);color:#fff;font-size:.75rem;font-weight:600;padding:2px 10px;border-radius:99px">${e.statut === 'inactif' ? 'Inactif' : 'Actif'}</span>
          ${e.email ? `<span style="background:rgba(255,255,255,.15);color:#fff;font-size:.75rem;padding:2px 10px;border-radius:99px">${escHtml(e.email)}</span>` : ''}
          ${e.telephone ? `<span style="background:rgba(255,255,255,.15);color:#fff;font-size:.75rem;padding:2px 10px;border-radius:99px">${escHtml(e.telephone)}</span>` : ''}
        </div>
      </div>
    </div>

    <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:.85rem;margin-bottom:1.75rem">
      ${miniWidget('🗓', 'Congés', joursPris + ' j', `${congesEnAttente} en attente`, '#d97706', 'conges')}
      ${miniWidget('📅', 'Planning', upcomingShifts.length ? upcomingShifts[0].date.slice(5).split('-').reverse().join('/') : '—', upcomingShifts.length ? upcomingShifts[0].debut+' – '+upcomingShifts[0].fin : 'Aucun créneau', '#3b82f6', 'planning')}
      ${miniWidget('📎', 'Documents', docs.length.toString(), docs.length ? docs[docs.length-1].name.slice(0,20)+'…' : 'Aucun fichier', '#10b981', 'documents')}
      ${miniWidget('💰', 'Fiches de paie', paies.length.toString(), paies.length ? paies[0].periode : 'Aucune fiche', '#8b5cf6', 'paie')}
      ${e.dateEmbauche ? miniWidget('📆', 'Embauche', formatDate(e.dateEmbauche), `${Math.floor((Date.now()-new Date(e.dateEmbauche))/(1000*60*60*24*365))} an(s)`, '#0f2b4a', 'infos') : ''}
      ${e.notes ? miniWidget('📝', 'Notes', '...', e.notes.slice(0,30)+(e.notes.length>30?'…':''), '#6366f1', 'notes') : ''}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem">
      <div style="display:flex;flex-direction:column;gap:1.25rem">
        <div id="section-conges">${empCongesHtml()}</div>
        <div id="section-documents">${docsHtml(docs)}</div>
        <div id="section-paie">${empFichePaieHtml()}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:1.25rem">
        <div id="section-planning">${empPlanningHtml()}</div>
        <div id="section-journal">${empJournalHtml(e)}</div>
        ${e.notes ? `<div id="section-notes" class="card"><div class="card-header"><span class="card-title">📝 Notes</span></div><div class="card-body"><p style="white-space:pre-wrap;line-height:1.8;font-size:.875rem;margin:0">${escHtml(e.notes)}</p></div></div>` : ''}
      </div>
    </div>`;

  initPageDocUpload();
  initPaieUpload();
}

function scrollToSection(id) {
  const el = document.getElementById('section-' + id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function empPlanningHtml() {
  const shifts = (DB.get(DB.keys.planningEquipe) || []).filter(s => s.employeId === currentEmployeId);
  const y = empPlanningMonth.getFullYear(), m = empPlanningMonth.getMonth();
  const prefix = `${y}-${String(m+1).padStart(2,'0')}`;
  const monthShifts = shifts.filter(s => s.date && s.date.startsWith(prefix)).sort((a,b) => a.date.localeCompare(b.date) || a.debut.localeCompare(b.debut));
  const totalMin = monthShifts.reduce((sum,s) => sum + peDuration(s.debut, s.fin), 0);
  const monthLabel = empPlanningMonth.toLocaleDateString('fr-FR', { month:'long', year:'numeric' });
  const rows = monthShifts.map(s => {
    const type = peShiftType(s.debut, s.fin);
    const t = PE_TYPES[type];
    const d = new Date(s.date + 'T00:00:00');
    const dayLabel = d.toLocaleDateString('fr-FR', { weekday:'short', day:'2-digit', month:'short' });
    return `<tr>
      <td style="font-weight:600;text-transform:capitalize">${dayLabel}</td>
      <td><span class="badge" style="background:${t.color}22;color:${t.color}">${t.label}</span></td>
      <td>${s.debut} – ${s.fin}</td>
      <td>${peFormatDuration(peDuration(s.debut, s.fin))}</td>
    </tr>`;
  }).join('');
  return `<div class="card">
    <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
      <span class="card-title">📅 Planning</span>
      <div style="display:flex;align-items:center;gap:.5rem">
        <button class="btn btn-icon btn-outline btn-sm" onclick="empPlanningShiftMonth(-1)">‹</button>
        <span style="font-weight:700;font-size:.85rem;text-transform:capitalize;min-width:120px;text-align:center">${monthLabel}</span>
        <button class="btn btn-icon btn-outline btn-sm" onclick="empPlanningShiftMonth(1)">›</button>
      </div>
      <span style="font-size:.8rem;color:var(--muted)">Total : <strong>${peFormatDuration(totalMin)}</strong></span>
    </div>
    <div class="card-body" style="padding:0">
      ${monthShifts.length ? `<table class="table"><thead><tr><th>Jour</th><th>Type</th><th>Horaire</th><th>Durée</th></tr></thead><tbody>${rows}</tbody></table>`
        : '<div class="empty" style="padding:2rem;text-align:center"><p>Aucun créneau ce mois-ci.</p></div>'}
    </div>
  </div>`;
}

function empPlanningShiftMonth(delta) {
  empPlanningMonth.setMonth(empPlanningMonth.getMonth() + delta);
  const tab = document.getElementById('tab-planning');
  if (tab) tab.innerHTML = empPlanningHtml();
}

function empCongesHtml() {
  const TYPE_LABELS = { cp:'Congés payés', rtt:'RTT', maladie:'Arrêt maladie', enfant_malade:'Enfant malade', formation:'Formation', autre:'Autre' };
  const STATUT_STYLES = { en_attente: { bg:'#d9770618', c:'#d97706', l:'En attente' }, accepte: { bg:'#16a34a18', c:'#16a34a', l:'Accepté' }, refuse: { bg:'#ef444418', c:'#ef4444', l:'Refusé' } };
  const list = (JSON.parse(localStorage.getItem('ftr_conges') || '[]')).filter(d => d.employeId === currentEmployeId);
  const curYear = new Date().getFullYear();
  const joursPris = list.filter(d => d.statut === 'accepte' && new Date(d.debut).getFullYear() === curYear)
    .reduce((sum,d) => sum + (Math.ceil((new Date(d.fin) - new Date(d.debut)) / 86400000) + 1), 0);
  const canDecide = canEditEmploye();
  const rows = list.slice().sort((a,b) => (b.dateDemande||'').localeCompare(a.dateDemande||'')).map(d => {
    const st = STATUT_STYLES[d.statut] || STATUT_STYLES.en_attente;
    const jours = Math.ceil((new Date(d.fin) - new Date(d.debut)) / 86400000) + 1;
    const actions = canDecide && d.statut === 'en_attente' ? `
      <div style="display:flex;gap:.4rem;flex-shrink:0;align-self:center">
        <button class="btn btn-sm" style="background:#16a34a;color:#fff;padding:3px 10px;font-size:.72rem" onclick="empAccepterConge('${d.id}')">✓ Accepter</button>
        <button class="btn btn-sm" style="background:#ef4444;color:#fff;padding:3px 10px;font-size:.72rem" onclick="empOuvrirRefus('${d.id}')">✕ Refuser</button>
      </div>` : '';
    return `<div style="display:flex;align-items:flex-start;gap:.75rem;padding:.85rem 1rem;border-bottom:1px solid var(--border)">
      <span style="font-size:1.2rem;margin-top:2px;flex-shrink:0">${d.type === 'maladie' ? '🤒' : d.type === 'enfant_malade' ? '👶' : d.type === 'formation' ? '📚' : '🗓'}</span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
          <span style="padding:1px 8px;border-radius:99px;font-size:.68rem;font-weight:700;background:${st.bg};color:${st.c}">${st.l}</span>
          <span style="font-size:.7rem;color:var(--g400)">${TYPE_LABELS[d.type]||d.type}</span>
        </div>
        <div style="font-size:.76rem;color:var(--muted);margin-top:.2rem">${formatDate(d.debut)} → ${formatDate(d.fin)} · ${jours} jour${jours>1?'s':''}</div>
        ${d.motif ? `<div style="font-size:.75rem;color:var(--g600);margin-top:.25rem">${escHtml(d.motif)}</div>` : ''}
        ${d.statut === 'refuse' && d.reponseMotif ? `<div style="font-size:.73rem;color:var(--red);margin-top:.15rem">Motif du refus : ${escHtml(d.reponseMotif)}</div>` : ''}
      </div>
      ${actions}
    </div>`;
  }).join('');
  return `<div class="card" style="margin-bottom:1rem">
    <div class="card-body" style="display:flex;gap:1.5rem;align-items:center;justify-content:space-between;flex-wrap:wrap">
      <div><div style="font-size:.7rem;color:var(--muted);font-weight:700">JOURS PRIS EN ${curYear}</div><div style="font-size:1.6rem;font-weight:800">${joursPris}</div></div>
      <button class="btn btn-primary btn-sm" onclick="empOpenDemandeConge()">🗓 Demander un congé</button>
    </div>
  </div>
  <div class="card"><div class="card-header"><span class="card-title">🗓 Demandes de congés</span></div>
    <div class="card-body" style="padding:0">${list.length ? rows : '<div class="empty" style="padding:2rem;text-align:center"><p>Aucune demande.</p></div>'}</div>
  </div>`;
}

function empAccepterConge(id) {
  const list = JSON.parse(localStorage.getItem('ftr_conges') || '[]');
  const idx = list.findIndex(x => x.id === id);
  if (idx < 0) return;
  list[idx].statut = 'accepte';
  list[idx].reponseDate = new Date().toISOString();
  list[idx].reponseMotif = '';
  localStorage.setItem('ftr_conges', JSON.stringify(list));
  const e = getEmploye();
  auditLog('conge', `Congé accepté — ${e.prenom||''} ${e.nom||''} (${list[idx].debut} → ${list[idx].fin})`);
  toast('Congé accepté ✓', 'success');
  const tab = document.getElementById('tab-conges');
  if (tab) tab.innerHTML = empCongesHtml();
}

function empOuvrirRefus(id) {
  const old = document.getElementById('modalRefusConge');
  if (old) old.remove();
  const div = document.createElement('div');
  div.innerHTML = `<div class="modal-overlay" id="modalRefusConge" style="display:flex" onclick="closeModal('modalRefusConge')">
    <div class="modal" style="max-width:440px" onclick="event.stopPropagation()">
      <div class="modal-header"><span class="modal-title">✕ Refuser la demande</span><button class="modal-close" onclick="closeModal('modalRefusConge')">&times;</button></div>
      <div class="modal-body">
        <div class="form-group">
          <label>Motif du refus <span style="font-size:.75rem;color:var(--muted)">(optionnel)</span></label>
          <textarea id="refusMotifInput" class="form-input" rows="3" placeholder="Expliquer la raison du refus…"></textarea>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('modalRefusConge')">Annuler</button>
        <button class="btn" style="background:#ef4444;color:#fff" onclick="empConfirmerRefus('${id}')">✕ Confirmer le refus</button>
      </div>
    </div>
  </div>`;
  document.body.appendChild(div);
  requestAnimationFrame(() => document.getElementById('modalRefusConge')?.classList.add('open'));
}

function empConfirmerRefus(id) {
  const motif = document.getElementById('refusMotifInput')?.value.trim() || '';
  const list = JSON.parse(localStorage.getItem('ftr_conges') || '[]');
  const idx = list.findIndex(x => x.id === id);
  if (idx < 0) return;
  list[idx].statut = 'refuse';
  list[idx].reponseDate = new Date().toISOString();
  list[idx].reponseMotif = motif;
  localStorage.setItem('ftr_conges', JSON.stringify(list));
  const e = getEmploye();
  auditLog('conge', `Congé refusé — ${e.prenom||''} ${e.nom||''} (${list[idx].debut} → ${list[idx].fin})`);
  closeModal('modalRefusConge');
  toast('Demande refusée', 'info');
  const tab = document.getElementById('tab-conges');
  if (tab) tab.innerHTML = empCongesHtml();
}

function empOpenDemandeConge() {
  const types = [
    { v:'cp', l:'Congés payés' }, { v:'rtt', l:'RTT' }, { v:'maladie', l:'Arrêt maladie' },
    { v:'enfant_malade', l:'Enfant malade' }, { v:'formation', l:'Formation' }, { v:'autre', l:'Autre' }
  ];
  const tOpts = types.map(t => `<option value="${t.v}">${t.l}</option>`).join('');
  const html = `<div class="modal-overlay" id="modalEmpConge" style="display:flex" onclick="closeModal('modalEmpConge')">
    <div class="modal" style="max-width:480px" onclick="event.stopPropagation()">
      <div class="modal-header"><span class="modal-title">🗓 Nouvelle demande de congés</span><button class="modal-close" onclick="closeModal('modalEmpConge')">&times;</button></div>
      <div class="modal-body" style="display:flex;flex-direction:column;gap:.75rem">
        <div class="form-group"><label>Type *</label><select id="ecType" class="form-input">${tOpts}</select></div>
        <div class="form-row">
          <div class="form-group"><label>Date début *</label><input type="date" id="ecDebut" class="form-input"/></div>
          <div class="form-group"><label>Date fin *</label><input type="date" id="ecFin" class="form-input"/></div>
        </div>
        <div class="form-group"><label>Motif</label><textarea id="ecMotif" class="form-input" rows="2" placeholder="Raison de la demande…"></textarea></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-ghost" onclick="closeModal('modalEmpConge')">Annuler</button>
        <button class="btn btn-primary" onclick="empSaveConge()">Envoyer la demande</button>
      </div>
    </div>
  </div>`;
  const old = document.getElementById('modalEmpConge');
  if (old) old.remove();
  const div = document.createElement('div');
  div.innerHTML = html;
  document.body.appendChild(div);
  requestAnimationFrame(() => document.getElementById('modalEmpConge')?.classList.add('open'));
}

function empSaveConge() {
  const type = document.getElementById('ecType').value;
  const debut = document.getElementById('ecDebut').value;
  const fin = document.getElementById('ecFin').value;
  const motif = document.getElementById('ecMotif').value.trim();
  if (!debut || !fin) { toast('Champs obligatoires manquants', 'error'); return; }
  if (debut > fin) { toast('La date de fin doit être après la date de début', 'error'); return; }
  const e = getEmploye();
  const list = JSON.parse(localStorage.getItem('ftr_conges') || '[]');
  list.push({
    id: genId(), employeId: currentEmployeId, employeNom: `${e.prenom||''} ${e.nom||''}`.trim(),
    type, debut, fin, motif, statut: 'en_attente', dateDemande: new Date().toISOString()
  });
  localStorage.setItem('ftr_conges', JSON.stringify(list));
  auditLog('conge', `Nouvelle demande — ${e.prenom||''} ${e.nom||''}`.trim());
  closeModal('modalEmpConge');
  toast('Demande de congés envoyée ✓', 'success');
  const tab = document.getElementById('tab-conges');
  if (tab) tab.innerHTML = empCongesHtml();
}

function empJournalHtml(e) {
  const fullName = `${e.prenom||''} ${e.nom||''}`.trim();
  const log = (DB.get(DB.keys.auditLog) || []).filter(l => l.user === fullName || (l.details && l.details.includes(fullName)));
  const rows = log.slice(0, 100).map(l => `<div style="display:flex;gap:.75rem;padding:.6rem 1rem;border-bottom:1px solid var(--border)">
    <div style="font-size:.72rem;color:var(--muted);min-width:120px;flex-shrink:0">${new Date(l.date).toLocaleString('fr-FR')}</div>
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;font-size:.85rem">${escHtml(l.action)}</div>
      ${l.details ? `<div style="font-size:.78rem;color:var(--muted)">${escHtml(l.details)}</div>` : ''}
    </div>
  </div>`).join('');
  return `<div class="card"><div class="card-header"><span class="card-title">🕘 Journal d'activité</span></div>
    <div class="card-body" style="padding:0">${log.length ? rows : '<div class="empty" style="padding:2rem;text-align:center"><p>Aucune activité enregistrée.</p></div>'}</div>
  </div>`;
}

const PAIE_KEY = 'ftr_fiches_paie';
let pagePayFile = null;

function empFichePaieHtml() {
  const allPaie = JSON.parse(localStorage.getItem(PAIE_KEY) || '{}');
  const list = (allPaie[currentEmployeId] || []).slice().sort((a,b) => b.periode.localeCompare(a.periode));
  const rows = list.map(p => `
    <div style="display:flex;align-items:center;gap:.85rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border)">
      <span style="font-size:1.4rem">📄</span>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:.875rem">${escHtml(p.name)}</div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:2px">
          Période : <strong>${escHtml(p.periode)}</strong>
          ${p.salaireBrut ? ` · Brut : <strong>${escHtml(p.salaireBrut)} €</strong>` : ''}
          ${p.salaireNet  ? ` · Net : <strong>${escHtml(p.salaireNet)} €</strong>`  : ''}
          · ${fmtSize(p.size)}
        </div>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="downloadPaie('${p.id}')" title="Télécharger">↓</button>
      <button class="btn btn-ghost btn-sm admin-only" style="color:var(--red)" onclick="deletePaie('${p.id}')" title="Supprimer">✕</button>
    </div>`).join('');

  return `
    <div class="card" style="margin-bottom:1rem">
      <div class="card-header"><span class="card-title">Historique des fiches de paie</span></div>
      <div class="card-body" style="padding:0">
        ${list.length ? rows : '<div class="empty" style="padding:2rem;text-align:center"><p>Aucune fiche de paie enregistrée.</p></div>'}
      </div>
    </div>
    <div class="card admin-only">
      <div class="card-header"><span class="card-title">Ajouter une fiche de paie</span></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:.85rem">
        <div class="grid grid-2" style="gap:.75rem">
          <div class="form-group"><label>Période (mois / année) *</label><input type="month" id="paieMonth" class="form-input"/></div>
          <div class="form-group"><label>Nom du fichier</label><input type="text" id="paieName" class="form-input" placeholder="ex: Fiche de paie juin 2026"/></div>
        </div>
        <div class="grid grid-2" style="gap:.75rem">
          <div class="form-group"><label>Salaire brut (€)</label><input type="number" id="paieBrut" class="form-input" step="0.01" placeholder="2500.00"/></div>
          <div class="form-group"><label>Salaire net (€)</label><input type="number" id="paieNet" class="form-input" step="0.01" placeholder="1950.00"/></div>
        </div>
        <div class="doc-upload-zone" onclick="document.getElementById('paieFileInput').click()" style="cursor:pointer;padding:1.5rem;text-align:center;border:2px dashed var(--border);border-radius:var(--r);background:var(--g50)">
          <div style="font-size:2rem;margin-bottom:.5rem">📎</div>
          <div style="font-weight:600;font-size:.875rem">Cliquez pour sélectionner le fichier PDF</div>
          <div style="font-size:.78rem;color:var(--muted)">PDF — max 5 Mo</div>
        </div>
        <input type="file" id="paieFileInput" style="display:none" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg"/>
        <div id="paiePending" style="display:none;padding:.75rem 1rem;border:1px solid var(--border);border-radius:var(--r-sm);align-items:center;gap:.75rem">
          <span style="font-size:1.2rem">📄</span>
          <div style="flex:1;min-width:0">
            <div id="paiePendingName" style="font-weight:600;font-size:.85rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap"></div>
            <div id="paiePendingSize" style="font-size:.72rem;color:var(--muted)"></div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="cancelPaie()" style="color:var(--red)">✕</button>
        </div>
        <button class="btn btn-primary" onclick="uploadPaie()" style="align-self:flex-end">Ajouter la fiche</button>
      </div>
    </div>`;
}

function initPaieUpload() {
  const input = document.getElementById('paieFileInput');
  if (!input) return;
  input.addEventListener('change', e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 5 * 1024 * 1024) { toast('Fichier trop lourd (max 5 Mo)', 'error'); return; }
    pagePayFile = file;
    document.getElementById('paiePendingName').textContent = file.name;
    document.getElementById('paiePendingSize').textContent = fmtSize(file.size);
    document.getElementById('paiePending').style.display = 'flex';
  });
}

function cancelPaie() {
  pagePayFile = null;
  const inp = document.getElementById('paieFileInput');
  if (inp) inp.value = '';
  const el = document.getElementById('paiePending');
  if (el) el.style.display = 'none';
}

async function uploadPaie() {
  const periode = document.getElementById('paieMonth')?.value;
  if (!periode) { toast('Sélectionnez une période', 'error'); return; }
  if (!pagePayFile) { toast('Sélectionnez un fichier', 'error'); return; }
  const nameInput = document.getElementById('paieName')?.value.trim();
  const [y, m] = periode.split('-');
  const mLabel = new Date(parseInt(y), parseInt(m)-1).toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
  const name = nameInput || `Fiche de paie ${mLabel}`;
  const salaireBrut = document.getElementById('paieBrut')?.value || '';
  const salaireNet  = document.getElementById('paieNet')?.value  || '';
  try {
    const base64 = await fileToBase64(pagePayFile);
    const entry = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      name, periode, salaireBrut, salaireNet,
      fileName: pagePayFile.name, size: pagePayFile.size,
      mimeType: pagePayFile.type, date: new Date().toISOString(), data: base64
    };
    const allPaie = JSON.parse(localStorage.getItem(PAIE_KEY) || '{}');
    if (!allPaie[currentEmployeId]) allPaie[currentEmployeId] = [];
    allPaie[currentEmployeId].push(entry);
    localStorage.setItem(PAIE_KEY, JSON.stringify(allPaie));
    toast('Fiche de paie ajoutée ✓', 'success');
    pagePayFile = null;
    const tab = document.getElementById('tab-paie');
    if (tab) { tab.innerHTML = empFichePaieHtml(); initPaieUpload(); }
  } catch { toast('Erreur lors de l\'ajout', 'error'); }
}

function downloadPaie(id) {
  const allPaie = JSON.parse(localStorage.getItem(PAIE_KEY) || '{}');
  const p = (allPaie[currentEmployeId] || []).find(x => x.id === id);
  if (!p) return;
  const a = document.createElement('a');
  a.href = p.data; a.download = p.name; a.click();
}

function deletePaie(id) {
  if (!confirm('Supprimer cette fiche de paie ?')) return;
  const allPaie = JSON.parse(localStorage.getItem(PAIE_KEY) || '{}');
  if (!allPaie[currentEmployeId]) return;
  allPaie[currentEmployeId] = allPaie[currentEmployeId].filter(x => x.id !== id);
  localStorage.setItem(PAIE_KEY, JSON.stringify(allPaie));
  toast('Fiche supprimée', 'success');
  const tab = document.getElementById('tab-paie');
  if (tab) { tab.innerHTML = empFichePaieHtml(); initPaieUpload(); }
}

function docsHtml(docs) {
  const list = docs.map(d => `<div style="display:flex;align-items:center;gap:.75rem;padding:.75rem 1.25rem;border-bottom:1px solid var(--border)">
    <span style="font-size:1.3rem">${docTypeIcon(d.mimeType)}</span>
    <div style="flex:1;min-width:0">
      <div style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(d.name)}</div>
      <div style="font-size:.72rem;color:var(--muted);display:flex;gap:.5rem;flex-wrap:wrap;margin-top:1px">
        <span>${DOC_CAT_LABELS[d.category]||d.category||'—'}</span>
        ${d.docDate ? `<span>📅 ${formatDate(d.docDate)}</span>` : ''}
        <span>· ${fmtSize(d.size)}</span>
      </div>
    </div>
    <button class="btn btn-ghost btn-sm" onclick="downloadEmpDoc('${d.id}')">↓</button>
    <button class="btn btn-ghost btn-sm admin-only" style="color:var(--red)" onclick="deleteEmpDoc('${d.id}')">✕</button>
  </div>`).join('');
  return `<div class="card"><div class="card-header"><span class="card-title">Fichiers joints</span></div><div class="card-body" style="padding:0">${docs.length ? list : '<div class="empty" style="padding:2rem"><p>Aucun document joint.</p></div>'}</div></div>
    <div class="card" style="margin-top:1rem">
      <div class="card-header"><span class="card-title">Ajouter un document</span></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:.85rem">
        <div class="form-group"><label>Nom du document</label><input type="text" id="pageDocName" class="form-input" placeholder="ex: Contrat de travail"/></div>
        <div class="grid grid-2" style="gap:.75rem">
          <div class="form-group"><label>Date du document</label><input type="date" id="pageDocDate" class="form-input"/></div>
        </div>
        <div class="form-group"><label>Catégorie</label><select id="pageDocCategory" class="form-input"><option value="">—</option><option value="contrat">Contrat</option><option value="fiche">Fiche de poste</option><option value="administratif">Administratif</option><option value="formation">Formation</option><option value="sanction">Sanction</option><option value="autre">Autre</option></select></div>
        <div class="doc-upload-zone" onclick="document.getElementById('pageDocFileInput').click()" style="cursor:pointer;padding:1.5rem;text-align:center;border:2px dashed var(--border);border-radius:var(--r);background:var(--g50)">
          <div style="font-size:2rem;margin-bottom:.5rem">📎</div>
          <div style="font-weight:600;font-size:.875rem">Cliquez pour sélectionner un fichier</div>
          <div style="font-size:.78rem;color:var(--muted)">PDF, Word, image — max 3 Mo</div>
        </div>
        <input type="file" id="pageDocFileInput" style="display:none" accept=".pdf,.doc,.docx,.png,.jpg,.jpeg,.gif,.webp"/>
        <div id="pageDocPending" style="display:none;padding:.75rem 1rem;border:1px solid var(--border);border-radius:var(--r-sm);align-items:center;gap:.75rem">
          <span style="font-size:1.2rem">📎</span>
          <div style="flex:1;min-width:0">
            <div id="pageDocPendingName" style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis"></div>
            <div id="pageDocPendingSize" style="font-size:.72rem;color:var(--muted)"></div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="cancelPageDoc()" style="color:var(--red)">✕</button>
        </div>
        <button class="btn btn-primary" onclick="uploadDocFromPage()" style="align-self:flex-end">Ajouter</button>
      </div>
    </div>`;
}

function inputField(id, label, value, type) {
  return `<div class="form-group"><label>${label}</label><input type="${type||'text'}" id="${id}" value="${escHtml(value||'')}" class="form-input"/></div>`;
}

function selectField(id, label, value, options) {
  const opts = options.map(o => `<option value="${o[0]}"${value===o[0]?' selected':''}>${o[1]}</option>`).join('');
  return `<div class="form-group"><label>${label}</label><select id="${id}" class="form-input">${opts}</select></div>`;
}

function renderEditMode(e) {
  document.getElementById('employeContent').innerHTML = `
    <div class="card" style="margin-bottom:1.5rem">
      <div class="card-header"><span class="card-title">✎ Modification — ${escHtml(e.prenom||'')} ${escHtml(e.nom||'')}</span></div>
      <div class="card-body" style="display:flex;flex-direction:column;gap:1rem">
        <div class="grid grid-2" style="gap:.75rem">
          ${inputField('ePrenom','Prénom',e.prenom)}
          ${inputField('eNom','Nom',e.nom)}
        </div>
        <div class="grid grid-2" style="gap:.75rem">
          ${selectField('ePoste','Poste',e.poste, getPosteOptions())}
          ${selectField('eStatut','Statut',e.statut, [['actif','Actif'],['inactif','Inactif']])}
        </div>
        <div class="grid grid-2" style="gap:.75rem">
          ${inputField('eTel','Téléphone',e.telephone)}
          ${inputField('eEmail','Email',e.email)}
        </div>
        <div class="grid grid-2" style="gap:.75rem">
          ${inputField('eDateEmbauche','Date d\'embauche',e.dateEmbauche,'date')}
          ${inputField('eColor','Couleur',e.color||'var(--primary)','color')}
        </div>
        <div class="grid grid-2" style="gap:.75rem">
          ${inputField('eHeuresContrat','Heures contractuelles / semaine',e.heuresContrat ?? 35,'number')}
        </div>
        <hr style="border:none;border-top:1px solid var(--border);margin:.25rem 0"/>
        <div style="font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#6366f1;margin-bottom:.25rem">📝 Notes</div>
        <textarea id="eNotes" class="form-input" rows="4" style="resize:vertical">${escHtml(e.notes||'')}</textarea>
      </div>
      <div class="card-footer" style="display:flex;gap:.75rem;justify-content:flex-end;padding:.75rem 1rem">
        <button class="btn btn-ghost" onclick="cancelPageEdit()">Annuler</button>
        <button class="btn btn-primary" onclick="savePageEdit()">💾 Enregistrer</button>
      </div>
    </div>`;
}

function savePageEdit() {
  const e = getEmploye();
  if (!e) return;
  const g = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const data = {
    id: currentEmployeId,
    poste: g('ePoste'), telephone: g('eTel'), email: g('eEmail'),
    dateEmbauche: g('eDateEmbauche'), statut: g('eStatut'),
    color: g('eColor') || '#3b82f6',
    heuresContrat: parseFloat(g('eHeuresContrat')) || 35,
    notes: g('eNotes'),
    updatedAt: new Date().toISOString()
  };
  let list = JSON.parse(localStorage.getItem(DB.keys.employes) || '[]');
  const idx = list.findIndex(x => String(x.id) === String(currentEmployeId));
  if (idx >= 0) list[idx] = { ...list[idx], ...data };
  else list.push(data);
  localStorage.setItem(DB.keys.employes, JSON.stringify(list));
  toast('Employé mis à jour', 'success');
  pageEditMode = false;
  loadEmploye();
}

function cancelPageEdit() {
  pageEditMode = false;
  loadEmploye();
}

function togglePageEdit() {
  pageEditMode = !pageEditMode;
  loadEmploye();
}

function initPageDocUpload() {
  const input = document.getElementById('pageDocFileInput');
  if (!input) return;
  input.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) { toast('Fichier trop lourd (max 3 Mo)', 'error'); return; }
    pageDocFile = file;
    document.getElementById('pageDocPendingName').textContent = file.name;
    document.getElementById('pageDocPendingSize').textContent = fmtSize(file.size);
    document.getElementById('pageDocPending').style.display = 'flex';
  });
}

async function uploadDocFromPage() {
  if (!pageDocFile || !currentEmployeId) return;
  const name = document.getElementById('pageDocName').value.trim() || pageDocFile.name.replace(/\.[^.]+$/, '');
  const docDate = document.getElementById('pageDocDate').value;
  const category = document.getElementById('pageDocCategory').value;
  try {
    const base64 = await fileToBase64(pageDocFile);
    const doc = {
      id: Date.now().toString(36) + Math.random().toString(36).slice(2,6),
      name,
      fileName: pageDocFile.name,
      size: pageDocFile.size,
      mimeType: pageDocFile.type,
      category,
      docDate,
      date: new Date().toISOString(),
      data: base64
    };
    const allDocs = JSON.parse(localStorage.getItem(EMP_DOCS_KEY) || '{}');
    if (!allDocs[currentEmployeId]) allDocs[currentEmployeId] = [];
    allDocs[currentEmployeId].push(doc);
    localStorage.setItem(EMP_DOCS_KEY, JSON.stringify(allDocs));
    toast('Document ajouté', 'success');
    pageDocFile = null;
    document.getElementById('pageDocName').value = '';
    document.getElementById('pageDocDate').value = '';
    document.getElementById('pageDocCategory').value = '';
    document.getElementById('pageDocFileInput').value = '';
    document.getElementById('pageDocPending').style.display = 'none';
    loadEmploye();
  } catch { toast('Erreur lors de l\'ajout', 'error'); }
}

function cancelPageDoc() {
  pageDocFile = null;
  document.getElementById('pageDocFileInput').value = '';
  document.getElementById('pageDocPending').style.display = 'none';
}

function downloadEmpDoc(docId) {
  const allDocs = JSON.parse(localStorage.getItem(EMP_DOCS_KEY) || '{}');
  const docs = allDocs[currentEmployeId] || [];
  const doc = docs.find(d => d.id === docId);
  if (!doc) return;
  const a = document.createElement('a');
  a.href = doc.data; a.download = doc.name; a.click();
}

function deleteEmpDoc(docId) {
  if (!confirm('Supprimer ce document ?')) return;
  const allDocs = JSON.parse(localStorage.getItem(EMP_DOCS_KEY) || '{}');
  if (!allDocs[currentEmployeId]) return;
  allDocs[currentEmployeId] = allDocs[currentEmployeId].filter(d => d.id !== docId);
  if (!allDocs[currentEmployeId].length) delete allDocs[currentEmployeId];
  localStorage.setItem(EMP_DOCS_KEY, JSON.stringify(allDocs));
  toast('Document supprimé', 'success');
  loadEmploye();
}

function initPageTabs() {
  document.querySelectorAll('#employeContent .tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('#employeContent .tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.querySelectorAll('#employeContent > [id^="tab-"]').forEach(x => x.style.display = 'none');
      const tab = document.getElementById('tab-' + t.dataset.tab);
      if (tab) tab.style.display = '';
    });
  });
}

document.addEventListener('DOMContentLoaded', () => {
  loadEmploye();
});
</script>
