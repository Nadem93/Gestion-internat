<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fiche employé — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title" id="pageTitle">Fiche employé</div></div>
      <div class="header-right">
        <button class="btn btn-outline btn-sm btn-add-resident" onclick="history.back()">←<span class="btn-add-label"> Retour</span></button>
        <button class="btn btn-outline btn-sm btn-add-resident" id="btnAttestation" onclick="generateAttestation()" style="display:none">📄<span class="btn-add-label"> Attestation</span></button>
        <button class="btn btn-accent btn-sm btn-add-resident" id="btnEdit" onclick="togglePageEdit()">✎<span class="btn-add-label"> Modifier</span></button>
      </div>
    </header>
    <main class="content" id="employeContent"></main>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>Auth.requireAuth();</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/employes-supabase.js"></script>
<script src="js/absences-supabase.js"></script>
<script src="js/conges-supabase.js"></script>
<script src="js/planning-equipe-supabase.js"></script>
<script src="js/formations-supabase.js"></script>
<script src="js/entretiens-supabase.js"></script>
<script src="js/fiches-paie-supabase.js"></script>
<script src="js/documents-employe-supabase.js"></script>
<script>
const EMP_DOCS_KEY = 'ftr_employes_docs';
let _empCache = [];
let _empArretsCache = [];  // arrêts/absences de l'établissement (table Supabase absences_at)
function _empArretsFor(id) { return _empArretsCache.filter(a => String(a.employeId) === String(id)); }
let _empCongesCache = [];  // demandes de congés (table Supabase conges)
function _empCongesFor(id) { return _empCongesCache.filter(c => String(c.employeId) === String(id)); }
let _empPlanningCache = []; // créneaux planning équipe (table Supabase planning_equipe)
function _empPlanningFor(id) { return _empPlanningCache.filter(s => String(s.employeId) === String(id)); }
let _empFormationsCache = []; // formations collectives (table Supabase formations)
function _empFormationsAcquises(id) { return _empFormationsCache.filter(f => f.statut === 'realisee' && (f.participants || []).map(String).includes(String(id))); }
let _empEntretiensCache = []; // entretiens professionnels (table Supabase entretiens)
function _empEntretiensFor(id) { return _empEntretiensCache.filter(e => String(e.employeId) === String(id)); }
let _empFichesPaieCache = []; // fiches de paie (table Supabase fiches_paie)
function _empFichesPaieFor(id) { return _empFichesPaieCache.filter(p => String(p.employeId) === String(id)); }
let _empDocsCache = []; // documents de la fiche (table Supabase documents_employe)
const DOC_CAT_LABELS = {
  contrat:'Contrat', fiche:'Fiche de poste', administratif:'Administratif',
  formation:'Formation', sanction:'Sanction', autre:'Autre'
};

let currentEmployeId = null;
let pageEditMode = false;
let pageDocFile = null;
let empPlanningMonth = new Date();
empPlanningMonth.setDate(1);
empPlanningMonth.setHours(0,0,0,0);

const PE_TYPES = {
  matin:       { label: 'Matin',       color: '#f59e0b' },
  apresmidi:   { label: 'Après-midi',  color: '#3b82f6' },
  journee:     { label: 'Journée',     color: '#10b981' },
  nuit:        { label: 'Nuit',        color: '#6366f1' }
};

function peDuration(debut, fin) {
  const [h1,m1] = debut.split(':').map(Number);
  const [h2,m2] = fin.split(':').map(Number);
  let mins = (h2*60+m2) - (h1*60+m1);
  if (mins <= 0) mins += 24*60;
  return mins;
}

function peFormatDuration(mins) {
  const h = Math.floor(mins/60), m = Math.round(mins%60);
  return m === 0 ? `${h}h` : `${h}h${String(m).padStart(2,'0')}`;
}

function peShiftType(debut, fin) {
  const [h1,m1] = debut.split(':').map(Number);
  const [h2,m2] = fin.split(':').map(Number);
  const startMin = h1*60+m1, endMin = h2*60+m2;
  if (endMin <= startMin || h1 >= 19) return 'nuit';
  if (peDuration(debut,fin) >= 420 && h1 < 14) return 'journee';
  if (h1 < 13) return 'matin';
  return 'apresmidi';
}

function docTypeIcon(mime) {
  if (!mime) return '📎';
  if (mime.includes('pdf')) return '📄';
  if (mime.includes('image')) return '🖼️';
  if (mime.includes('word') || mime.includes('document')) return '📝';
  return '📎';
}

function fmtSize(b) {
  if (b < 1024) return b + ' o';
  if (b < 1024*1024) return Math.round(b/1024) + ' Ko';
  return (b/1024/1024).toFixed(1) + ' Mo';
}

const _EMP_COLORS = ['#6366f1','#8b5cf6','#ec4899','#f59e0b','#10b981','#3b82f6','#ef4444','#14b8a6'];
function getPosteColor(poste) {
  const fonctions = DB.get(DB.keys.fonctionColors) || [];
  const f = fonctions.find(x => x.fonction === poste);
  if (f && f.color) return f.color;
  if (!poste) return '#6366f1';
  let h = 0; for (const c of poste) h = (h * 31 + c.charCodeAt(0)) & 0xffff;
  return _EMP_COLORS[h % _EMP_COLORS.length];
}

function getPosteOptions() {
  const fonctions = DB.get(DB.keys.fonctionColors) || {};
  const opts = [['', '— Sélectionner —']];
  Object.keys(fonctions).forEach(f => opts.push([f, f]));
  return opts;
}

function getEmploye(id) {
  const targetId = id || currentEmployeId;
  const emp = _empCache.find(x => String(x.id) === String(targetId));
  if (!emp) return null;
  return {
    id: String(emp.id), prenom: emp.prenom||'', nom: emp.nom||'',
    poste: emp.poste||'', telephone: emp.telephone||'',
    email: emp.email||'', statut: emp.statut||'actif',
    dateEmbauche: emp.dateEmbauche||'', notes: emp.notes||'',
    color: emp.color||'', heuresContrat: emp.heuresContrat??35, salaireBase: emp.salaireBase??0,
    login: '', photo: emp.photo||'', profileId: emp.profileId||null
  };
}

function canEditEmploye() {
  const session = Auth.getSession();
  return session && (session.role === 'admin' || session.role === 'moderator');
}

function loadEmploye() {
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  if (!id) { document.getElementById('employeContent').innerHTML = '<div class="empty"><h3>Employé non trouvé</h3><p>Aucun ID fourni.</p><a href="accueil.html" class="btn btn-accent">← Retour</a></div>'; return; }
  currentEmployeId = id;
  const e = getEmploye();
  if (!e) { document.getElementById('employeContent').innerHTML = '<div class="empty"><h3>Employé introuvable</h3><p>Cet employé n\'existe pas ou a été supprimé.</p><a href="accueil.html" class="btn btn-accent">← Retour</a></div>'; return; }
  document.getElementById('pageTitle').textContent = `${e.prenom||''} ${e.nom||''}`;
  const editBtn = document.getElementById('btnEdit');
  if (editBtn) {
    if (!canEditEmploye()) { editBtn.style.display = 'none'; }
    else { editBtn.style.display = ''; editBtn.textContent = pageEditMode ? '✕ Annuler' : '✎ Modifier'; }
  }
  const attBtn = document.getElementById('btnAttestation');
  if (attBtn) attBtn.style.display = canEditEmploye() ? '' : 'none';
  if (pageEditMode) { renderEditMode(e); return; }
  renderViewMode(e);
}

function renderViewMode(e) {
  const docs = _empDocsCache;
  const paies = _empFichesPaieFor(currentEmployeId).slice().sort((a,b) => (b.periode||'').localeCompare(a.periode||''));
  const congesList = _empCongesFor(currentEmployeId);
  const curYear = new Date().getFullYear();
  const joursPris = congesList.filter(d => d.statut === 'accepte' && new Date(d.debut).getFullYear() === curYear)
    .reduce((sum,d) => sum + (Math.ceil((new Date(d.fin) - new Date(d.debut)) / 86400000) + 1), 0);
  const congesEnAttente = congesList.filter(d => d.statut === 'en_attente').length;
  const shifts = _empPlanningFor(currentEmployeId);
  const today = new Date(); today.setHours(0,0,0,0);
  const upcomingShifts = shifts.filter(s => new Date(s.date+'T00:00:00') >= today).sort((a,b) => a.date.localeCompare(b.date) || a.debut.localeCompare(b.debut)).slice(0,3);

  const initiales = ((e.prenom||'')[0]||'') + ((e.nom||'')[0]||'');
  const bannerColor = getPosteColor(e.poste);

  const miniWidget = (icon, label, value, sub, color, id) =>
    `<div id="widget-${id}" style="background:#fff;border-radius:14px;padding:1.1rem 1.25rem;box-shadow:0 1px 4px rgba(0,0,0,.07);border:1px solid var(--border);display:flex;flex-direction:column;gap:.35rem;cursor:pointer;transition:box-shadow .15s" onclick="scrollToSection('${id}')" onmouseenter="this.style.boxShadow='0 4px 16px rgba(0,0,0,.12)'" onmouseleave="this.style.boxShadow='0 1px 4px rgba(0,0,0,.07)'">
      <div style="display:flex;align-items:center;justify-content:space-between">
        <span style="font-size:1.25rem">${icon}</span>
        <span style="font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:${color};background:${color}18;padding:2px 7px;border-radius:99px">${label}</span>
      </div>
      <div style="font-size:1.55rem;font-weight:800;color:var(--text);line-height:1">${value}</div>
      <div style="font-size:.72rem;color:var(--muted)">${sub}</div>
    </div>`;

  const photoEl = e.photo
    ? `<img src="${e.photo}" style="width:96px;height:96px;border-radius:12px;object-fit:cover;border:3px solid #fff;box-shadow:var(--shadow-md);flex-shrink:0" alt=""/>`
    : `<div style="width:96px;height:96px;border-radius:12px;background:${bannerColor};display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.8rem;color:#fff;box-shadow:var(--shadow-md);flex-shrink:0;border:3px solid rgba(255,255,255,.4)">${escHtml(initiales)}</div>`;

  document.getElementById('employeContent').innerHTML = `
    <div style="background:linear-gradient(135deg,${bannerColor},${bannerColor}22);border-radius:var(--r);padding:2rem 2rem 1.5rem;margin-bottom:1.5rem;display:flex;gap:1.5rem;align-items:center">
      ${photoEl}
      <div style="flex:1;min-width:0">
        <h1 style="font-size:1.6rem;font-weight:800;color:#fff;margin:0;text-shadow:0 1px 3px rgba(0,0,0,.15)">${escHtml(e.prenom||'')} ${escHtml(e.nom||'')}</h1>
        <div style="display:flex;gap:.5rem;margin-top:.5rem;flex-wrap:wrap">
          <span style="background:rgba(255,255,255,.22);color:#fff;font-size:.75rem;font-weight:600;padding:2px 10px;border-radius:99px">${escHtml(e.poste||'Sans poste')}</span>
          <span style="background:rgba(255,255,255,.22);color:#fff;font-size:.75rem;font-weight:600;padding:2px 10px;border-radius:99px">${e.statut === 'inactif' ? 'Inactif' : 'Actif'}</span>
          ${e.email ? `<span style="background:rgba(255,255,255,.15);color:#fff;font-size:.75rem;padding:2px 10px;border-radius:99px">${escHtml(e.email)}</span>` : ''}
          ${e.telephone ? `<span style="background:rgba(255,255,255,.15);color:#fff;font-size:.75rem;padding:2px 10px;border-radius:99px">${escHtml(e.telephone)}</span>` : ''}
        </div>
      </div>
      <div style="display:flex;gap:.75rem;align-items:center;flex-shrink:0">
        ${e.email ? `<a href="mailto:${escHtml(e.email)}" title="Envoyer un email" style="color:#fff;opacity:.9;display:flex"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:19px;height:19px"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 6 12 13 2 6"/></svg></a>` : `<span style="color:#fff;opacity:.4;display:flex"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:19px;height:19px"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 6 12 13 2 6"/></svg></span>`}
        ${canEditEmploye() ? `<button onclick="scrollToSection('messages')" title="Écrire un message" style="color:#fff;opacity:.9;background:none;border:none;cursor:pointer;display:flex;padding:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:19px;height:19px"><path d="M21 11.5a8.38 8.38 0 0 1-.9 3.8 8.5 8.5 0 0 1-7.6 4.7 8.38 8.38 0 0 1-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 0 1-.9-3.8 8.5 8.5 0 0 1 4.7-7.6 8.38 8.38 0 0 1 3.8-.9h.5a8.48 8.48 0 0 1 8 8v.5z"/></svg></button>` : ''}
        <button onclick="window.scrollTo({top:0,behavior:'smooth'})" title="Voir la fiche" style="color:#fff;opacity:.9;background:none;border:none;cursor:pointer;display:flex;padding:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:19px;height:19px"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg></button>
        ${canEditEmploye() ? `<button onclick="scrollToSection('depart')" title="Départ / suppression" style="color:#fff;opacity:.9;background:none;border:none;cursor:pointer;display:flex;padding:0"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:19px;height:19px"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg></button>` : ''}
      </div>
    </div>

    ${(() => {
      const formations = (JSON.parse(localStorage.getItem(FORM_KEY)||'{}'))[currentEmployeId]||[];
      const now2 = Date.now();
      const formExpSoon = formations.filter(f=>f.dateExpiration&&!( new Date(f.dateExpiration).getTime()<now2)&&(new Date(f.dateExpiration).getTime()-now2)<30*86400000).length;
      const formExp = formations.filter(f=>f.dateExpiration&&new Date(f.dateExpiration).getTime()<now2).length;
      const formBadge = formExp>0?`<span style="color:#ef4444"> ⚠</span>`:formExpSoon>0?`<span style="color:#f59e0b"> !</span>`:'';
      const entretiens=_empEntretiensFor(currentEmployeId);
      const lastEnt=entretiens.slice().sort((a,b)=>(b.date||'').localeCompare(a.date||''))[0];
      const alertes=(JSON.parse(localStorage.getItem(ALERTES_KEY)||'{}'))[currentEmployeId]||[];
      const alertesActives=alertes.filter(a=>!a.done&&a.date&&(new Date(a.date).getTime()-now2)<30*86400000).length;
      const histo=(JSON.parse(localStorage.getItem(HISTO_KEY)||'{}'))[currentEmployeId]||[];
      const fullName=`${e.prenom||''} ${e.nom||''}`.trim();
      const journalLog=(DB.get(DB.keys.auditLog)||[]).filter(l=>l.user===fullName||(l.details&&l.details.includes(fullName)));
      const journalMonth=journalLog.filter(l=>{const d=new Date(l.date);return d.getFullYear()===new Date().getFullYear()&&d.getMonth()===new Date().getMonth();}).length;
      return `<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.85rem;margin-bottom:1.75rem">
        ${(() => { const refs=(DB.get(DB.keys.residents)||[]).filter(r=>r.referent===`${e.prenom||''} ${e.nom||''}`.trim()&&r.statut!=='sorti'); return miniWidget('🏠','Référents',refs.length.toString(),refs.length?refs.map(r=>`${r.prenom||''} ${r.nom||''}`.trim()).slice(0,2).join(', ')+(refs.length>2?'…':''):'Aucun résident','#0f766e','referents'); })()}
        ${(() => { const arr=_empArretsFor(currentEmployeId); const cy=new Date().getFullYear(); const jours=arr.filter(a=>(a.debut||'').startsWith(cy)).reduce((s,a)=>{const d=Math.round((new Date(a.fin||a.debut)-new Date(a.debut))/86400000)+1;return s+d;},0); return miniWidget('🤒','Arrêts',arr.length.toString(),jours+'j cette année','#ef4444','arrets'); })()}
        ${miniWidget('🗓', 'Congés', joursPris + ' j', `${congesEnAttente} en attente`, '#d97706', 'conges')}
        ${miniWidget('📅', 'Planning', upcomingShifts.length ? upcomingShifts[0].date.slice(5).split('-').reverse().join('/') : '—', upcomingShifts.length ? upcomingShifts[0].debut+' – '+upcomingShifts[0].fin : 'Aucun créneau', '#3b82f6', 'planning')}
        ${miniWidget('📊', 'Créneaux', shifts.length.toString(), upcomingShifts.length+' à venir', '#0284c7', 'planning')}
        ${miniWidget('📚', 'Formations', formations.length.toString()+formBadge, formExp>0?`${formExp} expiré(s)`:formExpSoon>0?`${formExpSoon} à renouveler`:'À jour', formExp>0?'#ef4444':formExpSoon>0?'#f59e0b':'#10b981', 'formations')}
        ${miniWidget('💰', 'Fiches de paie', paies.length.toString(), paies.length ? paies[0].periode : 'Aucune fiche', '#8b5cf6', 'paie')}
        ${miniWidget('📎', 'Documents', docs.length.toString(), docs.length ? docs[docs.length-1].name.slice(0,20)+'…' : 'Aucun fichier', '#10b981', 'documents')}
        ${miniWidget('🗂', 'Entretiens', entretiens.length.toString(), lastEnt ? 'Dernier : '+formatDate(lastEnt.date) : 'Aucun entretien', '#6366f1', 'entretiens')}
        ${(() => { const dipl=(JSON.parse(localStorage.getItem(DIPLOME_KEY)||'{}'))[currentEmployeId]||[]; const now3=Date.now(); const exp=dipl.filter(d=>d.dateExpiration&&new Date(d.dateExpiration)<now3).length; const soon=dipl.filter(d=>d.dateExpiration&&!(new Date(d.dateExpiration)<now3)&&(new Date(d.dateExpiration)-now3)<60*86400000).length; return miniWidget('🎓','Diplômes',dipl.length.toString(),exp>0?exp+' expiré(s)':soon>0?soon+' à renouveler':'À jour',exp>0?'#ef4444':soon>0?'#f59e0b':'#6366f1','diplomes'); })()}
        ${miniWidget('📈', 'Historique', histo.length.toString(), histo.length?'Évolutions enregistrées':'Aucune évolution', '#0f2b4a', 'historique')}
        ${alertesActives>0 ? miniWidget('🔔', 'Alertes', alertesActives.toString(), 'Échéance proche', '#ef4444', 'alertes') : miniWidget('🔔', 'Rappels', alertes.filter(a=>!a.done).length.toString(), 'Aucune urgence', '#94a3b8', 'alertes')}
        ${miniWidget('🕘', 'Journal', journalLog.length.toString(), journalMonth+' ce mois', '#0891b2', 'journal')}
      </div>`;
    })()}

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:1.25rem">
      <div style="display:flex;flex-direction:column;gap:1.25rem">
        <div id="section-referents">${empReferentsHtml(e)}</div>
        <div id="section-conges">${empCongesHtml()}</div>
        <div id="section-arrets">${empArretsHtml()}</div>
        <div id="section-heures">${empHeuresHtml(e)}</div>
        <div id="section-diplomes">${empDiplomesHtml()}</div>
        <div id="section-formations">${empFormationsHtml()}</div>
        <div id="section-historique">${empHistoriqueHtml()}</div>
        <div id="section-documents">${docsHtml(docs)}</div>
        <div id="section-paie">${empFichePaieHtml()}</div>
      </div>
      <div style="display:flex;flex-direction:column;gap:1.25rem">
        <div id="section-planning">${empPlanningHtml()}</div>
        <div id="section-entretiens">${empEntretiensHtml()}</div>
        <div id="section-alertes">${empAlertesHtml()}</div>
        <div id="section-journal">${empJournalHtml(e)}</div>
        ${canEditEmploye() ? `<div id="section-messages">${empMessagesHtml(e)}</div>` : ''}
        ${e.notes ? `<div id="section-notes" class="card"><div class="card-header"><span class="card-title">📝 Notes</span></div><div class="card-body"><p style="white-space:pre-wrap;line-height:1.8;font-size:.875rem;margin:0">${escHtml(e.notes)}</p></div></div>` : ''}
        ${canEditEmploye() ? `<div id="section-sanctions">${empSanctionsHtml()}</div><div id="section-notes-admin">${empNotesAdminHtml()}</div><div id="section-depart">${empDepartHtml()}</div>` : ''}
      </div>
    </div>`;

  initPageDocUpload();
  initPaieUpload();
}

function empStatsHtml(e) {
  const fullName = `${e.prenom||''} ${e.nom||''}`.trim();
  const stats = [
    { label:'Planning',         icon:'📅', color:'#3b82f6', count:_empPlanningFor(currentEmployeId).length },
    { label:'Journal',          icon:'🕘', color:'#6366f1', count:(DB.get(DB.keys.auditLog)||[]).filter(l=>l.user===fullName||(l.details&&l.details.includes(fullName))).length },
    { label:'Congés',           icon:'🗓', color:'#f59e0b', count:_empCongesFor(currentEmployeId).length },
    { label:'Formations',       icon:'📚', color:'#10b981', count:((JSON.parse(localStorage.getItem(FORM_KEY)||'{}'))[currentEmployeId]||[]).length + _empFormationsAcquises(currentEmployeId).length },
    { label:'Entretiens',       icon:'🗂', color:'#8b5cf6', count:_empEntretiensFor(currentEmployeId).length },
    { label:'Documents',        icon:'📎', color:'#14b8a6', count:_empDocsCache.length },
    { label:'Fiches de paie',   icon:'💰', color:'#0f2b4a', count:_empFichesPaieFor(currentEmployeId).length },
    { label:'Alertes',          icon:'🔔', color:'#ef4444', count:((JSON.parse(localStorage.getItem(ALERTES_KEY)||'{}'))[currentEmployeId]||[]).length },
  ];
  const max = Math.max(...stats.map(s=>s.count), 1);
  const bars = stats.map(s => {
    const w = Math.round((s.count / max) * 100);
    return `<div style="display:flex;align-items:center;gap:.75rem;padding:.35rem 0">
      <div style="width:110px;font-size:.78rem;color:var(--muted);display:flex;align-items:center;gap:.4rem;flex-shrink:0">
        <span>${s.icon}</span><span>${s.label}</span>
      </div>
      <div style="flex:1;background:#f1f5f9;border-radius:99px;height:10px;overflow:hidden">
        <div style="width:${w}%;height:100%;background:${s.color};border-radius:99px;transition:width .4s ease"></div>
      </div>

function empPlanningHtml() {
  const shifts = _empPlanningFor(currentEmployeId);
  const y = empPlanningMonth.getFullYear(), m = empPlanningMonth.getMonth();
  const prefix = `${y}-${String(m+1).padStart(2,'0')}`;
  const monthShifts = shifts.filter(s => s.date && s.date.startsWith(prefix)).sort((a,b) => a.date.localeCompare(b.date) || a.debut.localeCompare(b.debut));
  const totalMin = monthShifts.reduce((sum,s) => sum + peDuration(s.debut, s.fin), 0);
  const monthLabel = empPlanningMonth.toLocaleDateString('fr-FR', { month:'long', year:'numeric' });
  const LIMIT = 5;
  const makeRow = s => {
    const type = peShiftType(s.debut, s.fin);
    const t = PE_TYPES[type];
    const d = new Date(s.date + 'T00:00:00');
    const dayLabel = d.toLocaleDateString('fr-FR', { weekday:'short', day:'2-digit', month:'short' });
    return `<tr>
      <td style="font-weight:600;text-transform:capitalize">${dayLabel}</td>
      <td><span class="badge" style="background:${t.color}22;color:${t.color}">${t.label}</span></td>
      <td>${s.debut} – ${s.fin}</td>
      <td>${peFormatDuration(peDuration(s.debut, s.fin))}</td>
    </tr>`;
  };
  const visible = monthShifts.slice(0, LIMIT);
  const hidden  = monthShifts.slice(LIMIT);
  const extraRows = hidden.length
    ? `<tbody id="planningExtra" style="display:none">${hidden.map(makeRow).join('')}</tbody>
       <tfoot><tr><td colspan="4" style="padding:.6rem 1rem;text-align:center">
         <button class="btn btn-ghost btn-sm" onclick="togglePlanningExtra(this)">Voir ${hidden.length} créneau${hidden.length>1?'x':''} de plus ↓</button>
       </td></tr></tfoot>`
    : '';
  return `<div class="card">
    <div class="card-header" style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem">
      <span class="card-title">📅 Planning</span>
      <div style="display:flex;align-items:center;gap:.5rem">
        <button class="btn btn-icon btn-outline btn-sm" onclick="empPlanningShiftMonth(-1)">‹</button>
        <span style="font-weight:700;font-size:.85rem;text-transform:capitalize;min-width:120px;text-align:center">${monthLabel}</span>
        <button class="btn btn-icon btn-outline btn-sm" onclick="empPlanningShiftMonth(1)">›</button>
      </div>
      <span style="font-size:.8rem;color:var(--muted)">Total : <strong>${peFormatDuration(totalMin)}</strong></span>
    </div>
    <div class="card-body" style="padding:0">
      ${monthShifts.length
        ? `<table class="table"><thead><tr><th>Jour</th><th>Type</th><th>Horaire</th><th>Durée</th></tr></thead><tbody>${visible.map(makeRow).join('')}</tbody>${extraRows}</table>`
        : '<div class="empty" style="padding:2rem;text-align:center"><p>Aucun créneau ce mois-ci.</p></div>'}
    </div>
  </div>`;
}

function togglePlanningExtra(btn) {
  const el = document.getElementById('planningExtra');
  if (!el) return;
  const open = el.style.display !== 'none';
  el.style.display = open ? 'none' : '';
  btn.textContent = open ? `Voir ${el.rows.length} créneau${el.rows.length>1?'x':''} de plus ↓` : 'Réduire ↑';
}

function empPlanningShiftMonth(delta) {

  const joursPris = list.filter(d => d.statut === 'accepte' && new Date(d.debut).getFullYear() === curYear)

      <span style="font-size:1.2rem;margin-top:2px;flex-shrink:0">${d.type === 'maladie' ? '🤒' : d.type === 'enfant_malade' ? '👶' : d.type === 'formation' ? '📚' : '🗓'}</span>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
          <span style="padding:1px 8px;border-radius:99px;font-size:.68rem;font-weight:700;background:${st.bg};color:${st.c}">${st.l}</span>
          <span style="font-size:.7rem;color:var(--g400)">${TYPE_LABELS[d.type]||d.type}</span>
        </div>
        <div style="font-size:.76rem;color:var(--muted);margin-top:.2rem">${formatDate(d.debut)} → ${formatDate(d.fin)} · ${jours} jour${jours>1?'s':''}</div>
        ${d.motif ? `<div style="font-size:.75rem;color:var(--g600);margin-top:.25rem">${escHtml(d.motif)}</div>` : ''}
        ${d.statut === 'refuse' && d.reponseMotif ? `<div style="font-size:.73rem;color:var(--red);margin-top:.15rem">Motif du refus : ${escHtml(d.reponseMotif)}</div>` : ''}
      </div>

  }).join('');
  return `<div class="card" style="margin-bottom:1rem">
    <div class="card-body" style="display:flex;gap:1.5rem;align-items:center;flex-wrap:wrap">
      <div><div style="font-size:.7rem;color:var(--muted);font-weight:700">JOURS PRIS EN ${curYear}</div><div style="font-size:1.6rem;font-weight:800">${joursPris}</div></div>
      <div><div style="font-size:.7rem;color:var(--muted);font-weight:700">EN ATTENTE</div><div style="font-size:1.6rem;font-weight:800">${enAttente}</div></div>
    </div>
  </div>

    <div class="card-body" style="padding:0">${list.length ? rows : '<div class="empty" style="padding:2rem;text-align:center"><p>Aucune demande.</p></div>'}</div>
  </div>`;

async function empAccepterConge(id) {
  const s = Auth.getSession();
  try {
    const saved = await sbUpdateConge(id, {
      statut: 'accepte', reponse_motif: '',
      approuve_par: s ? [s.prenom,s.nom].filter(Boolean).join(' ') || s.username : '',
      approuve_par_id: s ? String(s.userId) : null,
      approuve_at: new Date().toISOString()
    });
    const idx = _empCongesCache.findIndex(x => x.id === id);
    if (idx >= 0) _empCongesCache[idx] = saved;
    const e = getEmploye();
    if (typeof auditLog === 'function') auditLog('conge', `Congé accepté — ${e?.prenom||''} ${e?.nom||''} (${saved.debut} → ${saved.fin})`);

  }
}

      employeId: currentEmployeId, employeNom: `${e?.prenom||''} ${e?.nom||''}`.trim(),
      type, debut, fin, motif, statut: 'en_attente'

function empHeuresHtml(e) {
  const now = new Date();
  const prefix = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
  const allShifts = _empPlanningFor(currentEmployeId).filter(s => s.date && s.date.startsWith(prefix));
  const heuresPlanifiees = allShifts.reduce((sum,s) => sum + _peDurMins(s.debut, s.fin), 0) / 60;
  const heuresContrat = e.heuresContrat ?? 35;
  const daysInMonth = new Date(now.getFullYear(), now.getMonth()+1, 0).getDate();
  let weekdays = 0;
  for (let i=1; i<=daysInMonth; i++) { const d = new Date(now.getFullYear(), now.getMonth(), i).getDay(); if (d>0&&d<6) weekdays++; }
  const heuresTheo = Math.round((heuresContrat / 5) * weekdays);
  const ecart = Math.round((heuresPlanifiees - heuresTheo) * 10) / 10;
  const pct = heuresTheo > 0 ? Math.min(120, Math.round((heuresPlanifiees / heuresTheo) * 100)) : 0;
  const moisNom = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'][now.getMonth()];
  const barColor = pct >= 95 && pct <= 105 ? '#10b981' : pct > 105 ? '#f59e0b' : '#ef4444';
  const ecartColor = Math.abs(ecart) < 2 ? '#10b981' : ecart > 0 ? '#f59e0b' : '#ef4444';
  return `<div class="card">
    <div class="card-header"><span class="card-title">⏱ Heures — ${moisNom}</span></div>
    <div class="card-body" style="display:flex;flex-direction:column;gap:1rem">
      <div style="display:flex;justify-content:space-around;align-items:flex-end;text-align:center">
        <div>
          <div style="font-size:1.8rem;font-weight:800;color:var(--text)">${heuresTheo}h</div>
          <div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">Contractuelles</div>
        </div>
<div>
          <div style="font-size:1.8rem;font-weight:800;color:${barColor}">${Math.round(heuresPlanifiees * 10)/10}h</div>
          <div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">Planifiées</div>
        </div>
        <div>
          <div style="font-size:1.8rem;font-weight:800;color:${ecartColor}">${ecart >= 0 ? '+' : ''}${ecart}h</div>
          <div style="font-size:.68rem;font-weight:700;text-transform:uppercase;letter-spacing:.05em;color:var(--muted)">Écart</div>
        </div>
      </div>
      <div>
        <div style="height:10px;background:var(--border);border-radius:99px;overflow:hidden">
          <div style="height:100%;width:${Math.min(100,pct)}%;background:${barColor};border-radius:99px"></div>
        </div>
        <div style="display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-top:.35rem">
          <span>${allShifts.length} créneau(x) planifié(s)</span>
          <span>${pct}% des heures contractuelles</span>
        </div>
      </div>
    </div>
  </div>`;
}

function empSendMessage() {
  const body = (document.getElementById('empMsgBody')?.value||'').trim();
  if (!body) { toast('Écrivez un message', 'warning'); return; }
  const session = Auth.getSession();
  if (!session) return;
  const myId = String(session.userId);
  const empId = String(currentEmployeId);
  const convKey = [myId, empId].sort().join('_');
  let convs = DB.get('ftr_conversations') || {};
  if (!convs[convKey]) {
    convs[convKey] = { id: convKey, userIds: [myId, empId], createdAt: new Date().toISOString() };
    DB.set('ftr_conversations', convs);
  }
  const msgs = DB.get(DB.keys.messages) || [];
  msgs.push({ id: genId(), convId: convKey, from: myId, body, date: new Date().toISOString(), readBy: [myId] });
  DB.set(DB.keys.messages, msgs);
  if (typeof auditLog === 'function') { const e2 = (DB.get(DB.keys.users)||[]).find(u=>String(u.id)===empId); auditLog('message_interne', (e2?`${e2.prenom||''} ${e2.nom||''}`.trim():'')+''); }
  toast('Message envoyé', 'success');
  const el = document.getElementById('section-messages');
  const emp = (DB.get(DB.keys.users)||[]).find(u => String(u.id) === String(currentEmployeId));
  if (el && emp) el.innerHTML = empMessagesHtml(emp);
}

function initPaieUpload() {
  const input = document.getElementById('paieFileInput');
  if (!input) return;

  const old = document.getElementById('modalPaieName'); if (old) old.remove();

function cancelPaie() {
  pagePayFile = null;
  const inp = document.getElementById('paieFileInput'); if (inp) inp.value = '';
  closeModal('modalPaieName');
}

async function uploadPaie() {
  if (!pagePayFile) { toast('Aucun fichier sélectionné', 'error'); return; }
  const name = document.getElementById('paieNameInput')?.value.trim() || pagePayFile.name;
  const e = getEmploye();
  try {
    const folder = (e && e.profileId) ? e.profileId : Auth.getSession().userId;
    const fichierPath = await sbUploadJustificatif(pagePayFile, folder);
    const saved = await sbSaveFichePaie({
      employeId: String(currentEmployeId),
      employeNom: e ? `${e.prenom||''} ${e.nom||''}`.trim() : '',
      periode: today().slice(0, 7),
      fichierPath, fichierNom: name,
      ajoutePar: (() => { const s = Auth.getSession(); return s ? [s.prenom,s.nom].filter(Boolean).join(' ') || s.username : ''; })()
    });
    _empFichesPaieCache.unshift(saved);
    closeModal('modalPaieName');
    pagePayFile = null;
    toast('Document ajouté ✓', 'success');
    const s = document.getElementById('section-paie');
    if (s) { s.innerHTML = empFichePaieHtml(); initPaieUpload(); }
  } catch (err) { toast('Erreur : ' + (err?.message || err), 'error'); console.error('[uploadPaie]', err); }
}

async function downloadPaie(id) {
  const p = _empFichesPaieCache.find(x => x.id === id);
  if (!p || !p.fichierPath) return;
  const url = await sbJustificatifUrl(p.fichierPath);
  if (url) window.open(url, '_blank'); else toast('Document introuvable', 'error');
}

function deletePaie(id) {
  if (!confirm('Supprimer ce document ?')) return;
  (async () => {
    const p = _empFichesPaieCache.find(x => x.id === id);
    try {
      if (p?.fichierPath) await sbDeleteJustificatif(p.fichierPath);
      await sbDeleteFichePaie(id);
      _empFichesPaieCache = _empFichesPaieCache.filter(x => x.id !== id);
      toast('Document supprimé', 'success');
      const s = document.getElementById('section-paie');
      if (s) { s.innerHTML = empFichePaieHtml(); initPaieUpload(); }
    } catch (err) { toast('Erreur : ' + (err?.message || err), 'error'); console.error('[deletePaie]', err); }
  })();
}

const ARRET_TYPE_L = { maladie:'Arrêt maladie', at:'Accident du travail', maladie_pro:'Maladie professionnelle', maternite:'Congé maternité/paternité', longue_maladie:'Longue maladie', autre:'Autre absence' };

function empArretsHtml() {
  const list = _empArretsFor(currentEmployeId);
  const sorted = list.slice().sort((a,b) => (b.debut||'').localeCompare(a.debut||''));
  function daysBetween(a,b) { if(!a||!b) return 0; return Math.round((new Date(b)-new Date(a))/(86400000))+1; }
  const curYear = new Date().getFullYear();
  const joursAnnee = list.filter(a => (a.debut||'').startsWith(curYear)).reduce((s,a) => s + daysBetween(a.debut, a.fin||a.debut), 0);
  const rows = sorted.map(a => {
    const jours = daysBetween(a.debut, a.fin||a.debut);
    const color = ARRET_TYPE_C[a.type] || '#64748b';
    return `<div style="display:flex;align-items:flex-start;gap:.85rem;padding:.75rem 1rem;border-bottom:1px solid var(--border)">
      <div style="width:3px;border-radius:99px;background:${color};align-self:stretch;flex-shrink:0"></div>

async function empSaveArret() {
  const debut = document.getElementById('arretDateDebut').value;
  const fin   = document.getElementById('arretDateFin').value;
  const type  = document.getElementById('arretType').value;
  const motif = document.getElementById('arretMotif').value.trim();
  if (!debut) { toast('Date de début requise', 'error'); return; }
  const file = document.getElementById('arretFichier')?.files[0];
  if (file && file.size > 5 * 1024 * 1024) { toast('Fichier trop lourd (max 5 Mo)', 'error'); return; }
  const emp = getEmploye();
  const btn = document.getElementById('arretSaveBtn');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Enregistrement…'; }
  try {
    let justificatifPath = '';
    if (file) {
      const folder = (emp && emp.profileId) ? emp.profileId : Auth.getSession().userId;
      justificatifPath = await sbUploadJustificatif(file, folder);
    }
    const saved = await sbSaveAbsence({
      employeId: currentEmployeId,
      employeNom: emp ? `${emp.prenom||''} ${emp.nom||''}`.trim() : '',
      type, debut, fin: fin || '', notes: motif, justificatifPath
    });
    _empArretsCache.unshift(saved);
    if (typeof auditLog === 'function') auditLog('arret_ajout', type+' — '+debut);
    toast('Absence enregistrée', 'success');
    closeModal('modalArret');
    const s = document.getElementById('section-arrets');
    if (s) s.innerHTML = empArretsHtml();
  } catch (e) {
    const msg = e?.message || e?.details || JSON.stringify(e) || 'Erreur inconnue';
    toast('Erreur : ' + msg, 'error');
    console.error('[empSaveArret]', e);
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Enregistrer'; }
  }
}

async function empOpenJustificatif(id) {
  const a = _empArretsCache.find(x => x.id === id);
  if (!a || !a.justificatifPath) return;
  const url = await sbJustificatifUrl(a.justificatifPath);
  if (url) window.open(url, '_blank'); else toast('Justificatif introuvable', 'error');
}

  const expired = list.filter(d => d.dateExpiration && new Date(d.dateExpiration) < now).length;
  const rows = sorted.map(d => {
    const color = TYPE_C[d.type] || '#64748b';
    const hasExp = !!d.dateExpiration;
    const isExp = hasExp && new Date(d.dateExpiration) < now;
    const isSoon = hasExp && !isExp && (new Date(d.dateExpiration)-now) < 60*86400000;
    const expBadge = isExp
      ? `<span style="font-size:.68rem;background:#fee2e2;color:#ef4444;padding:1px 7px;border-radius:99px;font-weight:600">Expiré</span>`
      : isSoon
      ? `<span style="font-size:.68rem;background:#fef3c7;color:#d97706;padding:1px 7px;border-radius:99px;font-weight:600">Expire bientôt</span>`
      : hasExp ? `<span style="font-size:.68rem;background:#dcfce7;color:#16a34a;padding:1px 7px;border-radius:99px;font-weight:600">Valide</span>` : '';
    return `<div style="display:flex;align-items:flex-start;gap:.85rem;padding:.75rem 1rem;border-bottom:1px solid var(--border)">
      <div style="width:36px;height:36px;border-radius:10px;background:${color}18;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0">🎓</div>
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:center;gap:.5rem;flex-wrap:wrap">
          <span style="font-weight:600;font-size:.85rem">${escHtml(d.intitule)}</span>
          ${expBadge}
        </div>
        <div style="font-size:.72rem;color:var(--muted);margin-top:.2rem">
          <span style="background:${color}18;color:${color};padding:1px 7px;border-radius:99px;font-weight:600;font-size:.68rem">${escHtml(TYPE_L[d.type]||d.type)}</span>
          ${d.organisme ? ` · ${escHtml(d.organisme)}` : ''}
          ${d.dateObtention ? ` · Obtenu le ${formatDate(d.dateObtention)}` : ''}
          ${d.dateExpiration ? ` · Expire le ${formatDate(d.dateExpiration)}` : ''}
          ${d.numero ? ` · N° ${escHtml(d.numero)}` : ''}
        </div>
      </div>
      ${canEditEmploye() ? `<button class="btn btn-ghost btn-sm" style="color:var(--red);flex-shrink:0" onclick="empDeleteDiplome('${d.id}')">✕</button>` : ''}
    </div>`;
  }).join('');

  const badge = expired > 0
    ? `<span style="font-size:.72rem;background:#fee2e2;color:#ef4444;padding:1px 8px;border-radius:99px;margin-left:.4rem">${expired} expiré(s)</span>`
    : expiresSoon > 0
    ? `<span style="font-size:.72rem;background:#fef3c7;color:#d97706;padding:1px 8px;border-radius:99px;margin-left:.4rem">${expiresSoon} à renouveler</span>`
    : '';

  return `<div class="card">
    <div class="card-header" style="display:flex;align-items:center;justify-content:space-between">
      <span class="card-title">🎓 Diplômes & habilitations${badge}</span>
      ${canEditEmploye() ? `<button class="btn btn-primary btn-sm admin-only" onclick="empOpenDiplome()">+ Ajouter</button>` : ''}
    </div>
    <div class="card-body" style="padding:0">
      ${sorted.length ? rows : '<div class="empty" style="padding:1.5rem;text-align:center"><p style="color:var(--muted);font-size:.85rem">Aucun diplôme enregistré</p></div>'}
    </div>
  </div>`;
}

function empAlertesHtml() {
  const list=(JSON.parse(localStorage.getItem(ALERTES_KEY)||'{}'))[currentEmployeId]||[];
  const now=Date.now();
  const sorted=list.filter(a=>!a.done).sort((a,b)=>(a.date||'').localeCompare(b.date||''));
  const done=list.filter(a=>a.done);
  const TYPE_L={periode_essai:'Fin de période d\'essai',renouvellement:'Renouvellement de contrat',visite_med:'Visite médicale',formation_exp:'Formation à renouveler',autre:'Autre'};
  const renderRow=(a,isDone)=>{
    const late=!isDone && a.date && new Date(a.date).getTime()<now;
    const soon=!isDone && !late && a.date && (new Date(a.date).getTime()-now)<30*86400000;
    const color=late?'#ef4444':soon?'#f59e0b':'#6366f1';
    return `<div style="display:flex;align-items:center;gap:.75rem;padding:.7rem 1rem;border-bottom:1px solid var(--border);${isDone?'opacity:.5':''}">
      <input type="checkbox" ${isDone?'checked':''} onchange="toggleAlerte('${a.id}')" style="width:16px;height:16px;flex-shrink:0;cursor:pointer"/>
      <div style="flex:1;min-width:0">
        <div style="font-weight:600;font-size:.84rem;${isDone?'text-decoration:line-through':''}">${TYPE_L[a.type]||a.type}</div>
        ${a.note?`<div style="font-size:.75rem;color:var(--muted)">${escHtml(a.note)}</div>`:''}
      </div>
      ${a.date?`<span style="font-size:.72rem;font-weight:700;color:${isDone?'var(--muted)':color};flex-shrink:0">${formatDate(a.date)}</span>`:''}
      <button class="btn btn-ghost btn-sm" style="color:var(--red);flex-shrink:0;padding:0 4px" onclick="deleteAlerte('${a.id}')">✕</button>
    </div>`;
  };
  return `<div class="card">
    <div class="card-header" style="display:flex;align-items:center;justify-content:space-between">
      <span class="card-title">🔔 Rappels & Alertes</span>
      <button class="btn btn-primary btn-sm" onclick="openAlerteModal()">+ Ajouter</button>
    </div>
    <div class="card-body" style="padding:0">
      ${sorted.length?sorted.map(a=>renderRow(a,false)).join(''):''}
      ${!sorted.length&&!done.length?'<div class="empty" style="padding:2rem;text-align:center"><p>Aucun rappel.</p></div>':''}
      ${done.length?`<details style="padding:.5rem 1rem"><summary style="font-size:.75rem;color:var(--muted);cursor:pointer">${done.length} terminé(s)</summary>${done.map(a=>renderRow(a,true)).join('')}</details>`:''}
    </div>
  </div>`;
}

async function savePageEdit() {
  const e = getEmploye();
  if (!e) return;
  const g = id => { const el = document.getElementById(id); return el ? el.value.trim() : ''; };
  const fiche = {
    id: currentEmployeId,
    prenom: e.prenom, nom: e.nom, profileId: e.profileId,
    poste: g('ePoste'), telephone: g('eTel'), email: g('eEmail'),
    dateEmbauche: g('eDateEmbauche'), statut: g('eStatut'),
    color: g('eColor') || '#3b82f6',
    heuresContrat: parseFloat(g('eHeuresContrat')) || 35,
    salaireBase: parseFloat(g('eSalaireBase')) || 0,
    notes: g('eNotes'),
    photo: e.photo || ''
  };
  try {
    const saved = await sbSaveEmploye(fiche);
    const idx = _empCache.findIndex(x => String(x.id) === String(currentEmployeId));
    if (idx >= 0) _empCache[idx] = saved; else _empCache.push(saved);
    toast('Employé mis à jour', 'success');
    pageEditMode = false;
    loadEmploye();
  } catch (err) {
    const msg = err?.message || err?.details || JSON.stringify(err) || 'Erreur inconnue';
    toast('Erreur : ' + msg, 'error');
    console.error('[savePageEdit]', err);
  }
}

function cancelPageEdit() {
  pageEditMode = false;
  loadEmploye();
}

function togglePageEdit() {
  pageEditMode = !pageEditMode;
  loadEmploye();
}

  if (!input) return;
  input.addEventListener('change', async e => {
    const file = e.target.files[0];
    if (!file) return;
    if (file.size > 3 * 1024 * 1024) { toast('Fichier trop lourd (max 3 Mo)', 'error'); return; }
    pageDocFile = file;
    document.getElementById('pageDocPendingName').textContent = file.name;
    document.getElementById('pageDocPendingSize').textContent = fmtSize(file.size);
    document.getElementById('pageDocPending').style.display = 'flex';
  });
}

async function uploadDocFromPage() {
  if (!pageDocFile || !currentEmployeId) return;
  const name = document.getElementById('pageDocName').value.trim() || pageDocFile.name.replace(/\.[^.]+$/, '');
  const docDate = document.getElementById('pageDocDate').value;
  const category = document.getElementById('pageDocCategory').value;
  try {
    const emp = getEmploye();
    const folder = (emp && emp.profileId) ? emp.profileId : Auth.getSession().userId;
    const fichierPath = await sbUploadJustificatif(pageDocFile, folder);
    const saved = await sbSaveDocEmploye({
      employeId: currentEmployeId, name,
      fileName: pageDocFile.name, size: pageDocFile.size, mimeType: pageDocFile.type,
      category, docDate, fichierPath
    });
    _empDocsCache.unshift(saved);
    toast('Document ajouté', 'success');
    pageDocFile = null;
    document.getElementById('pageDocName').value = '';
    document.getElementById('pageDocDate').value = '';
    document.getElementById('pageDocCategory').value = '';
    document.getElementById('pageDocFileInput').value = '';
    document.getElementById('pageDocPending').style.display = 'none';
    loadEmploye();
  } catch (e) { console.error('[uploadDocFromPage]', e); toast('Erreur : ' + (e?.message || e), 'error'); }
}

function cancelPageDoc() {
  pageDocFile = null;
  document.getElementById('pageDocFileInput').value = '';
  document.getElementById('pageDocPending').style.display = 'none';
}

async function downloadEmpDoc(docId) {
  const doc = _empDocsCache.find(d => d.id === docId);
  if (!doc || !doc.fichierPath) return;
  const url = await sbJustificatifUrl(doc.fichierPath);
  if (url) window.open(url, '_blank'); else toast('Document introuvable', 'error');
}

function deleteEmpDoc(docId) {
  if (!confirm('Supprimer ce document ?')) return;
  const doc = _empDocsCache.find(d => d.id === docId);
  (async () => {
    try {
      if (doc?.fichierPath) await sbDeleteJustificatif(doc.fichierPath);
      await sbDeleteDocEmploye(docId);
      _empDocsCache = _empDocsCache.filter(d => d.id !== docId);
      toast('Document supprimé', 'success');
      loadEmploye();
    } catch (e) { console.error('[deleteEmpDoc]', e); toast('Erreur : ' + (e?.message || e), 'error'); }
  })();
}

function initPageTabs() {
  document.querySelectorAll('#employeContent .tab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('#employeContent .tab').forEach(x => x.classList.remove('active'));
      t.classList.add('active');
      document.querySelectorAll('#employeContent > [id^="tab-"]').forEach(x => x.style.display = 'none');
      const tab = document.getElementById('tab-' + t.dataset.tab);
      if (tab) tab.style.display = '';
    });
  });
}

document.addEventListener('DOMContentLoaded', async () => {
  try {
    const _id = new URLSearchParams(window.location.search).get('id');
    [_empCache, _empArretsCache, _empCongesCache, _empPlanningCache, _empFormationsCache, _empEntretiensCache, _empFichesPaieCache, _empDocsCache] = await Promise.all([sbGetEmployes(), sbGetAbsences().catch(() => []), sbGetConges().catch(() => []), sbGetPeShifts().catch(() => []), sbGetFormations().catch(() => []), sbGetEntretiens().catch(() => []), sbGetFichesPaie().catch(() => []), _id ? sbGetDocsEmploye(_id).catch(() => []) : []]);
    loadEmploye();
  } catch (err) {
    console.error('Erreur loadEmploye:', err);
    const el = document.getElementById('employeContent');
    if (el) el.innerHTML = `<div class="empty"><h3>Erreur d'affichage</h3><p style="font-family:monospace;font-size:.78rem;white-space:pre-wrap">${(err && err.message) || err}</p><a href="accueil.html" class="btn btn-accent">← Retour</a></div>`;
  }
});

function generateAttestation() {
  const e = getEmploye();
  if (!e) return;
  const settings = DB.get(DB.keys.settings) || {};
  const etab = settings.etablissement || 'Établissement';
  const ville = settings.ville || '';
  const tel = settings.tel || '';
  const email = settings.email || '';
  const today = new Date();
  const dateStr = today.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
  const dateEmb = e.dateEmbauche
    ? new Date(e.dateEmbauche).toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' })
    : null;
  const statut = e.statut === 'inactif' ? 'inactif' : 'en activité';
  const ref = 'ATT-' + String(e.id).padStart(4,'0') + '-' + today.getFullYear() + String(today.getMonth()+1).padStart(2,'0');

  const html = `<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Attestation d'emploi — ${e.prenom} ${e.nom}</title>
<style>

  .page{width:210mm;min-height:297mm;padding:20mm 22mm;margin:0 auto;position:relative}
  .header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12mm;padding-bottom:6mm;border-bottom:2px solid #0f2b4a}
  .etab-name{font-size:18px;font-weight:800;color:#0f2b4a;line-height:1.2}
  .etab-info{font-size:11px;color:#64748b;margin-top:4px;line-height:1.6}
  .ref{font-size:10px;color:#94a3b8;text-align:right;line-height:1.8}
  .title-block{text-align:center;margin:10mm 0 12mm}
  .title-block h1{font-size:22px;font-weight:800;color:#0f2b4a;text-transform:uppercase;letter-spacing:.08em}
  .title-block p{font-size:11px;color:#94a3b8;margin-top:4px}
  .intro{font-size:13px;line-height:1.9;margin-bottom:8mm}
  .highlight{font-weight:700;color:#0f2b4a}
  .body-text{font-size:13px;line-height:2;margin-bottom:6mm}
  .info-box{background:#f8fafc;border-left:3px solid #0f2b4a;border-radius:4px;padding:10px 16px;margin:8mm 0;display:grid;grid-template-columns:160px 1fr;gap:6px 0;font-size:12.5px}
  .info-box .label{color:#64748b;font-weight:600}
  .info-box .value{font-weight:700;color:#0f2b4a}
  .usage{font-size:11.5px;color:#64748b;line-height:1.8;margin:8mm 0;font-style:italic}
  .signature-block{margin-top:14mm;display:flex;justify-content:flex-end}
  .signature-inner{text-align:center;width:200px}
  .sig-city{font-size:12px;color:#1a1a2e;margin-bottom:2px}
  .sig-date{font-size:12px;font-weight:700;color:#1a1a2e;margin-bottom:10mm}
  .sig-line{border-top:1px solid #0f2b4a;padding-top:6px;font-size:11px;color:#64748b}
  .footer{position:absolute;bottom:12mm;left:22mm;right:22mm;border-top:1px solid #e2e8f0;padding-top:4mm;display:flex;justify-content:space-between;font-size:9.5px;color:#94a3b8}
  @media print{body{-webkit-print-color-adjust:exact;print-color-adjust:exact}.no-print{display:none}}
</style>
</head>
<body>
<div class="no-print" style="background:#1e293b;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;font-family:sans-serif;font-size:13px">
  <span>📄 Attestation d'emploi — ${e.prenom} ${e.nom}</span>
  <button onclick="window.print()" style="background:#6366f1;color:#fff;border:none;padding:7px 18px;border-radius:8px;font-weight:700;cursor:pointer;font-size:13px">🖨 Imprimer / Enregistrer PDF</button>
</div>
<div class="page">
  <div class="header">
    <div>
      <div class="etab-name">${etab}</div>
      <div class="etab-info">${ville ? ville + '<br>' : ''}${tel ? '📞 ' + tel + '   ' : ''}${email ? '✉ ' + email : ''}</div>
    </div>
    <div class="ref">
      <div>Réf. : <strong>${ref}</strong></div>
      <div>Date : ${dateStr}</div>
    </div>
  </div>

  <div class="title-block">
    <h1>Attestation d'emploi</h1>
    <p>Document officiel — à conserver</p>
  </div>

  <div class="intro">
    Je soussigné(e), représentant(e) légal(e) de l'établissement <span class="highlight">${etab}</span>${ville ? ', situé à <span class="highlight">' + ville + '</span>' : ''}, atteste par la présente que :
  </div>

  <div class="info-box">
    <span class="label">Nom et prénom</span><span class="value">${e.nom.toUpperCase()} ${e.prenom}</span>
    <span class="label">Poste occupé</span><span class="value">${e.poste || 'Non renseigné'}</span>
    ${dateEmb ? '<span class="label">Date d\'embauche</span><span class="value">' + dateEmb + '</span>' : ''}
    <span class="label">Situation actuelle</span><span class="value">${statut.charAt(0).toUpperCase() + statut.slice(1)}</span>
    ${e.heuresContrat ? '<span class="label">Contrat</span><span class="value">' + e.heuresContrat + ' heures / semaine</span>' : ''}
  </div>

  <div class="body-text">
    ${dateEmb
      ? `Cette personne est employée au sein de notre établissement depuis le <span class="highlight">${dateEmb}</span> en qualité de <span class="highlight">${e.poste || 'collaborateur(trice)'}</span>, et est actuellement <span class="highlight">${statut}</span>.`
      : `Cette personne est employée au sein de notre établissement en qualité de <span class="highlight">${e.poste || 'collaborateur(trice)'}</span>, et est actuellement <span class="highlight">${statut}</span>.`
    }
  </div>

  <div class="usage">
    Cette attestation est délivrée à l'intéressé(e) pour faire valoir ce que de droit, notamment auprès des organismes financiers, bailleurs et administrations.
  </div>

  <div class="signature-block">
    <div class="signature-inner">
      <div class="sig-city">Fait à ${ville || '_________________'}</div>
      <div class="sig-date">le ${dateStr}</div>

    </div>
  </div>

  <div class="footer">
    <span>${etab} — Attestation d'emploi</span>
    <span>Réf. ${ref}</span>

  </div>
</div>
</body>
</html>`;

  const win = window.open('', '_blank');
  if (win) { win.document.write(html); win.document.close(); }
}
</script>
