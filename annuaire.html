<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Annuaire — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info"><div class="header-title">Annuaire</div></div>
    <div class="header-right"><button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button></div>
  </header>
  <main class="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
      <div>
        <div style="font-weight:700;font-size:1rem">📒 Annuaire du personnel</div>
        <div style="font-size:.78rem;color:var(--muted)">Coordonnées de l'équipe</div>
      </div>
      <div style="display:flex;gap:.5rem;align-items:center;flex-wrap:wrap">
        <input type="search" id="anSearch" class="form-input" style="width:240px" placeholder="Rechercher un collègue, un poste…" oninput="renderAnnuaire()"/>
        <span id="anCount" style="font-size:.78rem;color:var(--muted)"></span>
      </div>
    </div>

    <div id="anList"></div>
  </main>
</div></div>
<div id="toast-container" class="toast-container"></div>

<script src="js/app.js"></script>
<script src="js/annuaire.js"></script>
<script>Auth.requireAuth(); if (!requireModule('access_annuaire')) { document.querySelector('.content').innerHTML = ''; }</script>
</body></html>
