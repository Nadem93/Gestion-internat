<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><link rel="manifest" href="manifest.json"/><link rel="apple-touch-icon" href="icon-192.png"/><meta name="theme-color" content="#0f2b4a"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Avenants — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
/* Champs plats (sans effet de profondeur) sur la page de rédaction de l'avenant */
input, select, textarea {
  background: #fff;
  box-shadow: none;
  border: 1px solid rgba(15,43,74,.15);
}
input:focus, select:focus, textarea:focus {
  box-shadow: 0 0 0 3px rgba(15,43,74,.12);
  border-color: var(--primary);
}
.section-card {
  border:1px solid #AFA9EC;
  border-radius:var(--r);
  background:#EEEDFE;
  margin-bottom:1rem;
  overflow:hidden;
}
.section-card .section-header {
  padding:.75rem 1rem;
  font-weight:600;
  font-size:.85rem;
  cursor:pointer;
  display:flex;
  align-items:center;
  gap:.5rem;
  user-select:none;
  background:#3C3489;
  color:#EEEDFE;
  border-bottom:1px solid #534AB7;
}
.section-card .section-body {
  padding:1rem;
  display:flex;
  flex-direction:column;
  gap:.75rem;
  background:#EEEDFE;
  border-left:3px solid #7F77DD;
  color:#26215C;
}
.section-card .section-header:hover { background:#534AB7; }
.obj-row {
  display:grid;
  grid-template-columns:1fr 1fr 120px 1fr;
  gap:.5rem;
  padding:.5rem;
  background:#fff;
  border:0.5px solid #CECBF6;
  border-radius:6px;
  align-items:start;
}
.section-card .section-header .muted-count { color:#CECBF6!important; }
.section-card .section-body label { color:#534AB7!important; }
.obj-row > div { font-size:.8rem; }
.obj-row > div label { display:block;font-size:.68rem;color:var(--muted);margin-bottom:2px; }
@media(max-width:768px){.obj-row{grid-template-columns:1fr 1fr;}}
.avenant-print {
  max-width:800px;
  margin:0 auto;
  font-family:'Inter',sans-serif;
  line-height:1.6;
}
/* ── Cartes avenants ── */
.av-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1.25rem;max-width:1300px;margin:0 auto}
@media(max-width:1100px){.av-grid{grid-template-columns:repeat(3,1fr)}}
@media(max-width:768px){.av-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:480px){.av-grid{grid-template-columns:1fr}}
.av-card{background:#fff;border-radius:18px;overflow:hidden;box-shadow:0 4px 16px rgba(15,43,74,.10);border:1px solid rgba(15,43,74,.08);transition:transform .18s,box-shadow .18s;cursor:pointer}
.av-card:hover{transform:translateY(-3px);box-shadow:0 8px 28px rgba(15,43,74,.16)}
.av-card-head{background:linear-gradient(135deg,#0f2b4a 0%,#1786cf 100%);padding:1.4rem 1.2rem .9rem;position:relative;overflow:hidden}
.av-card-head::before,.av-card-head::after{content:'';position:absolute;border-radius:50%;background:rgba(255,255,255,.08)}
.av-card-head::before{width:140px;height:140px;bottom:-40px;right:-30px}
.av-card-head::after{width:80px;height:80px;top:-20px;left:40%}
.av-card-avatar{width:82px;height:82px;border-radius:50%;background:rgba(255,255,255,.22);border:3px solid rgba(255,255,255,.6);display:flex;align-items:center;justify-content:center;font-size:1.7rem;font-weight:800;color:#fff;margin-bottom:.7rem;letter-spacing:-.02em}
.av-card-name{font-size:1rem;font-weight:700;color:#fff;line-height:1.2;margin-bottom:.25rem}
.av-card-statut{display:inline-flex;align-items:center;gap:.3rem;font-size:.68rem;font-weight:700;padding:.2rem .55rem;border-radius:999px;backdrop-filter:blur(4px)}
.av-card-statut.brouillon{background:rgba(245,158,11,.22);color:#fcd34d}
.av-card-statut.actif{background:rgba(34,197,94,.22);color:#86efac}
.av-card-statut.termine{background:rgba(148,163,184,.22);color:#cbd5e1}
.av-card-body{padding:1rem 1.2rem}
.av-card-row{display:flex;align-items:flex-start;gap:.55rem;padding:.35rem 0;border-bottom:1px solid #f1f5f9}
.av-card-row:last-child{border-bottom:none}
.av-card-row .av-icon{font-size:.85rem;width:18px;flex-shrink:0;margin-top:1px}
.av-card-row .av-label{font-size:.7rem;color:var(--muted);font-weight:600;min-width:72px;flex-shrink:0}
.av-card-row .av-val{font-size:.78rem;color:var(--text);font-weight:500;flex:1}
.av-card-footer{padding:.75rem 1.2rem;background:#f8fafc;display:flex;gap:.5rem;border-top:1px solid #e2e8f0}
.av-card-footer .btn{flex:1;justify-content:center;font-size:.72rem}
.avenant-print h1 { font-size:1.5rem;text-align:center; }
.avenant-print h2 { font-size:1rem;margin-top:1.5rem;border-bottom:1px solid #ccc;padding-bottom:.3rem; }
.avenant-print table { width:100%;border-collapse:collapse;font-size:.8rem; }
.avenant-print td, .avenant-print th { border:1px solid #ccc;padding:6px 8px;vertical-align:top; }
.avenant-print .signatures { display:flex;justify-content:space-between;margin-top:2rem; }
.avenant-print .signatures > div { text-align:center; }
</style>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Avenants</div></div>
      <div class="header-right">
        <button class="btn btn-accent btn-sm btn-add-resident" onclick="openModal('modalAvenant')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg><span class="btn-add-label">Nouvel avenant</span></button>
      </div>
    </header>

    <main class="content">
      <div class="toolbar" style="margin-bottom:1.5rem;justify-content:center;max-width:760px;margin-left:auto;margin-right:auto">
        <div class="search-box">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchAvenant" placeholder="Rechercher un résident…"/>
        </div>
        <select id="filterResidentAvenant" style="display:none"><option value="">Tous les résidents</option></select>
        <select id="filterStatutAvenant" style="width:auto">
          <option value="">Tous les statuts</option>
          <option value="brouillon">Brouillon</option>
          <option value="actif">Actif</option>
          <option value="termine">Terminé</option>
        </select>
      </div>
      <div id="avenantList"></div>
    </main>
  </div>
</div>

<!-- MODAL INFOS GÉNÉRALES -->
<div class="modal-overlay" id="modalAvenant">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3 id="modalAvenantTitle">Nouvel avenant</h3>
      <button class="modal-close" onclick="closeModal('modalAvenant')">&times;</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:.85rem">
      <input type="hidden" id="avenantEditId"/>
      <div class="form-group">
        <label>Résident *</label>
        <select id="fAvResident"></select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group">
          <label>Date de rédaction</label>
          <input type="date" id="fAvDateRedac"/>
        </div>
        <div class="form-group">
          <label>Prochaine révision</label>
          <input type="date" id="fAvRevision"/>
        </div>
      </div>
      <div class="form-group">
        <label>Référent éducatif</label>
        <input type="text" id="fAvReferent" placeholder="Nom du référent"/>
      </div>
      <div class="form-group">
        <label>Mesure de protection</label>
        <input type="text" id="fAvProtection" placeholder="Ex : Tutelle, Curatelle…"/>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:.75rem">
        <div class="form-group">
          <label>Établissement employeur</label>
          <input type="text" id="fAvEmployeur"/>
        </div>
        <div class="form-group">
          <label>Atelier</label>
          <input type="text" id="fAvAtelier"/>
        </div>
        <div class="form-group">
          <label>Date d'entrée ESAT</label>
          <input type="date" id="fAvEntreeEsat"/>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalAvenant')">Annuler</button>
      <button class="btn btn-accent" onclick="genererAvenantFromJournal()" style="gap:.35rem"><span>🤖</span> Générer depuis le journal</button>
      <button class="btn btn-primary" onclick="saveAvenant()">Enregistrer</button>
    </div>
  </div>
</div>

<!-- COMPARAISON D'AVENANTS -->
<div class="modal-overlay" id="modalCompare">
  <div class="modal" style="max-width:1000px">
    <div class="modal-header">
      <h3>⇄ Comparaison d'avenants</h3>
      <button class="modal-close" onclick="closeModal('modalCompare')">&times;</button>
    </div>
    <div class="modal-body" id="compareBody"></div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/ppe-supabase.js"></script>
<script src="js/ppe.js"></script>
</body>
</html>
