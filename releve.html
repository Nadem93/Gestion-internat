<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><link rel="manifest" href="manifest.json"/><meta name="theme-color" content="#0f2b4a"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Relève d'équipe — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .rel-layout{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;align-items:start}
    @media(max-width:900px){.rel-layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Relève d'équipe</div></div>
      <div class="header-right">
        <a href="journal.html" class="btn btn-outline btn-sm">📔 Journal de bord</a>
        <a href="accueil.html" class="btn btn-ghost btn-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Accueil
        </a>
      </div>
    </header>

    <main class="content" style="max-width:1200px">
      <div class="rel-layout">
        <!-- SYNTHÈSE AUTOMATIQUE -->
        <div class="card">
          <div class="card-header">
            <span class="card-title">🔄 Synthèse depuis la dernière relève</span>
          </div>
          <div class="card-body" id="relDigest" style="padding:1.1rem 1.25rem"></div>
        </div>

        <!-- TRANSMISSION -->
        <div style="display:flex;flex-direction:column;gap:1.25rem">
          <div class="card">
            <div class="card-header">
              <span class="card-title">✍️ Ma transmission</span>
              <button class="btn btn-ghost btn-sm" style="margin-left:auto" onclick="relPrefill()" title="Pré-remplir depuis la synthèse">⚡ Pré-remplir</button>
            </div>
            <div class="card-body" style="display:flex;flex-direction:column;gap:.75rem">
              <div class="form-group">
                <label>Équipe</label>
                <select id="relEquipe" style="max-width:220px">
                  <option value="matin">🌅 Matin</option>
                  <option value="apresmidi">🌇 Après-midi</option>
                  <option value="nuit">🌙 Nuit</option>
                </select>
              </div>
              <div class="form-group">
                <label>Points de vigilance & consignes pour l'équipe suivante</label>
                <textarea id="relContenu" rows="7" placeholder="Ce que l'équipe entrante doit savoir : état des résidents, consignes, tâches à reprendre…"></textarea>
              </div>
              <div style="text-align:right">
                <button class="btn btn-primary" onclick="relSave()">📤 Transmettre la relève</button>
              </div>
            </div>
          </div>

          <div>
            <div class="section-label">📥 Transmissions précédentes</div>
            <div id="relList" style="display:flex;flex-direction:column;gap:.6rem"></div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/releve.js"></script>
</body>
</html>
