<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Plan de soins — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
.ps-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem}
.ps-stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.65rem .85rem;text-align:center}
.ps-stat-num{font-size:1.5rem;font-weight:800;line-height:1;color:var(--primary)}
.ps-stat-lbl{font-size:.7rem;color:var(--muted);margin-top:3px}
.ps-toolbar{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:1.25rem}
.ps-toolbar select{font-size:.8rem;padding:.35rem .6rem;border:1px solid var(--border);border-radius:8px;background:#fff}
@media(max-width:600px){.ps-stats{grid-template-columns:repeat(2,1fr)}.ps-toolbar{flex-direction:column;align-items:stretch}}
</style>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info">
      <div class="header-title">🩺 Plan de soins</div>
    </div>
    <div class="header-right">
      <button class="btn btn-accent btn-sm" onclick="openPsModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nouveau soin
      </button>
    </div>
  </header>

  <main class="content">
    <div style="max-width:960px;margin:0 auto">

      <!-- Stats -->
      <div class="ps-stats">
        <div class="ps-stat"><div class="ps-stat-num" id="psStatTotal">—</div><div class="ps-stat-lbl">Soins définis</div></div>
        <div class="ps-stat"><div class="ps-stat-num" id="psStatActifs" style="color:#10b981">—</div><div class="ps-stat-lbl">Actifs</div></div>
        <div class="ps-stat"><div class="ps-stat-num" id="psStatResidents" style="color:#8b5cf6">—</div><div class="ps-stat-lbl">Résidents</div></div>
      </div>

      <!-- Filtres -->
      <div class="ps-toolbar">
        <select id="psResident">
          <option value="">Tous les résidents</option>
        </select>
        <select id="psFilterCat">
          <option value="">Toutes les catégories</option>
          <option value="hygiene">🚿 Hygiène corporelle</option>
          <option value="medication">💊 Médicaments</option>
          <option value="mobilite">🦽 Mobilité & posture</option>
          <option value="alimentation">🍽️ Alimentation & repas</option>
          <option value="soins_infirm">🩺 Soins infirmiers</option>
          <option value="psy">🧠 Accompagnement psy</option>
          <option value="social">🤝 Accompagnement social</option>
          <option value="autre">📋 Autre</option>
        </select>
      </div>

      <!-- Contenu -->
      <div id="psList"></div>
    </div>
  </main>
</div></div>

<!-- MODAL NOUVEAU / MODIFIER SOIN -->
<div class="modal-overlay" id="modalPlanSoins">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3 id="psModalTitle">Nouveau soin</h3>
      <button class="modal-close" onclick="closeModal('modalPlanSoins')">&times;</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:.85rem">
      <input type="hidden" id="psModalId"/>

      <div class="form-group">
        <label>Résident concerné</label>
        <select id="psModalResident">
          <option value="">— Choisir un résident —</option>
        </select>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group">
          <label>Catégorie *</label>
          <select id="psModalCat">
            <option value="hygiene">🚿 Hygiène corporelle</option>
            <option value="medication">💊 Médicaments</option>
            <option value="mobilite">🦽 Mobilité & posture</option>
            <option value="alimentation">🍽️ Alimentation & repas</option>
            <option value="soins_infirm">🩺 Soins infirmiers</option>
            <option value="psy">🧠 Accompagnement psy</option>
            <option value="social">🤝 Accompagnement social</option>
            <option value="autre">📋 Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label>Fréquence *</label>
          <select id="psModalFreq">
            <option value="quotidien">Quotidien</option>
            <option value="matin">Matin</option>
            <option value="midi">Midi</option>
            <option value="soir">Soir</option>
            <option value="nuit">Nuit</option>
            <option value="semaine">Hebdomadaire</option>
            <option value="mensuel">Mensuel</option>
            <option value="si_besoin">Si besoin</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Libellé du soin *</label>
        <input type="text" id="psModalLibelle" placeholder="Ex : Aide à la douche complète, Vérification glycémie…"/>
      </div>

      <div class="form-group">
        <label>Détail / modalités</label>
        <input type="text" id="psModalDetail" placeholder="Ex : avec chaise de douche, côté droit, 15 min environ"/>
      </div>

      <div class="form-group">
        <label>Intervenant(s)</label>
        <input type="text" id="psModalIntervenant" placeholder="Ex : AS, IDE, Éducateur spécialisé…"/>
      </div>

      <div class="form-group">
        <label>Note / observation</label>
        <textarea id="psModalNote" rows="2" placeholder="Informations complémentaires, précautions…" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalPlanSoins')">Annuler</button>
      <button class="btn btn-primary" onclick="savePlanSoins()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/plan-soins-supabase.js"></script>
<script src="js/plan-soins.js"></script>
</body>
</html>
