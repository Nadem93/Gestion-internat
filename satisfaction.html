<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Satisfaction résidents — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
.sat-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem}
.sat-stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.65rem .85rem;text-align:center}
.sat-stat-num{font-size:1.5rem;font-weight:800;line-height:1;color:var(--text)}
.sat-stat-lbl{font-size:.7rem;color:var(--muted);margin-top:3px}
.sat-tabs{display:flex;gap:.4rem;margin-bottom:1.25rem}
.sat-tab{font-size:.8rem;padding:.4rem .85rem;border-radius:8px;border:1px solid var(--border);background:#fff;cursor:pointer;font-family:inherit;color:var(--muted);transition:all .15s}
.sat-tab:hover{background:var(--g50)}
.sat-tab.active{background:var(--text);color:#fff;border-color:var(--text)}
#modalSat .modal-header{background:#fff;border-bottom-color:var(--border)}
#modalSat h3,#modalSat .modal-title{color:var(--text)}
#modalSat .modal-body{background:#fff}
#modalSat .modal-footer{background:#fff;border-top-color:var(--border)}
#modalSat input,#modalSat select,#modalSat textarea{border-color:var(--border);background:#fff;color:var(--text)}
#modalSat input:focus,#modalSat select:focus,#modalSat textarea:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(var(--accent-rgb),.12)}
#modalSat .modal{border-color:var(--border)}
</style>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info">
      <div class="header-title">⭐ Satisfaction résidents</div>
    </div>
    <div class="header-right">
      <button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button>
      <button class="btn btn-accent btn-sm" onclick="openSatModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Nouveau questionnaire
      </button>
    </div>
  </header>

  <main class="content">
    <div style="max-width:780px;margin:0 auto">

      <div class="sat-stats">
        <div class="sat-stat"><div class="sat-stat-num" id="satStatTotal">—</div><div class="sat-stat-lbl">Questionnaires</div></div>
        <div class="sat-stat"><div class="sat-stat-num" id="satStatMois" style="color:var(--muted)">—</div><div class="sat-stat-lbl">Ce mois-ci</div></div>
        <div class="sat-stat"><div class="sat-stat-num" id="satStatScore" style="color:var(--accent)">—</div><div class="sat-stat-lbl">Score de satisfaction</div></div>
      </div>

      <div class="sat-tabs">
        <button class="sat-tab active" id="satTabResultats">📊 Résultats</button>
        <button class="sat-tab" id="satTabFormulaires">📋 Questionnaires</button>
        <button class="sat-tab" id="satTabQuestions" style="display:none">⚙ Questions</button>
      </div>

      <div id="satContent"></div>

    </div>
  </main>
</div></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalSat">
  <div class="modal" style="max-width:580px;max-height:92vh;display:flex;flex-direction:column">
    <div class="modal-header">
      <h3 id="satModalTitle">Nouveau questionnaire</h3>
      <button class="modal-close" onclick="closeModal('modalSat')">&times;</button>
    </div>
    <div class="modal-body" style="flex:1;overflow-y:auto;display:flex;flex-direction:column;gap:.85rem">

      <div class="form-group">
        <label>Résident concerné</label>
        <select id="satModalResidentId" style="width:100%">
          <option value="">— Non spécifié —</option>
        </select>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group">
          <label>Répondant (résident / famille)</label>
          <input type="text" id="satModalRepondant" placeholder="Prénom Nom ou Anonyme"/>
        </div>
        <div class="form-group">
          <label>Lien avec le résident</label>
          <input type="text" id="satModalLien" placeholder="Ex : famille, résident lui-même…"/>
        </div>
      </div>

      <div class="form-group">
        <label>Date *</label>
        <input type="date" id="satModalDate"/>
      </div>

      <!-- Questions générées dynamiquement -->
      <div id="satModalQuestions"></div>

      <div class="form-group">
        <label>Commentaire libre</label>
        <textarea id="satModalCommentaire" rows="3" placeholder="Remarques, suggestions d'amélioration…" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalSat')">Annuler</button>
      <button class="btn btn-primary" onclick="saveSatisfaction()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/satisfaction-supabase.js"></script>
<script src="js/satisfaction.js"></script>
</body>
</html>
