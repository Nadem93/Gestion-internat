<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>SERAFIN-PH — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    @media print {
      * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; box-sizing: border-box !important; }
      @page { margin: 1.5cm 1.2cm; size: A4; }

      .header, #toast-container, .no-print, .btn, .tab, .tabs { display: none !important; }

      html, body { height: auto !important; overflow: visible !important; background: #fff !important; margin: 0 !important; font-size: 10pt !important; }
      .app-layout, .main { display: block !important; height: auto !important; overflow: visible !important; }
      .content { display: block !important; height: auto !important; overflow: visible !important; padding: 0 !important; max-width: 100% !important; width: 100% !important; margin: 0 !important; flex: none !important; }

      .grid-4 { grid-template-columns: repeat(4, 1fr) !important; gap: .5rem !important; }

      .card { box-shadow: none !important; background: #fff !important; border: 1px solid #e2e8f0 !important; break-inside: avoid; margin-bottom: .5rem !important; }
      .card-body { padding: .6rem .85rem !important; }
      .card-header { padding: .5rem .85rem !important; background: #f8fafc !important; border-bottom: 1px solid #e2e8f0 !important; }
      .card-title { font-size: .75rem !important; }
      .stat-card { box-shadow: none !important; break-inside: avoid; }

      #printHeader { display: block !important; }
      #spResidentsBody { display: block !important; }

      h1, h2, h3 { font-size: 11pt !important; }
      p, div, span, td, th { font-size: 9pt !important; line-height: 1.4 !important; }
    }

    #printHeader {
      display: none;
      border-bottom: 3px solid #0f2b4a;
      padding-bottom: .5cm;
      margin-bottom: .5cm;
    }
    #printHeader .ph-etab { font-size: 9pt; color: #64748b; }
    #printHeader .ph-title { font-size: 16pt; font-weight: 800; color: #0f2b4a; margin: 2px 0; }
    #printHeader .ph-meta { font-size: 8pt; color: #94a3b8; }
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">SERAFIN-PH</div></div>
      <div class="header-right">
        <button class="btn btn-ghost btn-sm" onclick="printSerafinph()" title="Télécharger / Imprimer le rapport">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          <span class="btn-add-label"> Télécharger</span>
        </button>
      </div>
    </header>
    <div id="printHeader">
      <div class="ph-etab" id="phEtab"></div>
      <div class="ph-title" id="phTitle">Rapport SERAFIN-PH</div>
      <div class="ph-meta" id="phMeta"></div>
    </div>
    <main class="content" id="spContent">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem">
        <div>
          <div style="font-weight:700;font-size:1rem">📊 SERAFIN-PH</div>
          <div style="font-size:.78rem;color:var(--muted)">Indicateurs tarifaires — Prestations directes et indirectes</div>
        </div>
      </div>
      <div class="grid grid-4" style="margin-bottom:1rem">
        <div class="stat-card" style="background:linear-gradient(135deg,#8b5cf625,#a78bfa15)"><div class="stat-card-top"><span class="stat-label">GMPS Moyen</span><div class="stat-icon blue"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M2 12h20"/></svg></div></div><div class="stat-num" id="spStatGmps">—</div></div>
        <div class="stat-card" style="background:linear-gradient(135deg,#16a34a25,#34d39915)"><div class="stat-card-top"><span class="stat-label">Score total</span><div class="stat-icon green"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/></svg></div></div><div class="stat-num" id="spStatTotal">—</div></div>
        <div class="stat-card" style="background:linear-gradient(135deg,#f9731625,#fb923c15)"><div class="stat-card-top"><span class="stat-label">Résidents évalués</span><div class="stat-icon orange"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></div></div><div class="stat-num" id="spStatEvalues">—</div></div>
        <div class="stat-card" style="background:linear-gradient(135deg,#ef444425,#fca5a515)"><div class="stat-card-top"><span class="stat-label">Besoins élevés (≥3)</span><div class="stat-icon red"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg></div></div><div class="stat-num" id="spStatEleves">—</div></div>
      </div>
      <div class="card" style="margin-bottom:1rem">
        <div class="card-header"><span class="card-title">📋 Entrées journal liées</span></div>
        <div class="card-body" id="spJournalStats"><div style="font-size:.75rem;color:var(--muted);padding:.75rem 1.25rem">Chargement…</div></div>
      </div>

      <div class="card" style="margin-bottom:1rem">
        <div class="card-header"><span class="card-title">Vue par prestation</span></div>
        <div class="card-body" style="padding:0"><div id="spPrestationsList"></div></div>
      </div>
      <div class="card">
        <div class="card-header" style="cursor:pointer" onclick="toggleSpResidentsCard()">
          <span class="card-title">Détail par résident</span>
          <div style="display:flex;gap:.35rem;align-items:center;font-size:.65rem" id="spResidentsLegend">
            <span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;background:#d1d5db;color:#fff;font-weight:700;font-size:.55rem">0</span><span style="color:var(--muted)">Nul</span>
            <span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;background:#22c55e;color:#fff;font-weight:700;font-size:.55rem">1</span><span style="color:var(--muted)">Faible</span>
            <span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;background:#eab308;color:#fff;font-weight:700;font-size:.55rem">2</span><span style="color:var(--muted)">Modéré</span>
            <span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;background:#f97316;color:#fff;font-weight:700;font-size:.55rem">3</span><span style="color:var(--muted)">Important</span>
            <span style="display:inline-flex;align-items:center;justify-content:center;width:14px;height:14px;border-radius:3px;background:#ef4444;color:#fff;font-weight:700;font-size:.55rem">4</span><span style="color:var(--muted)">Très important</span>
          </div>
          <button class="btn btn-ghost btn-sm" id="spResidentsToggle" style="margin-left:.5rem" onclick="event.stopPropagation();toggleSpResidentsCard()">▸</button>
        </div>
        <div class="card-body" id="spResidentsBody" style="padding:0;display:none"><div id="spResidentsList"></div></div>
      </div>
      <script>
        function toggleSpResidentsCard() {
          const body = document.getElementById('spResidentsBody');
          const btn = document.getElementById('spResidentsToggle');
          const open = body.style.display !== 'none';
          body.style.display = open ? 'none' : '';
          btn.textContent = open ? '▸' : '▾';
        }
      </script>
    </main>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/serafinph.js"></script>
<script>
  Auth.requireAuth();
  if (!requireModule('access_serafinph')) {
    document.getElementById('spContent').innerHTML = '<div class="empty" style="padding:3rem;text-align:center"><div style="font-size:2rem;margin-bottom:.75rem">🔒</div><h3>Accès refusé</h3><p>Vous n\'avez pas la permission d\'accéder à ce module.</p><a href="accueil.html" class="btn btn-accent" style="margin-top:1rem">Retour à l\'accueil</a></div>';
  }
</script>
</body>
</html>
