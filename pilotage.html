<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Portail — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    html,body{margin:0;height:100%}
    .rh-layout{display:flex;height:calc(100vh - var(--header-h));overflow:hidden;background:#d8f1ea}
    .rh-sidebar{width:max-content;max-width:226px;flex-shrink:0;background:#e9f7f3;border-right:1px solid #c7ebe1;color:#475569;height:100%;overflow-y:auto;overflow-x:hidden;display:flex;flex-direction:column;align-items:stretch;padding:1rem .5rem;transition:width .2s}
    .rh-sidebar.collapsed{width:78px;align-items:center}
    .rh-sidebar-top{display:flex;align-items:center;gap:.5rem;margin-bottom:1.1rem;width:100%}
    .rh-sidebar-logo{display:flex;align-items:center;gap:.5rem;flex:1;min-width:0;overflow:hidden;cursor:pointer;border-radius:9px;padding:.15rem}
    .rh-sidebar-logo:hover{background:#d8f1ea}
    .rh-sidebar-logo .rh-logo-badge{width:38px;height:38px;border-radius:11px;background:#4f46e5;border:none;color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;box-shadow:0 3px 10px rgba(79,70,229,.35)}
    .rh-sidebar-logo .rh-logo-badge svg{width:18px;height:18px}
    .rh-sidebar-logo .rh-logo-text{white-space:nowrap;min-width:0}
    .rh-sidebar-logo h1{font-size:.85rem;font-weight:800;letter-spacing:-.2px;white-space:nowrap;color:#1e293b}
    .rh-sidebar-logo p{font-size:.62rem;color:#94a3b8;margin-top:.1rem;white-space:nowrap}
    .rh-collapse-btn{width:30px;height:30px;border-radius:9px;border:1px solid #e5e7eb;background:#fff;color:#64748b;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
    .rh-collapse-btn:hover{background:#eef2ff;color:#4f46e5}
    .rh-collapse-btn svg{width:14px;height:14px;transition:transform .2s}
    .rh-sidebar.collapsed .rh-collapse-btn svg{transform:scaleX(-1)}
    .rh-nav-label{font-size:.6rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:#94a3b8;padding:.6rem .6rem .3rem;white-space:nowrap;overflow:hidden}
    .rh-nav-link{display:flex;align-items:center;gap:.65rem;padding:.5rem .6rem;color:#475569;text-decoration:none;font-size:.82rem;font-weight:500;transition:all .12s;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:inherit;border-radius:9px;margin-bottom:2px;white-space:nowrap;overflow:hidden}
    .rh-nav-link:hover{background:#d8f1ea;color:#1e293b}
    .rh-nav-link.active{background:#fff;color:#1e293b;font-weight:700;box-shadow:0 1px 4px rgba(15,23,42,.1)}
    .rh-nav-icon{position:relative;width:30px;height:30px;border-radius:10px;text-align:center;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:#fff;
      box-shadow:0 3px 8px var(--ic2,rgba(99,102,241,.4)),inset 0 1px 1px rgba(255,255,255,.5),inset 0 -2px 3px rgba(0,0,0,.15);
      transition:transform .35s cubic-bezier(.34,1.56,.64,1),box-shadow .2s;
      transform-style:preserve-3d}
    .rh-nav-icon svg{width:16px;height:16px;filter:drop-shadow(0 1px 1px rgba(0,0,0,.2))}
    .rh-nav-link:hover .rh-nav-icon{transform:scale(1.15) rotate(-8deg) translateY(-2px);box-shadow:0 6px 14px var(--ic2,rgba(99,102,241,.5)),inset 0 1px 1px rgba(255,255,255,.6),inset 0 -2px 3px rgba(0,0,0,.15)}
    .rh-nav-link.active .rh-nav-icon{animation:rhIconPulse 1.8s ease-in-out infinite}
    @keyframes rhIconPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.08) rotate(3deg)}}
    .rh-sidebar.collapsed .rh-nav-label{height:0;padding:0;margin:.55rem .4rem;border-top:1px solid #e5e7eb;overflow:hidden;text-indent:-9999px}
    .rh-sidebar.collapsed .rh-nav-link span:not(.rh-nav-icon),.rh-sidebar.collapsed .rh-sidebar-logo .rh-logo-text{display:none}
    .rh-sidebar.collapsed .rh-nav-link{justify-content:center;padding:.85rem .3rem;margin-bottom:.4rem}
    .rh-sidebar.collapsed .rh-nav-icon{width:36px;height:36px}
    .rh-sidebar.collapsed .rh-nav-icon svg{width:19px;height:19px}
    .rh-sidebar.collapsed .rh-sidebar-top{justify-content:center}
    .rh-sidebar.collapsed .rh-sidebar-logo{display:none}
    .rh-sidebar-bottom{margin-top:auto;display:flex;flex-direction:column;align-items:stretch;gap:.65rem;padding-top:.85rem;width:100%}
    .rh-sidebar.collapsed .rh-sidebar-bottom{align-items:center}
    .rh-sidebar-user{display:flex;align-items:center;gap:.5rem;justify-content:flex-start;padding:0 .2rem}
    .rh-sidebar.collapsed .rh-sidebar-user{justify-content:center;padding:0}
    .rh-sidebar-user .rh-user-avatar{width:38px;height:38px;border-radius:50%;background:#4f46e5;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;flex-shrink:0;box-shadow:0 0 0 2.5px #fff,0 0 0 4px #6366f1}
    .rh-sidebar-user .rh-user-text{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:.78rem;font-weight:600;color:#1e293b}
    .rh-sidebar.collapsed .rh-user-text{display:none}
    .rh-main{flex:1;min-width:0;display:flex;flex-direction:column;height:100%;position:relative}
    #plFrame{flex:1;width:100%;border:none;background:#fff}
    .pl-burger{display:none;width:34px;height:34px;border-radius:9px;border:1px solid var(--border);background:#fff;color:#475569;cursor:pointer;align-items:center;justify-content:center}
    .pl-burger svg{width:18px;height:18px}
    @media(max-width:700px){
      .rh-sidebar{position:fixed;left:0;top:var(--header-h);height:calc(100vh - var(--header-h));z-index:50;transform:translateX(-100%);transition:transform .2s;box-shadow:0 8px 30px rgba(15,23,42,.18)}
      .rh-sidebar.open{transform:translateX(0)}
      .pl-burger{display:flex}
    }
  </style>
</head>
<body>
<header class="header">
  <div class="header-info" style="display:flex;align-items:center;gap:.7rem">
    <button class="pl-burger" id="plBurger" aria-label="Ouvrir le menu"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg></button>
    <div class="header-title" id="plTitle">Portail</div>
  </div>
  <div class="header-right"></div>
</header>

<div class="rh-layout">
  <nav class="rh-sidebar" id="plSidebar">
    <div class="rh-sidebar-top">
      <div class="rh-sidebar-logo" id="plHomeBtn" title="Accueil du portail">
        <div class="rh-logo-badge"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg></div>
        <div class="rh-logo-text"><h1>Mon portail</h1><p>Mes accès personnels</p></div>
      </div>
      <button class="rh-collapse-btn" id="plCollapseBtn" title="Réduire / agrandir le menu">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="16" rx="2"/><path d="M9 4 H5 a2 2 0 0 0 -2 2 V18 a2 2 0 0 0 2 2 H9 Z" fill="currentColor" stroke="none"/><line x1="9" y1="4" x2="9" y2="20"/></svg>
      </button>
    </div>

    <div class="rh-nav-label">Mon espace personnel</div>
    <button class="rh-nav-link" data-page="mes-absences.html"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#ef4444,#f87171);--ic2:#f8717188"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg></span><span>Mes absences</span></button>
    <button class="rh-nav-link" data-page="mes-conges.html"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#f59e0b,#fbbf24);--ic2:#fbbf2488"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span><span>Mes congés</span></button>
    <button class="rh-nav-link" data-page="mes-formations.html"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#16a34a,#4ade80);--ic2:#4ade8088"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg></span><span>Mes formations</span></button>
    <button class="rh-nav-link" data-page="mes-fiches-paie.html"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#1e3a5f,#0f2b4a);--ic2:#0f2b4a88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="12" y1="11" x2="12" y2="17"/><line x1="9" y1="14" x2="15" y2="14"/></svg></span><span>Mes fiches de paie</span></button>

    <div class="rh-nav-label">Équipe &amp; échanges</div>
    <button class="rh-nav-link" data-page="planning-equipe.html" data-perm="access_planning_equipe"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#0891b2,#22d3ee);--ic2:#22d3ee88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="8" cy="15" r="1" fill="currentColor"/><circle cx="12" cy="15" r="1" fill="currentColor"/><circle cx="16" cy="15" r="1" fill="currentColor"/></svg></span><span>Planning équipe</span></button>
    <button class="rh-nav-link" data-page="messages.html" data-module="messages" data-perm="access_messages"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#0284c7,#38bdf8);--ic2:#38bdf888"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span><span>Messages</span></button>
    <button class="rh-nav-link" data-page="notes.html" data-perm="access_notes"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#f59e0b,#fcd34d);--ic2:#fcd34d88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span><span>Notes</span></button>
    <button class="rh-nav-link" data-page="documentation.html" data-perm="access_documentation"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#8b5cf6,#a78bfa);--ic2:#a78bfa88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span><span>Documentation</span></button>

    <div class="rh-nav-label">Pilotage &amp; ressources</div>
    <button class="rh-nav-link" data-page="budget.html" data-perm="access_budget"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#16a34a,#4ade80);--ic2:#4ade8088"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.2 7a6 7 0 1 0 0 10"/><path d="M13 10h-8m0 4h8"/></svg></span><span>Budget &amp; dépenses</span></button>
    <button class="rh-nav-link" data-page="rapport.html" data-perm="view_dashboard"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#16a34a,#86efac);--ic2:#86efac88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span><span>Rapport d'activité</span></button>
    <button class="rh-nav-link" data-page="satisfaction.html" data-perm="view_residents"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#f59e0b,#fcd34d);--ic2:#fcd34d88"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span><span>Satisfaction résidents</span></button>
    <button class="rh-nav-link" data-page="inventaire.html" data-perm="view_dashboard"><span class="rh-nav-icon" style="background:linear-gradient(135deg,#b45309,#d97706);--ic2:#d9770688"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg></span><span>Inventaire &amp; matériel</span></button>

    <div class="rh-sidebar-bottom">
      <div class="rh-sidebar-user" id="plSidebarUser"></div>
    </div>
  </nav>

  <div class="rh-main">
    <main class="content" id="plHome" style="flex:1;overflow:auto;padding:1.75rem 1.5rem">
      <div style="max-width:640px;margin:0 auto">
        <div id="plWelcome" style="margin-bottom:1.5rem"></div>
        <div id="mesDocsSection"></div>
      </div>
    </main>
    <iframe id="plFrame" title="Contenu du portail" style="display:none"></iframe>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/employes-supabase.js"></script>
<script src="js/absences-supabase.js"></script>
<script src="js/documents-employe-supabase.js"></script>
<script src="js/messages-supabase.js"></script>
<script src="js/journal-supabase.js"></script>
<script src="js/ppe-supabase.js"></script>
<script src="js/incidents-supabase.js"></script>
<script src="js/interventions-supabase.js"></script>
<script src="js/echeances-supabase.js"></script>
<script src="js/notif-bell.js"></script>
<script>
  Auth.requireAuth();

  const plSidebar = document.getElementById('plSidebar');
  const plFrame = document.getElementById('plFrame');
  const plHome = document.getElementById('plHome');
  const plLinks = document.querySelectorAll('.rh-nav-link[data-page]');

  const plTitle = document.getElementById('plTitle');
  const labelOf = l => (l.querySelector('span:not(.rh-nav-icon)')?.textContent || '').trim();

  // ── Navigation interne : la page s'ouvre dans le panneau, le menu reste visible ──
  function showHome() {
    plFrame.style.display = 'none';
    plFrame.src = 'about:blank';
    plHome.style.display = '';
    plLinks.forEach(l => l.classList.remove('active'));
    plTitle.textContent = 'Portail';
    sessionStorage.removeItem('pl_last_page');
  }
  function loadPage(page, link) {
    plHome.style.display = 'none';
    plFrame.style.display = '';
    plFrame.src = page + (page.includes('?') ? '&' : '?') + 'embed=1';
    plLinks.forEach(l => l.classList.toggle('active', l === link));
    plTitle.textContent = labelOf(link);
    sessionStorage.setItem('pl_last_page', page);
    plSidebar.classList.remove('open'); // referme le tiroir mobile
  }
  plLinks.forEach(l => l.addEventListener('click', () => loadPage(l.dataset.page, l)));
  document.getElementById('plHomeBtn').addEventListener('click', showHome);

  // Si une page chargée navigue vers l'accueil ou le portail, on sort de l'iframe
  // (sinon on se retrouve avec un portail imbriqué dans le panneau).
  plFrame.addEventListener('load', () => {
    try {
      const f = plFrame.contentWindow.location.pathname.split('/').pop();
      if (f === 'accueil.html') window.top.location.href = 'accueil.html';
      else if (f === 'pilotage.html') window.top.location.href = 'pilotage.html';
    } catch (e) { /* origine différente, on ignore */ }
  });

  // Reprend la rubrique affichée avant un rafraîchissement
  const lastPage = sessionStorage.getItem('pl_last_page');
  const lastLink = lastPage && Array.from(plLinks).find(l => l.dataset.page === lastPage);
  if (lastLink && lastLink.style.display !== 'none') loadPage(lastPage, lastLink);

  // ── Menu : repli / déploiement (état mémorisé) ──
  (function () {
    const collapseBtn = document.getElementById('plCollapseBtn');
    const burger = document.getElementById('plBurger');
    if (localStorage.getItem('pl_sidebar_collapsed') !== '0') plSidebar.classList.add('collapsed');
    collapseBtn.addEventListener('click', () => {
      plSidebar.classList.toggle('collapsed');
      localStorage.setItem('pl_sidebar_collapsed', plSidebar.classList.contains('collapsed') ? '1' : '0');
    });
    burger.addEventListener('click', () => plSidebar.classList.toggle('open'));
  })();

  // ── Accueil personnalisé ──
  (function () {
    const s = Auth.getSession();
    const el = document.getElementById('plWelcome');
    if (!s || !el) return;
    const prenom = (s.prenom || s.username || '').trim();
    el.innerHTML = `
      <div style="font-size:1.35rem;font-weight:800;color:var(--primary);letter-spacing:-.02em">Bonjour${prenom ? ' ' + escHtml(prenom) : ''} 👋</div>
      <div style="font-size:.86rem;color:var(--muted);margin-top:.25rem">Choisissez une rubrique dans le menu à gauche — elle s'ouvre ici, sans quitter le portail.</div>`;
  })();

  // ── Masquer les rubriques sans permission ──
  document.querySelectorAll('.rh-nav-link[data-perm]').forEach(el => {
    const s = Auth.getSession();
    const ok = s && (s.role === 'admin' || s.role === 'superadmin' || hasPermission(s.userId, el.dataset.perm));
    if (!ok) el.style.display = 'none';
  });

  // ── Badge messages non lus (sur l'icône de la rubrique) — source Supabase ──
  function _plRenderMsgBadge(unread) {
    document.querySelectorAll('.rh-nav-link[data-module="messages"]').forEach(el => {
      const host = el.querySelector('.rh-nav-icon') || el;
      let badge = host.querySelector('.notif-badge');
      if (unread > 0) {
        if (!badge) { badge = document.createElement('span'); badge.className = 'notif-badge'; host.appendChild(badge); }
        badge.textContent = unread > 99 ? '99+' : unread;
        badge.classList.remove('hidden');
      } else if (badge) {
        badge.remove();
      }
    });
  }
  async function updatePilotageNotifs() {
    const session = Auth.getSession();
    if (!session || typeof sbGetMessages !== 'function') return;
    const uid = String(session.userId);
    try {
      const [messages, convs] = await Promise.all([sbGetMessages(), sbGetConversations()]);
      const myConvIds = Object.values(convs).filter(c => (c.userIds || []).map(String).includes(uid)).map(c => c.id);
      const unread = messages.filter(m => myConvIds.includes(m.convId) && !(m.readBy || []).map(String).includes(uid) && String(m.from) !== uid).length;
      _plRenderMsgBadge(unread);
    } catch (e) { console.error('[updatePilotageNotifs]', e); }
  }
  document.addEventListener('DOMContentLoaded', updatePilotageNotifs);
  window.addEventListener('focus', updatePilotageNotifs);
  setInterval(updatePilotageNotifs, 30000);

  // ── Utilisateur connecté, en bas du menu ──
  (function () {
    const session = Auth.getSession();
    if (!session) return;
    const userEl = document.getElementById('plSidebarUser');
    const nom = [session.prenom, session.nom].filter(Boolean).join(' ') || session.username || 'Utilisateur';
    userEl.innerHTML = `<div class="rh-user-avatar">${initials(session.prenom || '', session.nom || session.username || '')}</div><span class="rh-user-text">${escHtml(nom)}</span>`;
  })();

  // ── Mes documents transmis ──
  (async function renderMesDocs() {
    const session = Auth.getSession();
    if (!session) return;
    const DOC_CAT = { contrat:'Contrat', fiche:'Fiche de poste', administratif:'Administratif', formation:'Formation', sanction:'Sanction', autre:'Autre' };
    function fmtSize(b) {
      if (!b) return '';
      if (b < 1024) return b + ' o';
      if (b < 1024*1024) return Math.round(b/1024) + ' Ko';
      return (b/1024/1024).toFixed(1) + ' Mo';
    }
    try {
      const employes = await sbGetEmployes();
      const fiche = employes.find(e => String(e.profileId) === String(session.userId));
      if (!fiche) return;
      const docs = await sbGetDocsEmploye(fiche.id);
      if (!docs.length) return;
      window._mesDocs = docs;
      const docRows = docs.map(d => `
        <div style="display:flex;align-items:center;gap:.75rem;padding:.7rem 1rem;border-bottom:1px solid var(--border)">
          <span style="font-size:1.2rem">📎</span>
          <div style="flex:1;min-width:0">
            <div style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(d.name)}</div>
            <div style="font-size:.72rem;color:var(--muted)">${DOC_CAT[d.category]||d.category||'—'}${d.docDate?' · '+new Date(d.docDate).toLocaleDateString('fr-FR'):''} · ${fmtSize(d.size)}</div>
          </div>
          <button class="btn btn-ghost btn-sm" onclick="mesDocsDownload('${d.id}')">↓</button>
        </div>`).join('');
      document.getElementById('mesDocsSection').innerHTML = `
        <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.75rem">Mes documents</div>
        <div class="card">
          <div class="card-header"><span class="card-title">📎 Documents transmis</span></div>
          <div class="card-body" style="padding:0">${docRows}</div>
        </div>`;
    } catch (e) { console.error('[renderMesDocs]', e); }
  })();

  async function mesDocsDownload(id) {
    const d = (window._mesDocs || []).find(x => x.id === id);
    if (!d || !d.fichierPath) return;
    const url = await sbJustificatifUrl(d.fichierPath);
    if (url) window.open(url, '_blank'); else toast('Document introuvable', 'error');
  }
</script>
</body></html>
