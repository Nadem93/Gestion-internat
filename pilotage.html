<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Portail — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info"><div class="header-title">Portail</div></div>
    <div class="header-right"><button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button></div>
  </header>
  <main class="content" id="plContent">
    <div style="max-width:620px;margin:0 auto;padding:2rem 0">
      <div class="am-grid">
        <a href="planning-equipe.html" class="am-card" data-perm="access_planning_equipe" style="background:linear-gradient(135deg,#0891b225,#22d3ee15)">
          <span class="am-icon" style="background:#0891b220;color:#0891b2"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><circle cx="8" cy="15" r="1" fill="currentColor"/><circle cx="12" cy="15" r="1" fill="currentColor"/><circle cx="16" cy="15" r="1" fill="currentColor"/></svg></span> Planning équipe
        </a>
        <a href="notes.html" class="am-card" data-perm="access_notes" style="background:linear-gradient(135deg,#f59e0b25,#fcd34d15)">
          <span class="am-icon" style="background:#f59e0b20;color:#f59e0b"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></span> Notes
        </a>
        <a href="messages.html" class="am-card" data-module="messages" data-perm="access_messages" style="background:linear-gradient(135deg,#0284c725,#38bdf815)">
          <span class="am-icon" style="background:#0284c720;color:#0284c7"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg></span> Messages
        </a>
        <a href="documentation.html" class="am-card" data-perm="access_documentation" style="background:linear-gradient(135deg,#8b5cf625,#a78bfa15)">
          <span class="am-icon" style="background:#8b5cf620;color:#8b5cf6"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></span> Documentation
        </a>
        <a href="budget.html" class="am-card" data-perm="access_budget" style="background:linear-gradient(135deg,#16a34a25,#4ade8015)">
          <span class="am-icon" style="background:#16a34a20;color:#16a34a"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></span> Budget & dépenses
        </a>
        <a href="rapport.html" class="am-card" data-perm="view_dashboard" style="background:linear-gradient(135deg,#16a34a25,#86efac15)">
          <span class="am-icon" style="background:#16a34a20;color:#16a34a"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/><line x1="2" y1="20" x2="22" y2="20"/></svg></span> Rapport d'activité
        </a>
        <a href="satisfaction.html" class="am-card" data-perm="view_residents" style="background:linear-gradient(135deg,#f59e0b25,#fcd34d15)">
          <span class="am-icon" style="background:#f59e0b20;color:#f59e0b"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg></span> Satisfaction résidents
        </a>
        <a href="inventaire.html" class="am-card" data-perm="view_dashboard" style="background:linear-gradient(135deg,#92400e25,#d9770615)">
          <span class="am-icon" style="background:#92400e20;color:#92400e"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/></svg></span> Inventaire & matériel
        </a>
      </div>
    </div>
    <div id="mesDocsSection" style="max-width:620px;margin:1.5rem auto 0"></div>
  </main>
</div></div>
<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>
  Auth.requireAuth();

  function updatePilotageNotifs() {
    const session = Auth.getSession();
    if (!session) return;
    const uid = String(session.userId);
    const counts = {};

    // Messages non lus
    const messages = DB.get(DB.keys.messages) || [];
    const convs = DB.get('ftr_conversations') || {};
    const myConvIds = Object.values(convs).filter(c => (c.userIds || []).map(String).includes(uid)).map(c => c.id);
    counts.messages = messages.filter(m => myConvIds.includes(m.convId) && !(m.readBy || []).map(String).includes(uid) && String(m.from) !== uid).length;

    document.querySelectorAll('.am-card[data-module]').forEach(el => {
      const mod = el.dataset.module;
      const c = counts[mod] || 0;
      let badge = el.querySelector('.notif-badge');
      if (c > 0) {
        if (!badge) { badge = document.createElement('span'); badge.className = 'notif-badge'; el.appendChild(badge); }
        badge.textContent = c > 99 ? '99+' : c;
        badge.classList.remove('hidden');
      } else {
        if (badge) badge.remove();
      }
    });
  }

  document.addEventListener('DOMContentLoaded', updatePilotageNotifs);
  window.addEventListener('focus', updatePilotageNotifs);
  window.addEventListener('storage', e => {
    if (e.key && (e.key.startsWith('ftr_messages') || e.key.startsWith('ftr_conversations'))) updatePilotageNotifs();
  });
  setInterval(updatePilotageNotifs, 15000);

  document.querySelectorAll('[data-perm]').forEach(el => {
    const _s = Auth.getSession();
    const ok = _s && (_s.role === 'admin' || _s.role === 'superadmin' || hasPermission(_s.userId, el.dataset.perm));
    if (!ok) el.style.display = 'none';
  });

  (function renderMesDocs() {
    const session = Auth.getSession();
    if (!session) return;
    const userId = String(session.userId);

    const EMP_DOCS_KEY = 'ftr_employes_docs';
    const docs = (JSON.parse(localStorage.getItem(EMP_DOCS_KEY) || '{}'))[userId] || [];
    const allPaie = DB.get(DB.keys.fichesPaie) || [];
    const paies = allPaie.filter(p => String(p.employeId) === userId);

    if (!docs.length && !paies.length) return;

    const DOC_CAT = { contrat:'Contrat', fiche:'Fiche de poste', administratif:'Administratif', formation:'Formation', sanction:'Sanction', autre:'Autre' };
    function fmtSize(b) {
      if (!b) return '';
      if (b < 1024) return b + ' o';
      if (b < 1024*1024) return Math.round(b/1024) + ' Ko';
      return (b/1024/1024).toFixed(1) + ' Mo';
    }
    function download(data, name) {
      const a = document.createElement('a'); a.href = data; a.download = name; a.click();
    }

    const docRows = docs.map(d => `
      <div style="display:flex;align-items:center;gap:.75rem;padding:.7rem 1rem;border-bottom:1px solid var(--border)">
        <span style="font-size:1.2rem">📎</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escHtml(d.name)}</div>
          <div style="font-size:.72rem;color:var(--muted)">${DOC_CAT[d.category]||d.category||'—'}${d.docDate?' · '+new Date(d.docDate).toLocaleDateString('fr-FR'):''} · ${fmtSize(d.size)}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="(function(){const a=document.createElement('a');a.href='${d.data}';a.download='${escHtml(d.name)}';a.click()})()">↓</button>
      </div>`).join('');

    const paieRows = paies.sort((a,b)=>(b.dateAjout||'').localeCompare(a.dateAjout||'')).map(p => `
      <div style="display:flex;align-items:center;gap:.75rem;padding:.7rem 1rem;border-bottom:1px solid var(--border)">
        <span style="font-size:1.2rem">📄</span>
        <div style="flex:1;min-width:0">
          <div style="font-weight:600;font-size:.85rem">${escHtml(p.name||p.fichier?.name||'Document')}</div>
          <div style="font-size:.72rem;color:var(--muted)">Ajouté le ${new Date(p.dateAjout).toLocaleDateString('fr-FR')} · ${fmtSize(p.fichier?.size)}</div>
        </div>
        <button class="btn btn-ghost btn-sm" onclick="(function(){const a=document.createElement('a');a.href='${p.fichier?.data}';a.download='${escHtml(p.name||p.fichier?.name||'document')}';a.click()})()">↓</button>
      </div>`).join('');

    document.getElementById('mesDocsSection').innerHTML = `
      <div style="font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin-bottom:.75rem">Mes documents</div>
      ${docs.length ? `<div class="card" style="margin-bottom:1rem">
        <div class="card-header"><span class="card-title">📎 Fichiers joints</span></div>
        <div class="card-body" style="padding:0">${docRows}</div>
      </div>` : ''}
      ${paies.length ? `<div class="card">
        <div class="card-header"><span class="card-title">📄 Documents transmis</span></div>
        <div class="card-body" style="padding:0">${paieRows}</div>
      </div>` : ''}`;
  })();
</script>
</body></html>
