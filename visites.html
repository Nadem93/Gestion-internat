<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><link rel="manifest" href="manifest.json"/><meta name="theme-color" content="#0f2b4a"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Visites & famille — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Visites & hébergements famille</div></div>
      <div class="header-right">
        <button id="btnDroits" class="btn btn-outline btn-sm" onclick="openDroitsModal()">⚖️ Droits de visite</button>
        <button id="btnAddVisite" class="btn btn-accent btn-sm btn-add-resident" onclick="openVisiteModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px;flex-shrink:0"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="btn-add-label">Nouvelle visite</span>
        </button>
        <a href="accueil.html" class="btn btn-ghost btn-sm">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Accueil
        </a>
      </div>
    </header>

    <main class="content" style="max-width:980px">
      <div id="vStats" class="grid grid-4" style="margin-bottom:1.5rem"></div>
      <div class="toolbar" style="margin-bottom:1.25rem">
        <select id="vFilterResident" style="width:auto"></select>
        <select id="vFilterType" style="width:auto"></select>
      </div>
      <div id="vList"></div>
    </main>
  </div>
</div>

<!-- MODAL VISITE -->
<div class="modal-overlay" id="modalVisite">
  <div class="modal lg">
    <div class="modal-header">
      <span class="modal-title" id="vmTitle">Nouvelle visite</span>
      <button class="modal-close" onclick="closeModal('modalVisite')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <div class="form-group"><label class="required">Résident</label><select id="vmResident"></select></div>
        <div class="form-group"><label>Type</label><select id="vmType">
          <option value="libre">👪 Visite libre</option>
          <option value="mediatisee">🛡️ Visite médiatisée</option>
          <option value="hebergement">🏠 Hébergement famille</option>
          <option value="telephone">📞 Appel téléphonique</option>
        </select></div>
      </div>
      <div id="vmDroitsInfo"></div>
      <div class="form-row">
        <div class="form-group"><label class="required">Visiteur / famille</label><input type="text" id="vmPersonne" placeholder="Ex : Mme Dupont"/></div>
        <div class="form-group"><label>Lien</label><input type="text" id="vmLien" placeholder="Ex : Mère, Père, Grand-mère…"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="required">Date</label><input type="date" id="vmDate"/></div>
        <div class="form-group"><label>Heure</label><input type="time" id="vmHeure"/></div>
      </div>
      <div class="form-row" id="vmRetourWrap" style="display:none">
        <div class="form-group"><label>Date de retour</label><input type="date" id="vmDateRetour"/></div>
        <div class="form-group"><label>Heure de retour</label><input type="time" id="vmHeureRetour"/></div>
      </div>
      <div class="form-group"><label>Lieu</label><input type="text" id="vmLieu" placeholder="Établissement, point rencontre, domicile familial…"/></div>
      <div class="form-group"><label>Notes / observations</label><textarea id="vmNotes" rows="2" placeholder="Consignes, déroulement de la visite…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalVisite')">Annuler</button>
      <button class="btn btn-primary" onclick="saveVisite()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<!-- MODAL DROITS DE VISITE -->
<div class="modal-overlay" id="modalDroits">
  <div class="modal lg">
    <div class="modal-header">
      <span class="modal-title">⚖️ Droits de visite — cadre par résident</span>
      <button class="modal-close" onclick="closeModal('modalDroits')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div class="form-group"><label>Résident</label><select id="drResident"></select></div>
      <div class="section-label">Personnes autorisées</div>
      <div id="drList" style="display:flex;flex-direction:column;gap:.45rem"></div>
      <div class="divider"></div>
      <div class="section-label">Ajouter une autorisation</div>
      <div class="form-row">
        <div class="form-group"><label class="required">Personne</label><input type="text" id="drPersonne" placeholder="Nom de la personne autorisée"/></div>
        <div class="form-group"><label>Lien</label><select id="drLien"></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Type autorisé</label><select id="drType">
          <option value="libre">👪 Visite libre</option>
          <option value="mediatisee">🛡️ Visite médiatisée</option>
          <option value="hebergement">🏠 Hébergement famille</option>
          <option value="telephone">📞 Appel téléphonique</option>
        </select></div>
        <div class="form-group"><label>Modalités</label><input type="text" id="drModalites" placeholder="Ex : 1 week-end sur 2, 1 h en présence d'un tiers…"/></div>
      </div>
      <div class="form-group"><label>Décision / référence</label><input type="text" id="drDecision" placeholder="Ex : Ordonnance JE du 12/03/2026, accord ASE…"/></div>
      <div style="text-align:right"><button class="btn btn-accent btn-sm" onclick="addDroit()">+ Ajouter l'autorisation</button></div>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/visites.js"></script>
</body>
</html>
