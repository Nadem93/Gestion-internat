<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Inventaire — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
.inv-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:.75rem;margin-bottom:1.25rem}
.inv-stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.65rem .85rem;text-align:center}
.inv-stat-num{font-size:1.5rem;font-weight:800;line-height:1;color:var(--primary)}
.inv-stat-lbl{font-size:.7rem;color:var(--muted);margin-top:3px}
.inv-toolbar{display:flex;align-items:center;gap:.6rem;flex-wrap:wrap;margin-bottom:1.25rem}
.inv-toolbar input,.inv-toolbar select{font-size:.8rem;padding:.35rem .6rem;border:1px solid var(--border);border-radius:8px;background:#fff}
.inv-toolbar input{flex:1;min-width:180px}
</style>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info">
      <div class="header-title">📦 Inventaire & matériel</div>
    </div>
    <div class="header-right">
      <button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button>
      <button class="btn btn-accent btn-sm" onclick="openInvModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:14px;height:14px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Ajouter
      </button>
    </div>
  </header>

  <main class="content">
    <div style="max-width:900px;margin:0 auto">

      <div class="inv-stats">
        <div class="inv-stat"><div class="inv-stat-num" id="invStatTotal">—</div><div class="inv-stat-lbl">Équipements</div></div>
        <div class="inv-stat"><div class="inv-stat-num" id="invStatDefaillant" style="color:#ea580c">—</div><div class="inv-stat-lbl">Défaillants</div></div>
        <div class="inv-stat"><div class="inv-stat-num" id="invStatHorsUsage" style="color:#dc2626">—</div><div class="inv-stat-lbl">Hors d'usage</div></div>
      </div>

      <div class="inv-toolbar">
        <input type="search" id="invSearch" placeholder="Rechercher un équipement…"/>
        <select id="invFilterCat">
          <option value="">Toutes les catégories</option>
          <option value="mobilier">🪑 Mobilier</option>
          <option value="medical">🩺 Matériel médical</option>
          <option value="informatique">💻 Informatique</option>
          <option value="electromenager">🔌 Électroménager</option>
          <option value="linge">🛏️ Linge & literie</option>
          <option value="hygiene">🧴 Hygiène & produits</option>
          <option value="securite">🔒 Sécurité</option>
          <option value="vehicule">🚗 Véhicules</option>
          <option value="autre">📦 Autre</option>
        </select>
        <select id="invFilterEtat">
          <option value="">Tous les états</option>
          <option value="bon">Bon état</option>
          <option value="usage">Usagé</option>
          <option value="defaillant">Défaillant</option>
          <option value="hors_usage">Hors d'usage</option>
        </select>
      </div>

      <div id="invList"></div>

    </div>
  </main>
</div></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalInv">
  <div class="modal" style="max-width:520px">
    <div class="modal-header">
      <h3 id="invModalTitle">Nouvel équipement</h3>
      <button class="modal-close" onclick="closeModal('modalInv')">&times;</button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:.85rem">

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group">
          <label>Catégorie *</label>
          <select id="invModalCat">
            <option value="mobilier">🪑 Mobilier</option>
            <option value="medical">🩺 Matériel médical</option>
            <option value="informatique">💻 Informatique</option>
            <option value="electromenager">🔌 Électroménager</option>
            <option value="linge">🛏️ Linge & literie</option>
            <option value="hygiene">🧴 Hygiène & produits</option>
            <option value="securite">🔒 Sécurité</option>
            <option value="vehicule">🚗 Véhicules</option>
            <option value="autre">📦 Autre</option>
          </select>
        </div>
        <div class="form-group">
          <label>État</label>
          <select id="invModalEtat">
            <option value="bon">✅ Bon état</option>
            <option value="usage">⚠️ Usagé</option>
            <option value="defaillant">🔴 Défaillant</option>
            <option value="hors_usage">⛔ Hors d'usage</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Nom / désignation *</label>
        <input type="text" id="invModalNom" placeholder="Ex : Lit médicalisé, Fauteuil roulant…"/>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group">
          <label>Référence / n° de série</label>
          <input type="text" id="invModalRef" placeholder="REF-00001"/>
        </div>
        <div class="form-group">
          <label>Quantité</label>
          <input type="number" id="invModalQte" value="1" min="1"/>
        </div>
      </div>

      <div class="form-group">
        <label>Localisation</label>
        <input type="text" id="invModalLieu" placeholder="Ex : Chambre 12, Salle commune, Réserve…"/>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:.75rem">
        <div class="form-group">
          <label>Date d'achat</label>
          <input type="date" id="invModalAchat"/>
        </div>
        <div class="form-group">
          <label>Dernière maintenance</label>
          <input type="date" id="invModalMaintenance"/>
        </div>
      </div>

      <div class="form-group">
        <label>Notes</label>
        <textarea id="invModalNotes" rows="2" placeholder="Observations, fournisseur, garantie…" style="resize:vertical"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" onclick="closeModal('modalInv')">Annuler</button>
      <button class="btn btn-primary" onclick="saveInventaire()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/inventaire-supabase.js"></script>
<script src="js/inventaire.js"></script>
</body>
</html>
