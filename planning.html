<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Planning — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* ── Layout agenda (sidebar + timeline) ── */
    .pl-layout{display:flex;gap:1rem;align-items:flex-start}
    .pl-sidebar{width:212px;flex-shrink:0;display:flex;flex-direction:column;gap:.85rem}
    .pl-content{flex:1;min-width:0}
    @media(max-width:880px){.pl-sidebar{display:none}}

    /* ── Mini-calendriers ── */
    .mini-cal{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
    .mini-cal-head{display:flex;align-items:center;justify-content:space-between;padding:.4rem .55rem;background:linear-gradient(135deg,#1e9be6,#1786cf);color:#fff}
    .mini-cal-head .mc-title{font-size:.78rem;font-weight:700}
    .mini-cal-head button{background:rgba(255,255,255,.18);border:none;color:#fff;width:20px;height:20px;border-radius:5px;cursor:pointer;font-size:.8rem;line-height:1;display:flex;align-items:center;justify-content:center}
    .mini-cal-head button:hover{background:rgba(255,255,255,.35)}
    .mini-grid{display:grid;grid-template-columns:22px repeat(7,1fr);font-size:.64rem}
    .mini-grid .mg-cell{text-align:center;padding:3px 0;color:var(--text)}
    .mini-grid .mg-wh{color:#94a3b8;font-weight:700}
    .mini-grid .mg-wk{color:#b0bcc9;font-weight:600;background:#f6f8fa}
    .mini-grid .mg-day{cursor:pointer;border-radius:4px;font-weight:500}
    .mini-grid .mg-day:hover{background:#e8f4fd}
    .mini-grid .mg-out{color:#cbd5e1}
    .mini-grid .mg-inweek{background:#d6ecfb}
    .mini-grid .mg-today{background:#1786cf;color:#fff;font-weight:700}
    .mini-grid .mg-today.mg-inweek{background:#1786cf}

    /* ── Timeline semaine ── */
    .pl-week{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
    .pl-week-head{display:grid;grid-template-columns:56px repeat(7,1fr);background:#f3f7fb;border-bottom:1px solid var(--border)}
    .pl-week-head .plh-year{display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;color:#1786cf;border-right:1px solid var(--border)}
    .pl-week-head .plh-day{text-align:center;padding:.5rem .25rem;border-left:1px solid var(--border)}
    .pl-week-head .plh-day .plh-dow{font-size:.64rem;font-weight:700;color:var(--muted);text-transform:uppercase}
    .pl-week-head .plh-day .plh-num{font-size:1.05rem;font-weight:800;color:var(--text);margin-top:2px}
    .pl-week-head .plh-day.is-today .plh-num{background:#1786cf;color:#fff;width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
    .pl-week-body{display:grid;grid-template-columns:56px 1fr;max-height:68vh;overflow-y:auto}
    .pl-time-col{position:relative}
    .pl-time-col .plt-label{position:absolute;right:6px;font-size:.66rem;color:#94a3b8;font-weight:600;transform:translateY(-6px)}
    .pl-days{display:grid;grid-template-columns:repeat(7,1fr)}
    .pl-day{position:relative;border-left:1px solid var(--border);cursor:pointer}
    .pl-day .pl-ev-wrap{position:absolute;pointer-events:none}
    .pl-day .pl-ev-band{position:absolute;top:0;bottom:0;width:4px;border-radius:4px;pointer-events:auto;cursor:pointer}
    .pl-day .pl-ev{position:absolute;top:0;border-radius:5px;color:#fff;padding:3px 5px 3px 8px;font-size:.66rem;line-height:1.2;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.35);pointer-events:auto;cursor:pointer}
    .pl-day .pl-ev .pl-ev-time{font-weight:400;opacity:.9}
    .pl-day .pl-ev .pl-ev-title{font-weight:700}
    /* Ligne « maintenant » */
    .pl-day .pl-now{position:absolute;left:0;right:0;height:2px;background:#ef4444;z-index:5;pointer-events:none}
    .pl-day .pl-now::before{content:"";position:absolute;left:-3px;top:-3px;width:8px;height:8px;border-radius:50%;background:#ef4444}

    /* ── Vue Mois ── */
    .plm-head{display:grid;grid-template-columns:repeat(7,1fr);background:#f3f7fb;border-bottom:1px solid var(--border)}
    .plm-dow{text-align:center;padding:.5rem .25rem;font-size:.64rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-left:1px solid var(--border)}
    .plm-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(96px,auto)}
    .plm-cell{padding:.4rem .45rem;border:1px solid var(--border);cursor:pointer;transition:background .1s;min-width:0;overflow:hidden}
    .plm-cell:hover:not(.plm-empty){background:#f8fbff}
    .plm-empty{background:var(--g50);cursor:default}
    .plm-today{background:#eff6ff}
    .plm-num{font-size:.8rem;font-weight:700;color:var(--text);margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
    .plm-num.is-today{background:#1786cf;color:#fff}
    .plm-ev{display:flex;align-items:center;gap:0;border-radius:4px;padding:0;font-size:.66rem;font-weight:600;cursor:pointer;margin-bottom:2px;overflow:hidden;background:#fff;border:1px solid rgba(0,0,0,.07);box-shadow:0 1px 2px rgba(0,0,0,.05);width:100%}
    .plm-ev:hover{filter:brightness(.96)}
    .plm-ev-band{width:4px;min-height:18px;align-self:stretch;flex-shrink:0;border-radius:3px 0 0 3px}
    .plm-ev-txt{padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);flex:1;min-width:0}
    .plm-ev-time{opacity:.7;font-weight:400}
    .plm-more{font-size:.65rem;color:var(--muted);padding:1px 0;margin-top:1px}

    /* Légende / filtre par type */
    .pl-legend{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem}
    .pl-legend .lg-chip{display:inline-flex;align-items:center;gap:.35rem;font-size:.72rem;font-weight:600;padding:.25rem .6rem;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;transition:opacity .15s,filter .15s}
    .pl-legend .lg-chip .lg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .pl-legend .lg-chip.off{opacity:.4;filter:grayscale(.6)}

    /* ── Fenêtre de détails (effet flipYIn) ── */
    @keyframes flipYIn {
      0%   { transform: perspective(800px) rotateY(90deg); opacity: 0; }
      40%  { transform: perspective(800px) rotateY(-12deg); opacity: 1; }
      70%  { transform: perspective(800px) rotateY(6deg); }
      100% { transform: perspective(800px) rotateY(0deg); opacity: 1; }
    }
    .modal-overlay.open .modal.modal-flip{ animation: flipYIn .55s ease-out both; transform-origin:50% 50%; }
    .ev-detail-row{display:flex;gap:.6rem;align-items:flex-start;padding:.5rem 0;border-bottom:1px solid var(--border)}
    .ev-detail-row:last-child{border-bottom:none}
    .ev-detail-ic{width:18px;flex-shrink:0;text-align:center;opacity:.8}
    .ev-detail-lbl{font-size:.7rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.03em}
    .ev-detail-val{font-size:.88rem;color:var(--text);font-weight:500;white-space:pre-wrap}
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Planning</div></div>
      <div class="header-right">
        <div class="planning-view-switch" style="display:flex;gap:.4rem;background:var(--g100);border-radius:var(--r-sm);padding:3px">
          <button class="btn btn-ghost btn-sm" id="viewDay">Jour</button>
          <button class="btn btn-sm" id="viewWeek" style="background:#fff;box-shadow:var(--shadow-sm)">Semaine</button>
          <button class="btn btn-ghost btn-sm" id="viewMonth">Mois</button>
          <button class="btn btn-ghost btn-sm" id="viewList">Liste</button>
        </div>
        <button class="btn btn-accent btn-add-resident" onclick="openModal('modalEvent')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="btn-add-label">Nouvel événement</span>
        </button>
      </div>
    </header>

    <main class="content">
      <!-- Nav calendrier -->
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
        <button class="btn btn-outline btn-sm" id="prevBtn">&#8592;</button>
        <h2 id="calTitle" style="font-size:1.1rem;font-weight:700;min-width:220px;text-align:center"></h2>
        <button class="btn btn-outline btn-sm" id="nextBtn">&#8594;</button>
        <button class="btn btn-ghost btn-sm" id="todayBtn">Aujourd'hui</button>
        <select id="filterEventResident" style="width:auto;margin-left:auto"><option value="">Tous les résidents</option></select>
      </div>

      <div class="pl-layout">
        <aside class="pl-sidebar" id="planningSidebar"></aside>
        <div class="pl-content">
          <div class="pl-legend" id="typeLegend"></div>
          <div id="calContainer"></div>

          <!-- Vue liste -->
          <div id="listContainer" style="display:none">
            <div class="table-wrap">
              <table><thead><tr><th>Titre</th><th>Résident</th><th>Date</th><th>Heure</th><th>Type</th><th>Actions</th></tr></thead>
              <tbody id="eventTableBody"></tbody></table>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>
</div>

<!-- MODAL DÉTAILS ÉVÉNEMENT (lecture seule, effet flipYIn) -->
<div class="modal-overlay" id="modalEventView">
  <div class="modal modal-flip" style="max-width:440px">
    <div class="modal-header">
      <span class="modal-title" id="evViewTitle">Détails du rendez-vous</span>
      <button class="modal-close" onclick="closeModal('modalEventView')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" id="evViewBody"></div>
    <div class="modal-footer">
      <button class="btn btn-danger btn-sm" id="evViewDelete" style="margin-right:auto">Supprimer</button>
      <button class="btn btn-outline" onclick="closeModal('modalEventView')">Fermer</button>
      <button class="btn btn-primary" id="evViewEdit">Modifier</button>
    </div>
  </div>
</div>

<!-- MODAL ÉVÉNEMENT -->
<div class="modal-overlay" id="modalEvent">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="modalEventTitle">Nouvel événement</span>
      <button class="modal-close"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="eventId"/>
      <div class="form-group"><label class="required">Titre</label><input type="text" id="evTitre" placeholder="Titre de l'événement"/></div>
      <div class="form-row">
        <div class="form-group"><label>Résident</label><select id="evResident"><option value="">Tous / Groupe</option></select></div>
        <div class="form-group"><label>Type</label><select id="evType"><option value="activite">Activité</option><option value="rdv">Rendez-vous</option><option value="sortie">Sortie</option><option value="reunion">Réunion</option><option value="avenant">Avenant</option><option value="projet">Projet personnalisé</option><option value="evaluation">Évaluation</option><option value="autre">Autre</option></select></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label class="required">Date</label><input type="date" id="evDate"/></div>
        <div class="form-group"><label>Heure de début</label><input type="time" id="evHeure" value="09:00"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Durée</label><select id="evDuree"><option value="30">30 min</option><option value="60" selected>1h</option><option value="90">1h30</option><option value="120">2h</option><option value="180">3h</option><option value="journee">Journée</option></select></div>
        <div class="form-group"><label>Couleur</label><input type="color" id="evColor" value="#3b82f6"/></div>
      </div>
      <div class="form-group"><label>Description</label><textarea id="evDesc" rows="3" placeholder="Détails, lieu, intervenants…"></textarea></div>
      <div class="form-group" style="margin-top:.75rem">
        <label style="display:flex;align-items:center;gap:.5rem;cursor:pointer;font-weight:600;font-size:.85rem">
          <input type="checkbox" id="evVehiculeCheck" onchange="document.getElementById('evVehiculeFields').style.display=this.checked?'flex':'none'"/>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:18px;height:18px;color:var(--accent)"><path d="M5 17h14M5 17a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2h1l2-3h8l2 3h1a2 2 0 0 1 2 2v6a2 2 0 0 1-2 2M5 17a2 2 0 1 0 4 0M19 17a2 2 0 1 0-4 0"/></svg>
          Réserver un véhicule
        </label>
        <div id="evVehiculeFields" style="display:none;flex-direction:column;gap:.75rem;margin-top:.75rem;padding:.75rem;background:var(--g50);border-radius:var(--r)">
          <div class="form-group"><label class="required">Véhicule</label><input type="text" id="evVehicule" list="evVehiculeList" placeholder="Sélectionner un véhicule"/><datalist id="evVehiculeList"></datalist></div>
          <div class="form-row">
            <div class="form-group"><label class="required">Destination</label><input type="text" id="evDestination" placeholder="Lieu de destination"/></div>
            <div class="form-group"><label>Motif</label><input type="text" id="evMotif" placeholder="Objet du déplacement"/></div>
          </div>
        </div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline" onclick="closeAllModals()">Annuler</button>
      <button class="btn btn-danger btn-sm" id="btnDeleteEvent" style="margin-right:auto;display:none" onclick="deleteEvent()">Supprimer</button>
      <button class="btn btn-primary" onclick="saveEvent()">Enregistrer</button>
    </div>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>Auth.requireAuth();</script>
<script src="js/planning.js"></script>
</body>
</html>
