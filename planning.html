<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Planning — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    /* ── Layout agenda (sidebar + timeline) ── */
    .pl-layout{display:flex;gap:1rem;align-items:flex-start}
    .pl-sidebar{width:212px;flex-shrink:0;display:flex;flex-direction:column;gap:.85rem;transition:width .22s ease,opacity .22s ease,margin .22s ease}
    .pl-sidebar.pl-sidebar-hidden{width:0;overflow:hidden;opacity:0;margin:0;pointer-events:none}
    .pl-content{flex:1;min-width:0}
    @media(max-width:880px){.pl-sidebar{display:none}}
    #sidebarToggleBtn{display:flex;align-items:center;gap:.35rem;color:var(--muted);border-color:var(--border)}
    #sidebarToggleBtn.active{color:var(--primary);border-color:var(--primary);background:#f0f7ff}

    /* ── Mini-calendriers ── */
    .mini-cal{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
    .mini-cal-head{display:flex;align-items:center;justify-content:space-between;padding:.4rem .55rem;background:linear-gradient(135deg,#1e9be6,#1786cf);color:#fff}
    .mini-cal-head .mc-title{font-size:.78rem;font-weight:700}
    .mini-cal-head button{background:rgba(255,255,255,.18);border:none;color:#fff;width:20px;height:20px;border-radius:5px;cursor:pointer;font-size:.8rem;line-height:1;display:flex;align-items:center;justify-content:center}
    .mini-cal-head button:hover{background:rgba(255,255,255,.35)}
    .mini-grid{display:grid;grid-template-columns:22px repeat(7,1fr);font-size:.64rem}
    .mini-grid .mg-cell{text-align:center;padding:3px 0;color:var(--text)}
    .mini-grid .mg-wh{color:#94a3b8;font-weight:700}
    .mini-grid .mg-wk{color:#b0bcc9;font-weight:600;background:#f6f8fa}
    .mini-grid .mg-day{cursor:pointer;border-radius:4px;font-weight:500}
    .mini-grid .mg-day:hover{background:#e8f4fd}
    .mini-grid .mg-out{color:#cbd5e1}
    .mini-grid .mg-inweek{background:#d6ecfb}
    .mini-grid .mg-today{background:#1786cf;color:#fff;font-weight:700}
    .mini-grid .mg-today.mg-inweek{background:#1786cf}

    /* ── Timeline semaine ── */
    .pl-week{background:#fff;border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
    .pl-week-head{display:grid;grid-template-columns:56px repeat(7,1fr);background:#f3f7fb;border-bottom:1px solid var(--border)}
    .pl-week-head .plh-year{display:flex;align-items:center;justify-content:center;font-size:.78rem;font-weight:800;color:#1786cf;border-right:1px solid var(--border)}
    .pl-week-head .plh-day{text-align:center;padding:.5rem .25rem;border-left:1px solid var(--border)}
    .pl-week-head .plh-day .plh-dow{font-size:.64rem;font-weight:700;color:var(--muted);text-transform:uppercase}
    .pl-week-head .plh-day .plh-num{font-size:1.05rem;font-weight:800;color:var(--text);margin-top:2px}
    .pl-week-head .plh-day.is-today .plh-num{background:#1786cf;color:#fff;width:28px;height:28px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center}
    .pl-week-body{display:grid;grid-template-columns:56px 1fr;max-height:68vh;overflow-y:auto}
    .pl-time-col{position:relative}
    .pl-time-col .plt-label{position:absolute;right:6px;font-size:.66rem;color:#94a3b8;font-weight:600;transform:translateY(-6px)}
    .pl-days{display:grid;grid-template-columns:repeat(7,1fr)}
    .pl-day{position:relative;border-left:1px solid var(--border);cursor:pointer}
    .pl-day .pl-ev-wrap{position:absolute;pointer-events:none}
    .pl-day .pl-ev-band{position:absolute;top:0;bottom:0;width:4px;border-radius:4px;pointer-events:auto;cursor:pointer}
    .pl-day .pl-ev{position:absolute;top:0;border-radius:5px;color:#fff;padding:3px 5px 3px 8px;font-size:.66rem;line-height:1.2;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.15);border:1px solid rgba(255,255,255,.35);pointer-events:auto;cursor:pointer}
    .pl-day .pl-ev .pl-ev-time{font-weight:400;opacity:.9}
    .pl-day .pl-ev .pl-ev-title{font-weight:700}
    /* Ligne « maintenant » */
    .pl-day .pl-now{position:absolute;left:0;right:0;height:2px;background:#ef4444;z-index:5;pointer-events:none}
    .pl-day .pl-now::before{content:"";position:absolute;left:-3px;top:-3px;width:8px;height:8px;border-radius:50%;background:#ef4444}

    /* ── Vue Mois ── */
    .plm-head{display:grid;grid-template-columns:repeat(7,1fr);background:#f3f7fb;border-bottom:1px solid var(--border)}
    .plm-dow{text-align:center;padding:.5rem .25rem;font-size:.64rem;font-weight:700;color:var(--muted);text-transform:uppercase;border-left:1px solid var(--border)}
    .plm-grid{display:grid;grid-template-columns:repeat(7,1fr);grid-auto-rows:minmax(96px,auto)}
    .plm-cell{padding:.4rem .45rem;border:1px solid var(--border);cursor:pointer;transition:background .1s;min-width:0;overflow:hidden}
    .plm-cell:hover:not(.plm-empty){background:#f8fbff}
    .plm-empty{background:var(--g50);cursor:default}
    .plm-today{background:#eff6ff}
    .plm-num{font-size:.8rem;font-weight:700;color:var(--text);margin-bottom:3px;width:22px;height:22px;display:flex;align-items:center;justify-content:center;border-radius:50%}
    .plm-num.is-today{background:#1786cf;color:#fff}
    .plm-ev{display:flex;align-items:center;gap:0;border-radius:4px;padding:0;font-size:.66rem;font-weight:600;cursor:pointer;margin-bottom:2px;overflow:hidden;background:#fff;border:1px solid rgba(0,0,0,.07);box-shadow:0 1px 2px rgba(0,0,0,.05);width:100%}
    .plm-ev:hover{filter:brightness(.96)}
    .plm-ev-band{width:4px;min-height:18px;align-self:stretch;flex-shrink:0;border-radius:3px 0 0 3px}
    .plm-ev-txt{padding:2px 5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text);flex:1;min-width:0}
    .plm-ev-time{opacity:.7;font-weight:400}
    .plm-more{font-size:.65rem;color:var(--muted);padding:1px 0;margin-top:1px}

    /* ── Recherche ── */
    .pl-search-wrap{position:relative;display:flex;align-items:center}
    .pl-search-wrap svg{position:absolute;left:8px;width:13px;height:13px;color:var(--muted);pointer-events:none}
    .pl-search-wrap input{padding:.35rem .6rem .35rem 26px;border:1px solid var(--border);border-radius:var(--r-sm);font-size:.8rem;width:170px;background:#fff;transition:border-color .2s,box-shadow .2s}
    .pl-search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(23,134,207,.13);outline:none}

    /* ── Détection de conflits ── */
    .pl-ev-conflict{box-shadow:0 0 0 2px #ef4444 inset!important}
    .pl-ev-conflict-ic{position:absolute;top:2px;right:3px;font-size:.58rem;line-height:1;z-index:3;color:#ef4444;font-weight:800}

    /* ── Responsive mobile ── */
    @media(max-width:640px){
      #planningSidebar{display:none!important}
      .pl-week-head{grid-template-columns:36px 1fr!important}
      .pl-week-body{grid-template-columns:36px 1fr!important}
      .pl-days{grid-template-columns:1fr!important}
      .plh-day .plh-dow{font-size:.55rem}
      .pl-search-wrap input{width:110px}
      .btn-add-label{display:none}
    }

    /* Légende / filtre par type */
    .pl-legend{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1rem}
    .pl-legend .lg-chip{display:inline-flex;align-items:center;gap:.35rem;font-size:.72rem;font-weight:600;padding:.25rem .6rem;border-radius:999px;border:1px solid var(--border);background:#fff;color:var(--text);cursor:pointer;transition:opacity .15s,filter .15s}
    .pl-legend .lg-chip .lg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
    .pl-legend .lg-chip.off{opacity:.4;filter:grayscale(.6)}

    /* ── Modal Nouvel évènement (reproduction mockup) ── */
    #modalEvent .modal.modal-event-modern{
      width:820px;max-width:calc(100% - 2rem);max-height:92vh;
      background:#fff;border-radius:30px;overflow:hidden;
      box-shadow:0 30px 80px rgba(0,0,0,.25);
      display:flex!important;flex-direction:row!important;align-items:stretch!important;padding:0!important;
    }
    /* Panneau gauche bleu */
    .mev-left{
      width:230px;flex-shrink:0;
      background:linear-gradient(180deg,#2563eb,#1d4ed8);
      color:#fff;padding:25px;display:flex;flex-direction:column;
    }
    .mev-icon{
      width:70px;height:70px;border-radius:50%;
      background:#fff;color:#2563eb;
      display:flex;align-items:center;justify-content:center;
      font-size:30px;margin:0 auto 20px;transition:transform .2s;
    }
    .mev-left h3{margin:0;font-size:1rem;font-weight:700}
    .mev-menu{margin-top:16px;display:flex;flex-direction:column;gap:5px}
    .mev-menu div{
      display:flex;align-items:center;gap:8px;
      padding:8px 10px;border-radius:9px;
      background:rgba(255,255,255,.1);font-size:.78rem;font-weight:500;
      transition:background .15s,transform .15s;cursor:pointer;
    }
    .mev-menu-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;box-shadow:0 0 0 2px rgba(255,255,255,.25)}
    .mev-menu div.mev-menu-active{background:rgba(255,255,255,.34);font-weight:700;transform:translateX(2px)}
    .mev-footer-left{margin-top:auto;font-size:14px;line-height:1.2}
    .mev-footer-left p{margin:0 0 10px;display:flex;align-items:center;gap:.5rem}
    /* Panneau droit formulaire */
    .mev-right{flex:1;padding:25px;display:flex;flex-direction:column;min-width:0;overflow-y:auto}
    .mev-right .mev-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
    .mev-right .mev-head h2{margin:0;font-size:1.4rem;font-weight:800;color:#0f172a}
    .mev-right .mev-close{background:none;border:none;cursor:pointer;color:#94a3b8;padding:4px;display:flex}
    .mev-right .mev-close svg{width:22px;height:22px}
    .mev-grid{display:grid;grid-template-columns:1fr 1fr;gap:15px}
    .mev-grid .mev-field{display:flex;flex-direction:column;gap:6px;min-width:0}
    .mev-grid .full{grid-column:1/-1}
    .mev-field label{font-size:12px;font-weight:700;color:#475569;text-transform:uppercase;letter-spacing:.02em}
    .mev-field input,.mev-field select,.mev-field textarea{
      width:100%;padding:12px;border:1px solid #dbe2ea;border-radius:12px;
      font-size:.9rem;font-family:inherit;background:#fff;color:#0f172a;
      transition:border-color .15s,box-shadow .15s;
    }
    .mev-field input:focus,.mev-field select:focus,.mev-field textarea:focus{
      outline:none;border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.13);
    }
    .mev-field textarea{resize:vertical}
    .mev-colors{display:flex;gap:10px;padding-top:8px;align-items:center}
    .mev-c{
      width:22px;height:22px;border-radius:50%;cursor:pointer;
      border:2.5px solid transparent;transition:transform .15s,box-shadow .15s,border-color .15s;
    }
    .mev-c:hover{transform:scale(1.18);box-shadow:0 2px 8px rgba(0,0,0,.22)}
    .mev-c.mev-c-on{border-color:#1d4ed8;box-shadow:0 0 0 2.5px #bfdbfe}
    #evColor{width:24px;height:24px;border-radius:50%;border:1px solid #dbe2ea;cursor:pointer;padding:0;background:none}
    .mev-checkrow{grid-column:1/-1;display:flex;align-items:center;gap:.5rem;cursor:pointer;font-weight:600;font-size:.85rem;color:#0f172a}
    .mev-veh-fields{grid-column:1/-1;display:none;flex-direction:column;gap:12px;padding:14px;background:#f1f5f9;border-radius:14px}
    .mev-actions{display:flex;justify-content:flex-end;gap:12px;margin-top:22px;align-items:center}
    .mev-actions button{padding:12px 22px;border:none;border-radius:12px;cursor:pointer;font-size:.9rem;font-weight:600}
    .mev-btn-primary{background:linear-gradient(135deg,#2563eb,#1d4ed8);color:#fff}
    .mev-btn-primary:hover{filter:brightness(1.06)}
    .mev-btn-secondary{background:#eef2f7;color:#334155}
    .mev-btn-secondary:hover{background:#e2e8f0}
    .mev-btn-danger{background:#fee2e2;color:#dc2626;margin-right:auto}
    /* Multi-select résidents */
    .mev-multi-wrap{position:relative}
    .mev-multi-box{display:flex;align-items:center;gap:6px;min-height:44px;padding:6px 10px;border:1px solid #dbe2ea;border-radius:12px;background:#fff;cursor:pointer;transition:border-color .15s,box-shadow .15s;flex-wrap:wrap}
    .mev-multi-box:focus-within,.mev-multi-box.open{border-color:#2563eb;box-shadow:0 0 0 3px rgba(37,99,235,.13)}
    .mev-res-chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;background:#eff6ff;color:#2563eb;border-radius:20px;font-size:.75rem;font-weight:600;white-space:nowrap}
    .mev-res-chip button{background:none;border:none;cursor:pointer;color:#93c5fd;font-size:.85rem;padding:0;line-height:1;display:flex}
    .mev-res-chip button:hover{color:#2563eb}
    .mev-res-placeholder{font-size:.9rem;color:#94a3b8;padding:2px 2px}
    .mev-multi-chevron{margin-left:auto;flex-shrink:0;color:#94a3b8;transition:transform .15s}
    .mev-multi-box.open .mev-multi-chevron{transform:rotate(180deg)}
    .mev-multi-dropdown{position:absolute;top:calc(100% + 6px);left:0;right:0;background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 8px 30px rgba(0,0,0,.12);z-index:200;max-height:220px;overflow-y:auto;display:none}
    .mev-multi-dropdown.open{display:block}
    .mev-multi-item{display:flex;align-items:center;gap:10px;padding:9px 14px;cursor:pointer;font-size:.85rem;transition:background .12s}
    .mev-multi-item:hover{background:#f1f5f9}
    .mev-multi-item.selected{background:#eff6ff;color:#2563eb;font-weight:600}
    .mev-multi-item .mev-mi-check{width:16px;height:16px;border-radius:4px;border:2px solid #cbd5e1;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
    .mev-multi-item.selected .mev-mi-check{background:#2563eb;border-color:#2563eb}
    .mev-multi-item.selected .mev-mi-check::after{content:'✓';color:#fff;font-size:10px;font-weight:700}
    .mev-multi-all{border-bottom:1px solid #f1f5f9;color:#64748b;font-style:italic}
    /* Bouton véhicule */
    .mev-veh-toggle{display:flex;align-items:center;gap:10px;padding:11px 16px;border:2px solid #e2e8f0;border-radius:12px;background:#f8fafc;cursor:pointer;font-size:.85rem;font-weight:600;color:#64748b;transition:all .18s;width:100%;text-align:left}
    .mev-veh-toggle:hover{border-color:#cbd5e1;background:#f1f5f9}
    .mev-veh-toggle.veh-on{border-color:#2563eb;background:#eff6ff;color:#2563eb}
    .mev-veh-toggle .veh-pill{margin-left:auto;width:36px;height:20px;border-radius:999px;background:#cbd5e1;position:relative;transition:background .18s;flex-shrink:0}
    .mev-veh-toggle .veh-pill::after{content:'';position:absolute;top:3px;left:3px;width:14px;height:14px;border-radius:50%;background:#fff;transition:transform .18s;box-shadow:0 1px 3px rgba(0,0,0,.2)}
    .mev-veh-toggle.veh-on .veh-pill{background:#2563eb}
    .mev-veh-toggle.veh-on .veh-pill::after{transform:translateX(16px)}
    /* Toggle SERAFIN */
    .mev-serafin-toggle{display:flex;gap:6px;padding-top:4px}
    .mev-serafin-btn{flex:1;padding:9px 6px;border:2px solid #e2e8f0;border-radius:10px;background:#f8fafc;cursor:pointer;font-size:.75rem;font-weight:600;color:#64748b;text-align:center;transition:all .15s;line-height:1.3}
    .mev-serafin-btn:hover{border-color:#cbd5e1;background:#f1f5f9}
    .mev-serafin-btn.active-direct{border-color:#2563eb;background:#eff6ff;color:#2563eb}
    .mev-serafin-btn.active-indirect{border-color:#f59e0b;background:#fffbeb;color:#d97706}
    .mev-serafin-btn.active-nc{border-color:#94a3b8;background:#f1f5f9;color:#475569}
    .mev-btn-danger:hover{background:#fecaca}
    @media(max-width:600px){
      .mev-left{display:none}
      #modalEvent .modal.modal-event-modern{width:calc(100% - 1.5rem);border-radius:22px}
      .mev-grid{grid-template-columns:1fr}
    }

    /* ── Fenêtre de détails (effet flipYIn) ── */
    @keyframes flipYIn {
      0%   { transform: perspective(800px) rotateY(90deg); opacity: 0; }
      40%  { transform: perspective(800px) rotateY(-12deg); opacity: 1; }
      70%  { transform: perspective(800px) rotateY(6deg); }
      100% { transform: perspective(800px) rotateY(0deg); opacity: 1; }
    }
    .modal-overlay.open .modal.modal-flip{ animation: flipYIn .55s ease-out both; transform-origin:50% 50%; }
    /* ── Modal vue événement (nouveau design) ── */
    .evm-card{background:#fff;border-radius:24px;width:500px;max-width:calc(100% - 2rem);max-height:90vh;overflow-y:auto;padding:28px 28px 20px;position:relative}
    .evm-close-btn{position:absolute;top:18px;right:18px;width:32px;height:32px;border-radius:50%;background:#f1f5f9;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#64748b;transition:background .15s}
    .evm-close-btn:hover{background:#e2e8f0}
    .evm-close-btn svg{width:16px;height:16px}
    .evm-header{display:flex;align-items:flex-start;gap:16px;margin-bottom:22px;padding-right:40px}
    .evm-hicon{width:56px;height:56px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:26px;flex-shrink:0}
    .evm-htitle{font-size:1.25rem;font-weight:800;color:#0f172a;line-height:1.25;margin-bottom:6px}
    .evm-hbadge{display:inline-flex;align-items:center;gap:5px;padding:3px 10px;background:#f1f5f9;border-radius:20px;font-size:.72rem;font-weight:600;color:#475569}
    .evm-hbadge-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
    .evm-row{display:flex;align-items:center;gap:12px;padding:13px 15px;background:#f8fafc;border-radius:14px;margin-bottom:7px}
    .evm-row-icon{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .evm-row-icon svg{width:18px;height:18px}
    .evm-row-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
    .evm-row-body{flex:1;min-width:0}
    .evm-row-lbl{font-size:.64rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;margin-bottom:2px}
    .evm-row-val{font-size:.92rem;font-weight:500;color:#0f172a}
    .evm-row-ric{flex-shrink:0;color:#cbd5e1}
    .evm-row-ric svg{width:17px;height:17px}
    .evm-footer{display:flex;align-items:center;gap:10px;margin-top:22px;padding-top:18px;border-top:1px solid #f1f5f9}
    .evm-footer-left{display:flex;gap:8px;margin-right:auto}
    .evm-btn{padding:10px 18px;border-radius:12px;border:none;cursor:pointer;font-size:.88rem;font-weight:600;display:inline-flex;align-items:center;gap:6px;transition:filter .15s}
    .evm-btn:hover{filter:brightness(.96)}
    .evm-btn-danger{background:#fef2f2;color:#dc2626}
    .evm-btn-series{background:transparent;border:1.5px solid #ef4444;color:#ef4444}
    .evm-btn-close{background:#f1f5f9;color:#334155}
    .evm-btn-edit{background:linear-gradient(135deg,#1e3a8a,#1d4ed8);color:#fff}
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Planning</div></div>
      <div class="header-right">
        <button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button>
        <div class="planning-view-switch" style="display:flex;gap:.4rem;background:var(--g100);border-radius:var(--r-sm);padding:3px">
          <button class="btn btn-ghost btn-sm" id="viewDay">Jour</button>
          <button class="btn btn-sm" id="viewWeek" style="background:#fff;box-shadow:var(--shadow-sm)">Semaine</button>
          <button class="btn btn-ghost btn-sm" id="viewMonth">Mois</button>
          <button class="btn btn-ghost btn-sm" id="viewList">Liste</button>
        </div>
        <button class="btn btn-accent btn-add-resident" onclick="openModal('modalEvent')">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          <span class="btn-add-label">Nouvel événement</span>
        </button>
      </div>
    </header>

    <main class="content">
      <!-- Nav calendrier -->
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1.5rem">
        <button class="btn btn-outline btn-sm" id="prevBtn">&#8592;</button>

<script>
// ── Panneau gauche (aperçu) du modal « Nouvel évènement » ──
const _MEV_ICONS = { activite:'🎨', rdv:'🏥', sortie:'🚶', reunion:'👥', avenant:'📄', projet:'⭐', evaluation:'📊', autre:'📌' };
const _MEV_DUREE = { '30':'30 min','60':'1 heure','90':'1h 30','120':'2 heures','180':'3 heures','journee':'Journée' };

function updateMevPreview() {
  const type     = document.getElementById('evType')?.value || 'activite';
  const resSel   = document.getElementById('evResident');
  let resLabel;
  if (_mevResSelected && _mevResSelected.size > 0) {
    resLabel = Array.from(_mevResSelected).map(id => {
      const opt = resSel ? Array.from(resSel.options).find(o => o.value === id) : null;
      return opt ? opt.textContent : id;
    }).join(', ');
  } else {
    resLabel = 'Tous / Groupe';
  }
  const duree    = document.getElementById('evDuree')?.value || '60';
  const vehicule = document.getElementById('evVehiculeCheck')?.checked;

  // Icône centrale
  const elIcon = document.getElementById('mevPreviewIcon');
  if (elIcon) {
    elIcon.textContent = _MEV_ICONS[type] || '📅';
    elIcon.style.transform = 'scale(1.12)';
    setTimeout(() => { if (elIcon) elIcon.style.transform = ''; }, 200);
  }

  // Surbrillance du menu (Activité / Rendez-vous / Sortie)
  document.querySelectorAll('#mevMenu div').forEach(d => {
    d.classList.toggle('mev-menu-active', d.dataset.type === type);
  });

  // Résumé bas
  const elRes = document.getElementById('mevSumResTxt');
  const elDur = document.getElementById('mevSumDurTxt');
  const elVeh = document.getElementById('mevSumVeh');
  if (elRes) {
    if (_mevResSelected && _mevResSelected.size > 1) {
      elRes.innerHTML = Array.from(_mevResSelected).map(rid => {
        const opt = resSel ? Array.from(resSel.options).find(o => o.value === rid) : null;
        const name = opt ? opt.textContent : rid;
        return `<span style="display:block;background:rgba(255,255,255,.18);border-radius:6px;padding:2px 7px;margin-bottom:3px;font-size:.75rem;font-weight:600">${name}</span>`;
      }).join('');
    } else {
      elRes.textContent = resLabel;
    }
  }
  if (elDur) elDur.textContent = _MEV_DUREE[duree] || (duree + ' min');
  if (elVeh) elVeh.style.display = vehicule ? 'flex' : 'none';
}

const _SERAFIN_LABELS = { directe:'Prestation directe', indirecte:'Prestation indirecte', nc:'Non comptabilisé' };
const _SERAFIN_ICONS  = { directe:'🔵', indirecte:'🟡', nc:'⚪' };
const _SERAFIN_CLASS  = { directe:'active-direct', indirecte:'active-indirect', nc:'active-nc' };

// ── Multi-select résidents ──
let _mevResSelected = new Set();

function buildMevResDropdown() {
  const sel = document.getElementById('evResident');
  const drop = document.getElementById('mevResDropdown');
  if (!sel || !drop) return;
  drop.innerHTML = '';
  // Option "Tous / Groupe"
  const allItem = document.createElement('div');
  allItem.className = 'mev-multi-item mev-multi-all' + (_mevResSelected.size === 0 ? ' selected' : '');
  allItem.innerHTML = `<span class="mev-mi-check"></span>Tous / Groupe`;
  allItem.onclick = (e) => { e.stopPropagation(); _mevResSelected.clear(); renderMevResChips(); buildMevResDropdown(); syncMevResHiddenSelect(); updateMevPreview(); };
  drop.appendChild(allItem);
  // Résidents
  Array.from(sel.options).forEach(opt => {
    if (!opt.value) return;
    const item = document.createElement('div');
    const on = _mevResSelected.has(opt.value);
    item.className = 'mev-multi-item' + (on ? ' selected' : '');
    item.dataset.id = opt.value;
    item.innerHTML = `<span class="mev-mi-check"></span>${opt.textContent}`;
    item.onclick = (e) => { e.stopPropagation(); toggleMevResResident(opt.value, opt.textContent); };
    drop.appendChild(item);
  });
}

function toggleMevResResident(id, label) {
  if (_mevResSelected.has(id)) _mevResSelected.delete(id);
  else _mevResSelected.add(id);
  renderMevResChips();
  buildMevResDropdown();
  syncMevResHiddenSelect();
  updateMevPreview();
}

function renderMevResChips() {
  const el = document.getElementById('mevResChips');
  if (!el) return;
  if (_mevResSelected.size === 0) {
    el.innerHTML = '<span class="mev-res-placeholder">Tous / Groupe</span>';
    return;
  }
  const sel = document.getElementById('evResident');
  el.innerHTML = Array.from(_mevResSelected).map(id => {
    const opt = Array.from(sel.options).find(o => o.value === id);
    const name = opt ? opt.textContent : id;
    return `<span class="mev-res-chip">${name}<button type="button" onclick="event.stopPropagation();toggleMevResResident('${id}')">×</button></span>`;
  }).join('');
}

function syncMevResHiddenSelect() {
  const sel = document.getElementById('evResident');
  if (!sel) return;
  const first = Array.from(_mevResSelected)[0] || '';
  sel.value = first;
}

function toggleMevResDropdown(e) {
  if (e) e.stopPropagation();
  const box = document.getElementById('mevResBox');
  const drop = document.getElementById('mevResDropdown');
  if (!box || !drop) return;
  const isOpen = drop.classList.contains('open');
  if (!isOpen) buildMevResDropdown();
  drop.classList.toggle('open', !isOpen);
  box.classList.toggle('open', !isOpen);
}

document.addEventListener('click', (e) => {
  const wrap = document.querySelector('.mev-multi-wrap');
  if (wrap && !wrap.contains(e.target)) {
    document.getElementById('mevResDropdown')?.classList.remove('open');
    document.getElementById('mevResBox')?.classList.remove('open');
  }
});

function toggleMevVehicule() {
  const cb  = document.getElementById('evVehiculeCheck');
  const btn = document.getElementById('evVehiculeToggle');
  const fields = document.getElementById('evVehiculeFields');
  if (!cb) return;
  cb.checked = !cb.checked;
  btn.classList.toggle('veh-on', cb.checked);
  if (fields) fields.style.display = cb.checked ? 'flex' : 'none';
  updateMevPreview();
}

function syncVehiculeToggle() {
  const cb  = document.getElementById('evVehiculeCheck');
  const btn = document.getElementById('evVehiculeToggle');
  if (cb && btn) btn.classList.toggle('veh-on', cb.checked);
}

function selectMevSerafin(val) {
  const sel = document.getElementById('evSerafin');
  if (sel) sel.value = val;
  document.querySelectorAll('.mev-serafin-btn').forEach(b => {
    b.classList.remove('active-direct','active-indirect','active-nc');
    if (b.dataset.serafin === val) b.classList.add(_SERAFIN_CLASS[val]);
  });
  const elIcon = document.getElementById('mevSumSerafin');
  const elTxt  = document.getElementById('mevSumSerafinTxt');
  if (elIcon) elIcon.firstChild.textContent = _SERAFIN_ICONS[val] + ' ';
  if (elTxt)  elTxt.textContent = _SERAFIN_LABELS[val] || val;
}

function selectMevType(type) {
  const sel = document.getElementById('evType');
  if (sel) sel.value = type;
  updateMevPreview();
}

function selectMevColor(color) {
  const inp = document.getElementById('evColor');
  if (inp) inp.value = color;
  document.querySelectorAll('.mev-c').forEach(d => {
    d.classList.toggle('mev-c-on', d.dataset.color === color);
  });
}

// Patch saveEvent pour inclure serafin, lieu et résidents (multi)
const _origSaveEvent = window.saveEvent;
window.saveEvent = function() {
  const serafin     = document.getElementById('evSerafin')?.value || 'directe';
  const lieu        = document.getElementById('evLieu')?.value.trim() || '';
  const editId      = document.getElementById('eventId')?.value || '';
  const sel         = document.getElementById('evResident');
  const residentIds = Array.from(_mevResSelected);
  const residentNames = residentIds.map(id => {
    const opt = sel ? Array.from(sel.options).find(o => o.value === id) : null;
    return opt ? opt.textContent : id;
  });
  const beforeIds = new Set((DB.get(DB.keys.planning) || []).map(e => e.id));
  if (typeof _origSaveEvent === 'function') _origSaveEvent();
  const events = DB.get(DB.keys.planning) || [];
  let changed = false;
  events.forEach(ev => {
    const isTarget = editId ? String(ev.id) === String(editId) : !beforeIds.has(ev.id);
    if (isTarget) {
      ev.serafin       = serafin;
      ev.lieu          = lieu;
      ev.residentIds   = residentIds;
      ev.residentNames = residentNames;
      changed = true;
    }
  });
  if (changed) DB.set(DB.keys.planning, events);
};

// Patch editEvent pour restaurer le champ serafin
const _origEditEvent = window.editEvent;
window.editEvent = function(id) {
  if (typeof _origEditEvent === 'function') _origEditEvent(id);
  setTimeout(() => {
    const events = DB.get(DB.keys.planning) || [];
    const ev = events.find(e => String(e.id) === String(id));
    if (ev) {
      selectMevSerafin(ev.serafin || 'directe');
      const lieu = document.getElementById('evLieu');
      if (lieu) lieu.value = ev.lieu || '';
      _mevResSelected = new Set(ev.residentIds || (ev.residentId ? [ev.residentId] : []));
      renderMevResChips();
      syncMevResHiddenSelect();
    }
  }, 50);
};

function resetModalEvent() {
  _mevResSelected = new Set();
  renderMevResChips();
  syncMevResHiddenSelect();
  selectMevSerafin('directe');
  selectMevType('activite');
  const lieu = document.getElementById('evLieu');
  if (lieu) lieu.value = '';
  const cb  = document.getElementById('evVehiculeCheck');
  const btn = document.getElementById('evVehiculeToggle');
  const fields = document.getElementById('evVehiculeFields');
  if (cb) cb.checked = false;
  if (btn) btn.classList.remove('veh-on');
  if (fields) fields.style.display = 'none';
  document.getElementById('mevResDropdown')?.classList.remove('open');
  document.getElementById('mevResBox')?.classList.remove('open');
}

const _origCloseModal = window.closeModal;
window.closeModal = function(id) {
  if (typeof _origCloseModal === 'function') _origCloseModal(id);
  if (id === 'modalEvent') resetModalEvent();
};

const _origCloseAllModals = window.closeAllModals;
window.closeAllModals = function() {
  if (typeof _origCloseAllModals === 'function') _origCloseAllModals();
  resetModalEvent();
};

// ── Synchronisation Activités → Planning ──
const _ACT_CAT_COLORS = { sportive:'#16a34a', creative:'#db2777', culturelle:'#8b5cf6', scolaire:'#0369a1', autonomie:'#d97706', sortie:'#0d9488', citoyennete:'#6366f1', autre:'#64748b' };
const _ACT_CAT_ICONS  = { sportive:'⚽', creative:'🎨', culturelle:'🎭', scolaire:'📚', autonomie:'🧺', sortie:'🚌', citoyennete:'🗳️', autre:'✨' };
const _JOUR_DOW = { Lundi:1, Mardi:2, Mercredi:3, Jeudi:4, Vendredi:5, Samedi:6, Dimanche:0 };

function _calcDureeAct(debut, fin) {
  if (!debut || !fin) return '60';
  const [h1,m1] = debut.split(':').map(Number);
  const [h2,m2] = fin.split(':').map(Number);
  const d = (h2*60+m2)-(h1*60+m1);
  return d > 0 ? String(d) : '60';
}

function _generateActVirtualEvents() {
  const activites = (DB.get(DB.keys.activites)||[]).filter(a => a.actif !== false && _JOUR_DOW[a.jour] !== undefined);
  if (!activites.length) return [];
  const now = new Date();
  const start = new Date(now); start.setDate(start.getDate()-30);
  const end   = new Date(now); end.setDate(end.getDate()+90);
  const result = [];
  activites.forEach(act => {
    const dow   = _JOUR_DOW[act.jour];
    const color = _ACT_CAT_COLORS[act.categorie] || '#3b82f6';
    const icon  = _ACT_CAT_ICONS[act.categorie]  || '✨';
    const d = new Date(start);
    d.setDate(d.getDate() + ((dow - d.getDay() + 7) % 7));
    while (d <= end) {
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      result.push({
        id: `act_${act.id}_${ds}`,
        titre: `${icon} ${act.nom}`,
        date: ds,
        time: act.heureDebut || '09:00',
        heure: act.heureDebut || '09:00',
        duree: _calcDureeAct(act.heureDebut, act.heureFin),
        type: 'activite',
        color, lieu: act.lieu||'', residentName: act.animateur||'',
        _isVirtual: true, _activiteId: act.id
      });
      d.setDate(d.getDate()+7);
    }
  });
  return result;
}

const _origGetFilteredEvents = window.getFilteredEvents;
window.getFilteredEvents = function() {
  const base = typeof _origGetFilteredEvents === 'function' ? _origGetFilteredEvents() : [];
  return [...base, ..._generateActVirtualEvents()];
};

function _evmRow(label, value, color, svgKey) {
  if (!value) return '';
  return `<div class="evm-row">
    <div class="evm-row-icon" style="background:${color}1a;color:${color}">${_EVM_SVG[svgKey]||''}</div>
    <span class="evm-row-dot" style="background:${color}"></span>
    <div class="evm-row-body">
      <div class="evm-row-lbl" style="color:${color}">${label}</div>
      <div class="evm-row-val">${value}</div>
    </div>
    <div class="evm-row-ric" style="color:${color}40">${_EVM_SVG[svgKey]||''}</div>
  </div>`;
}

function _evmRender({ iconEmoji, iconBg, titre, badgeLabel, badgeColor, rows, isVirtual }) {
  const editBtn   = document.getElementById('evViewEdit');
  const delBtn    = document.getElementById('evViewDelete');
  const seriesBtn = document.getElementById('evViewDeleteSeries');
  if (editBtn)   editBtn.style.display   = isVirtual ? 'none' : '';
  if (delBtn)    delBtn.style.display    = isVirtual ? 'none' : '';
  if (seriesBtn && isVirtual) seriesBtn.style.display = 'none';
  document.getElementById('evViewContent').innerHTML =
    `<div class="evm-header">
      <div class="evm-hicon" style="background:${iconBg}">${iconEmoji}</div>
      <div>
        <div class="evm-htitle">${escHtml(titre)}</div>
        <span class="evm-hbadge"><span class="evm-hbadge-dot" style="background:${badgeColor}"></span>${escHtml(badgeLabel)}</span>
      </div>
    </div>
    ${rows.join('')}`;
}

window.viewEvent = function(id) {
  // ── Activité récurrente virtuelle ──
  if (String(id).startsWith('act_')) {
    const actId = id.split('_')[1];
    const act   = (DB.get(DB.keys.activites)||[]).find(a => a.id === actId);
    if (!act) return;
    const color    = _ACT_CAT_COLORS[act.categorie]||'#3b82f6';
    const icon     = _ACT_CAT_ICONS[act.categorie]||'✨';
    const inscrits = (DB.get(DB.keys.residents)||[]).filter(r=>(r.activites||[]).some(i=>String(i.activiteId)===String(actId)&&i.statut==='active')).length;
    _evmRender({
      iconEmoji: icon, iconBg: color, titre: act.nom,
      badgeLabel: `Activité récurrente · ${act.jour}`, badgeColor: color,
      isVirtual: true,
      rows: [
        _evmRow('HORAIRE',   [act.heureDebut, act.heureFin].filter(Boolean).join(' – '), '#8b5cf6', 'clock'),
        _evmRow('LIEU',      act.lieu ? escHtml(act.lieu) : '', '#f59e0b', 'location'),
        _evmRow('ANIMATEUR', act.animateur ? escHtml(act.animateur) : '', '#3b82f6', 'person'),
        _evmRow('INSCRITS',  `${inscrits} résident${inscrits!==1?'s':''}`, '#ec4899', 'people'),
        _evmRow('DESCRIPTION', act.description ? escHtml(act.description) : '', '#6366f1', 'doc'),
      ]
    });
    openModal('modalEventView');
    return;
  }

  // ── Événement normal ──
  const ev = (DB.get(DB.keys.planning)||[]).find(e => e.id === id);
  if (!ev) return;
  const color  = ev.color || (typeof TYPE_COLORS !== 'undefined' ? TYPE_COLORS[ev.type] : '') || '#3b82f6';
  const typeLabel = (typeof TYPE_LABELS !== 'undefined' ? TYPE_LABELS[ev.type] : '') || ev.type || 'Événement';
  const icon   = (typeof _MEV_ICONS !== 'undefined' ? _MEV_ICONS[ev.type] : '') || '📅';
  const dureeLabels = {'30':'30 min','60':'1h','90':'1h30','120':'2h','180':'3h','journee':'Journée'};
  const heure  = (ev.heure||ev.time||'').slice(0,5);
  const duree  = dureeLabels[ev.duree] || (ev.duree ? ev.duree+' min' : '');
  const horaire = [heure, duree].filter(Boolean).join(' · ');
  // Résidents (multi ou simple)
  const resNames = ev.residentNames?.length ? ev.residentNames : (ev.residentName ? [ev.residentName] : []);
  const resRowHtml = (() => {
    if (!resNames.length) return _evmRow('RÉSIDENT', 'Tous / Groupe', '#3b82f6', 'person');
    const chips = resNames.map(n =>
      `<span style="display:inline-flex;align-items:center;padding:3px 10px;background:#eff6ff;color:#2563eb;border-radius:20px;font-size:.78rem;font-weight:600;white-space:nowrap">${escHtml(n)}</span>`
    ).join('');
    return `<div class="evm-row">
      <div class="evm-row-icon" style="background:#3b82f61a;color:#3b82f6">${_EVM_SVG.person}</div>
      <span class="evm-row-dot" style="background:#3b82f6"></span>
      <div class="evm-row-body">
        <div class="evm-row-lbl" style="color:#3b82f6">RÉSIDENT${resNames.length > 1 ? 'S' : ''}</div>
        <div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:4px">${chips}</div>
      </div>
    </div>`;
  })();

  _evmRender({
    iconEmoji: icon, iconBg: color, titre: ev.titre || 'Événement',
    badgeLabel: typeLabel, badgeColor: color,
    isVirtual: false,
    rows: [
      resRowHtml,
      _evmRow('DATE',        ev.date ? (typeof formatDate==='function'?formatDate(ev.date):ev.date) : '', '#10b981', 'calendar'),
      _evmRow('HORAIRE',     horaire, '#8b5cf6', 'clock'),
      _evmRow('LIEU',        ev.lieu ? escHtml(ev.lieu) : '', '#f59e0b', 'location'),
      ev.vehicule ? _evmRow('VÉHICULE',    escHtml(ev.vehicule), '#6366f1', 'car') : '',
      ev.destination ? _evmRow('DESTINATION', escHtml(ev.destination), '#6366f1', 'pin') : '',
      _evmRow('DESCRIPTION', ev.desc ? escHtml(ev.desc) : '', '#6366f1', 'doc'),
    ]
  });

  const editBtn   = document.getElementById('evViewEdit');
  const delBtn    = document.getElementById('evViewDelete');
  const seriesBtn = document.getElementById('evViewDeleteSeries');
  if (editBtn)  editBtn.onclick  = () => { closeModal('modalEventView'); editEvent(id); };
  if (delBtn)   delBtn.onclick   = () => { document.getElementById('eventId').value = id; deleteEvent(); };
  if (seriesBtn) {
    if (ev.recurId) {
      const cnt = (DB.get(DB.keys.planning)||[]).filter(e => e.recurId === ev.recurId).length;
      seriesBtn.style.display = '';
      seriesBtn.textContent = `↻ Série (${cnt})`;
      seriesBtn.onclick = () => deleteEventSeries(ev.recurId);
    } else { seriesBtn.style.display = 'none'; }
  }
  openModal('modalEventView');
};

// ── Toggle sidebar calendriers ──
function togglePlSidebar() {
  const sidebar = document.getElementById('planningSidebar');
  const btn = document.getElementById('sidebarToggleBtn');
  if (!sidebar) return;
  const hidden = sidebar.classList.toggle('pl-sidebar-hidden');
  btn.classList.toggle('active', !hidden);
  localStorage.setItem('pl_sidebar_hidden', hidden ? '1' : '0');
}
(function() {
  if (localStorage.getItem('pl_sidebar_hidden') === '1') {
    const sidebar = document.getElementById('planningSidebar');
    const btn = document.getElementById('sidebarToggleBtn');
    if (sidebar) sidebar.classList.add('pl-sidebar-hidden');
    if (btn) btn.classList.remove('active');
  } else {
    document.getElementById('sidebarToggleBtn')?.classList.add('active');
  }
})();

// Sync le panneau gauche à l'ouverture du modal (création ET édition)
const _origOpenModal = window.openModal;
window.openModal = function(id) {
  if (typeof _origOpenModal === 'function') _origOpenModal(id);
  if (id === 'modalEvent') {
    setTimeout(() => {
      // Reset si nouvel événement (avant updateMevPreview)
      if (!document.getElementById('eventId')?.value) {
        _mevResSelected = new Set();
        renderMevResChips();
        syncMevResHiddenSelect();
        const lieu = document.getElementById('evLieu');
        if (lieu) lieu.value = '';
      }
      updateMevPreview();
      selectMevColor(document.getElementById('evColor')?.value || '#2563eb');
      selectMevSerafin(document.getElementById('evSerafin')?.value || 'directe');
      syncVehiculeToggle();
    }, 30);
  }
};
