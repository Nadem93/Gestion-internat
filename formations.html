<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Plan de formation — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info"><div class="header-title">Plan de formation</div></div>
    <div class="header-right"><button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button></div>
  </header>
  <main class="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
      <div>
        <div style="font-weight:700;font-size:1rem">🎓 Plan de formation collectif</div>
        <div style="font-size:.78rem;color:var(--muted)">Recensement des besoins et suivi des actions de formation de l'équipe</div>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn btn-primary admin-only" onclick="openFormationModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouvelle formation
        </button>
      </div>
    </div>

    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;gap:1rem;padding:.75rem 1rem;flex-wrap:wrap">
        <div style="flex:1;text-align:center;min-width:90px"><div id="frmStatPlanifiees" style="font-weight:800;font-size:1.4rem;color:#d97706">0</div><div style="font-size:.72rem;color:var(--muted)">Planifiées</div></div>
        <div style="flex:1;text-align:center;min-width:90px"><div id="frmStatRealisees" style="font-weight:800;font-size:1.4rem;color:#16a34a">0</div><div style="font-size:.72rem;color:var(--muted)">Réalisées</div></div>
        <div style="flex:1;text-align:center;min-width:90px"><div id="frmStatParticipants" style="font-weight:800;font-size:1.4rem;color:#0f2b4a">0</div><div style="font-size:.72rem;color:var(--muted)">Participations</div></div>
        <div style="flex:1;text-align:center;min-width:90px"><div id="frmStatBudget" style="font-weight:800;font-size:1.4rem;color:#7c2d12">0,00 €</div><div style="font-size:.72rem;color:var(--muted)">Budget engagé</div></div>
      </div>
    </div>

    <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap">
      <select id="frmFiltreAnnee" class="form-input" style="width:140px" onchange="renderFormations()"><option value="">Toutes les années</option></select>
      <select id="frmFiltreDomaine" class="form-input" style="width:240px" onchange="renderFormations()"><option value="">Tous les domaines</option></select>
      <select id="frmFiltreStatut" class="form-input" style="width:160px" onchange="renderFormations()">
        <option value="">Tous les statuts</option>
        <option value="planifiee">Planifiée</option>
        <option value="realisee">Réalisée</option>
        <option value="annulee">Annulée</option>
      </select>
    </div>

    <div id="frmList"><div class="empty" style="padding:3rem;text-align:center"><p>Aucune formation enregistrée</p></div></div>
  </main>
</div></div>
<div id="toast-container" class="toast-container"></div>

<div class="modal-overlay" id="modalFormation">
  <div class="modal" style="max-width:600px">
    <div class="modal-header">
      <span class="modal-title" id="frmModalTitle">🎓 Nouvelle formation</span>
      <button class="modal-close" onclick="closeModal('modalFormation')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:.75rem">
      <div class="form-group"><label>Intitulé *</label><input type="text" id="frmFormTitre" class="form-input" placeholder="Ex: PSC1 — Prévention et secours civiques"/></div>
      <div class="form-row">
        <div class="form-group"><label>Organisme / prestataire</label><input type="text" id="frmFormOrganisme" class="form-input" placeholder="Nom de l'organisme de formation"/></div>
        <div class="form-group"><label>Domaine</label>
          <select id="frmFormDomaine" class="form-input">
            <option value="Sécurité & gestes d'urgence">Sécurité & gestes d'urgence</option>
            <option value="Accompagnement éducatif & pédagogique">Accompagnement éducatif & pédagogique</option>
            <option value="Communication & gestion des conflits">Communication & gestion des conflits</option>
            <option value="Hygiène, santé & soins">Hygiène, santé & soins</option>
            <option value="Réglementation & droit des usagers">Réglementation & droit des usagers</option>
            <option value="Numérique & outils professionnels">Numérique & outils professionnels</option>
            <option value="Management & encadrement">Management & encadrement</option>
            <option value="Autre">Autre</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date de début *</label><input type="date" id="frmFormDateDebut" class="form-input"/></div>
        <div class="form-group"><label>Date de fin</label><input type="date" id="frmFormDateFin" class="form-input"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Durée (heures)</label><input type="number" id="frmFormDuree" class="form-input" min="0" step="0.5" placeholder="0"/></div>
        <div class="form-group"><label>Coût (€)</label><input type="number" id="frmFormCout" class="form-input" min="0" step="0.01" placeholder="0.00"/></div>
        <div class="form-group"><label>Statut</label>
          <select id="frmFormStatut" class="form-input">
            <option value="planifiee">Planifiée</option>
            <option value="realisee">Réalisée</option>
            <option value="annulee">Annulée</option>
          </select>
        </div>
      </div>
      <div class="form-group">
        <label>Participants</label>
        <div id="frmFormParticipants" style="display:flex;flex-direction:column;gap:.3rem;max-height:160px;overflow-y:auto;border:1px solid var(--border);border-radius:8px;padding:.5rem .75rem"></div>
      </div>
      <div class="form-group"><label>Notes / objectifs</label><textarea id="frmFormNotes" class="form-input" rows="2" placeholder="Objectifs de la formation, remarques…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="frmDeleteBtn" style="color:var(--red);margin-right:auto;display:none" onclick="supprimerFormation()">Supprimer</button>
      <button class="btn btn-ghost" onclick="closeModal('modalFormation')">Annuler</button>
      <button class="btn btn-primary" onclick="saveFormation()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/formations.js"></script>
<script>Auth.requireAuth(); if (!requireModule('access_formations')) { document.querySelector('.content').innerHTML = ''; }</script>
</body></html>
