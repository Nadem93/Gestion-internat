<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Planning équipe — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    @media print {
      .header, #toast-container, .modal-overlay, .card:not(#peGrid), #peLegend { display: none !important; }
      #peGrid { border: none !important; box-shadow: none !important; }
      body, .main, .content { background: #fff !important; }
      table { font-size: .68rem !important; }
    }
  </style>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info"><div class="header-title">📅 Planning équipe</div></div>
    <div class="header-right">
        <button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button>
      <button class="btn btn-outline btn-sm admin-only" onclick="openImportPlanning()">📥 Importer</button>
    </div>
  </header>
  <main class="content">
    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;align-items:center;justify-content:space-between;padding:.75rem 1rem;gap:1rem;flex-wrap:wrap">
        <div style="display:flex;align-items:center;gap:.4rem">
          <button class="btn btn-icon btn-outline" onclick="pePrevWeek()" title="Semaine précédente">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button class="btn btn-outline btn-sm" onclick="peToday()">Aujourd'hui</button>
          <button class="btn btn-icon btn-outline" onclick="peNextWeek()" title="Semaine suivante">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
          <div style="display:flex;gap:.25rem;margin-left:.5rem">
            <button class="btn btn-sm btn-primary" id="peViewWeekBtn" onclick="peSetView('semaine')">Semaine</button>
            <button class="btn btn-sm btn-outline" id="peViewMonthBtn" onclick="peSetView('mois')">Mois</button>
          </div>
          <select id="peMetierFilter" class="form-input" style="max-width:170px;margin-left:.5rem" onchange="peSetMetierFilter(this.value)">
            <option value="">Tous les métiers</option>
          </select>
        </div>
        <div id="peWeekLabel" style="font-weight:700;font-size:.95rem"></div>
        <div style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap">
          <div id="peHint" style="font-size:.78rem;color:var(--muted)"></div>
          <button class="btn btn-outline btn-sm" id="peCopyBtn" onclick="peCopyPreviousWeek()" style="display:none">📋 Copier semaine -1</button>
          <button class="btn btn-outline btn-sm" onclick="peExportCsv()">📊 Exporter CSV</button>
          <button class="btn btn-outline btn-sm" onclick="window.print()">🖨 Imprimer</button>
        </div>
      </div>
    </div>
    <div id="peLegend" style="display:flex;flex-wrap:wrap;gap:.4rem 1.1rem;align-items:center;margin:0 0 .85rem;padding:.55rem .85rem;background:var(--g50,#f8fafc);border:1px solid var(--border);border-radius:10px;font-size:.74rem;color:var(--muted)">
      <span style="font-weight:700;text-transform:uppercase;letter-spacing:.04em;font-size:.68rem;color:var(--muted)">Pointage (bordure gauche) — couleur de fond = type de créneau</span>
      <span style="display:inline-flex;align-items:center;gap:.35rem"><span style="width:11px;height:11px;border-radius:3px;background:#16a34a"></span> Validé conforme</span>
      <span style="display:inline-flex;align-items:center;gap:.35rem"><span style="width:11px;height:11px;border-radius:3px;background:#9333ea"></span> Écart (retard / horaires différents)</span>
      <span style="display:inline-flex;align-items:center;gap:.35rem"><span style="width:11px;height:11px;border-radius:3px;background:#d97706"></span> À valider / en attente</span>
      <span style="display:inline-flex;align-items:center;gap:.35rem"><span style="width:11px;height:11px;border-radius:3px;background:#dc2626"></span> Absence / arrêt</span>
    </div>
    <div id="peGrid" class="card"><div class="card-body" style="padding:0;overflow-x:auto">
      <div class="empty" style="padding:3rem;text-align:center">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="width:40px;height:40px;margin:0 auto .75rem;color:var(--g300)"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        <p>Chargement du planning…</p>
      </div>
    </div></div>
  </main>
</div></div>
<div id="toast-container" class="toast-container"></div>

<div class="modal-overlay" id="modalPeShift">
  <div class="modal">
    <div class="modal-header">
      <span class="modal-title" id="psTitle">Créneau</span>
      <button class="modal-close" onclick="closeModal('modalPeShift')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body">
      <div>
        <div id="psEmploye" style="font-weight:700;font-size:.9rem"></div>
        <div id="psDate" style="font-size:.78rem;color:var(--muted)"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Début</label><input type="time" id="psDebut"/></div>
        <div class="form-group"><label>Fin</label><input type="time" id="psFin"/></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="psDeleteBtn" onclick="deletePeShift()" style="display:none;color:var(--red);margin-right:auto">🗑 Supprimer</button>
      <button class="btn btn-ghost" onclick="closeModal('modalPeShift')">Annuler</button>
      <button class="btn btn-primary" onclick="savePeShift()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/employes-supabase.js"></script>
<script src="js/absences-supabase.js"></script>
<script src="js/conges-supabase.js"></script>
<script src="js/pointages-supabase.js"></script>
<script src="js/planning-equipe-supabase.js"></script>
<script src="js/planning-equipe.js"></script>
<script>Auth.requireAuth(); if (!requireModule('access_planning_equipe')) { document.querySelector('.content').innerHTML = ''; }</script>
</body></html>
