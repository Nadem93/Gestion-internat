<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Espace famille — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    .fam-doc-row{display:flex;align-items:center;gap:.75rem;padding:.85rem 1rem;background:#fff;border-radius:10px;margin-bottom:.5rem;box-shadow:0 2px 6px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
    .fam-doc-ico{width:38px;height:38px;border-radius:10px;background:#eef2ff;color:#4338ca;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  </style>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info"><div class="header-title">👨‍👩‍👧 Espace famille</div></div>
    <div class="header-right"><button class="btn btn-ghost btn-sm" onclick="Auth.logout()">Déconnexion</button></div>
  </header>
  <main class="content">
    <div style="max-width:720px;margin:0 auto">
      <div id="famWelcome" style="margin-bottom:1.5rem"></div>
      <div id="famResidents"></div>
    </div>
  </main>
</div></div>
<div id="toast-container" class="toast-container"></div>

<script src="js/app.js"></script>
<script>Auth.requireAuth();</script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/famille-supabase.js"></script>
<script>
  const FAM_CATEGORY_LABEL = { admin: 'Administratif', medical: 'Médical', scolaire: 'Scolaire', autre: 'Autre' };

  (function () {
    const s = Auth.getSession();
    const el = document.getElementById('famWelcome');
    if (!s || !el) return;
    const prenom = (s.prenom || '').trim();
    el.innerHTML = `<div style="font-size:1.25rem;font-weight:800;color:var(--primary)">Bonjour${prenom ? ' ' + escHtml(prenom) : ''} 👋</div>
      <div style="font-size:.84rem;color:var(--muted);margin-top:.25rem">Voici les documents que l'établissement a choisi de partager avec vous.</div>`;
  })();

  async function renderFamille() {
    const docs = await sbGetMesDocumentsFamille();
    const el = document.getElementById('famResidents');
    if (!docs.length) {
      el.innerHTML = '<div class="empty" style="padding:3rem;text-align:center"><p>Aucun document partagé pour le moment.</p></div>';
      return;
    }
    const byResident = {};
    docs.forEach(d => { (byResident[d.residentNom] ||= []).push(d); });
    el.innerHTML = Object.entries(byResident).map(([nom, list]) => `
      <div class="card" style="margin-bottom:1.25rem">
        <div class="card-header"><span class="card-title">${escHtml(nom)}</span></div>
        <div class="card-body">
          ${list.map(d => `<div class="fam-doc-row">
            <span class="fam-doc-ico">📄</span>
            <div style="flex:1;min-width:0">
              <div style="font-weight:600;font-size:.86rem">${escHtml(d.documentName || 'Document')}</div>
              <div style="font-size:.72rem;color:var(--muted)">${escHtml(FAM_CATEGORY_LABEL[d.category] || d.category || '')}${d.docDate ? ' · ' + formatDate(d.docDate) : ''}</div>
            </div>
            <button class="btn btn-outline btn-sm" onclick="famOpenDocument('${d.documentId}')">Ouvrir</button>
          </div>`).join('')}
        </div>
      </div>`).join('');
  }

  async function famOpenDocument(documentId) {
    const url = await sbGetDocumentUrlFamille(documentId);
    if (url) window.open(url, '_blank');
  }

  document.addEventListener('DOMContentLoaded', renderFamille);
</script>
</body></html>
