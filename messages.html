<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Messages — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    /* ── Layout ── */
    .msg-wrap{display:grid;grid-template-columns:400px 1fr;height:calc(100vh - 112px);min-height:500px;border-radius:16px;overflow:hidden;background:#fff;box-shadow:0 2px 24px rgba(0,0,0,.08)}

    /* ══════════════════════════════════════
       PANNEAU GAUCHE
    ══════════════════════════════════════ */
    .msg-left{background:#fff;border-right:1px solid #f0f0f0;display:flex;flex-direction:column;overflow:hidden}

    /* Dropdown "All Chat" */
    .ml-dropdown{display:flex;align-items:center;justify-content:space-between;padding:.7rem .9rem;margin:.85rem .9rem .5rem;border:1.5px solid #e8e8e8;border-radius:10px;cursor:pointer;font-size:.87rem;font-weight:500;color:#1a1a2e;user-select:none;transition:border-color .15s}
    .ml-dropdown:hover{border-color:#b0aaf7}
    .ml-dropdown svg{width:15px;height:15px;stroke:#999;stroke-width:2;fill:none;flex-shrink:0}

    /* Barre de recherche */
    .ml-search{padding:0 .9rem .65rem;position:relative}
    .ml-search svg{position:absolute;left:1.55rem;top:50%;transform:translateY(-50%);width:14px;height:14px;stroke:#bbb;stroke-width:2;fill:none;pointer-events:none}
    .ml-search input{width:100%;padding:.52rem .8rem .52rem 2.15rem;border:1.5px solid #ebebeb;border-radius:10px;font-size:.83rem;background:#fafafa;outline:none;color:#1a1a2e;box-sizing:border-box;transition:border-color .15s,background .15s}
    .ml-search input:focus{border-color:#7c6ff7;background:#fff}

    /* Onglets : All (n) uniquement */
    .ml-tabs{display:flex;gap:0;padding:0 .9rem .55rem;border-bottom:1px solid #f0f0f0}
    .ml-tab{padding:.3rem .8rem;font-size:.8rem;font-weight:600;color:#5b5fc7;border-bottom:2px solid #5b5fc7;cursor:default}

    /* En-tête de section Épinglés / Récents */
    .ml-section{display:flex;align-items:center;justify-content:space-between;padding:.65rem .9rem .25rem;margin-top:.15rem}
    .ml-section-label{font-size:.78rem;font-weight:700;color:#1a1a2e;letter-spacing:.01em}
    .ml-section-chevron{color:#bbb;font-size:.7rem;cursor:pointer;user-select:none}

    /* Liste des conversations */
    .chat-convs{flex:1;overflow-y:auto;min-height:0}

    /* Item de conversation */
    .chat-conv{display:flex;align-items:center;gap:.75rem;padding:.6rem .9rem;cursor:pointer;position:relative;border-left:3px solid transparent;transition:background .1s,border-color .1s}
    .chat-conv:hover{background:#f8f8fd}
    .chat-conv.active{background:#f3f3fb;border-left-color:#5b5fc7}

    /* Avatar avec point online */
    .chat-conv-av-wrap{position:relative;flex-shrink:0}
    .chat-conv-avatar{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.82rem;color:#fff}
    .chat-conv-online{position:absolute;bottom:1px;right:1px;width:11px;height:11px;border-radius:50%;background:#22c55e;border:2px solid #fff}

    /* Infos conversation */
    .chat-conv-info{flex:1;min-width:0}
    .chat-conv-name{font-weight:600;font-size:.87rem;color:#1a1a2e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .chat-conv-preview{font-size:.76rem;color:#9e9e9e;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

    /* Meta droite */
    .chat-conv-meta{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
    .chat-conv-time{font-size:.72rem;color:#b0b0b0}
    .chat-conv-badge{background:#22c55e;color:#fff;font-size:.6rem;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 5px;box-sizing:border-box}
    .chat-conv-pin{font-size:.78rem;color:#c8c8d8}

    /* Bouton supprimer (hover) */
    .chat-conv-del{opacity:0;position:absolute;right:.6rem;top:50%;transform:translateY(-50%);width:22px;height:22px;border-radius:50%;border:none;background:#ff3b30;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;padding:0;transition:opacity .12s}
    .chat-conv-del svg{width:9px;height:9px;stroke:currentColor;stroke-width:3;fill:none}
    .chat-conv:hover .chat-conv-del{opacity:1}

    /* Éléments inutilisés du JS — hidden */
    .chat-conv-right,.chat-conv-badge-old,.chat-conv-ck,.chat-conv-count,.chat-conv-role{display:none}

    /* ══════════════════════════════════════
       PANNEAU DROIT
    ══════════════════════════════════════ */
    .msg-right{display:flex;flex-direction:column;background:#fff;min-height:0;overflow:hidden}

    /* Header conversation */
    .chat-main-header{display:none;align-items:center;gap:.8rem;padding:.8rem 1.4rem;border-bottom:1px solid #f0f0f0;min-height:68px;background:#fff}
    .chat-main-hav{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.85rem;color:#fff;flex-shrink:0}
    .chat-main-hinfo{flex:1;min-width:0}
    .chat-main-hname{font-size:1.05rem;font-weight:700;color:#1a1a2e}
    .chat-main-hstatus{font-size:.74rem;color:#9e9e9e;margin-top:1px}
    .chat-main-hactions{display:flex;align-items:center;gap:.2rem}
    .chat-hbtn{width:36px;height:36px;border-radius:50%;border:none;background:transparent;color:#6b6b80;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .1s}
    .chat-hbtn:hover{background:#f3f3fb;color:#5b5fc7}
    .chat-hbtn svg{width:18px;height:18px;stroke:currentColor;stroke-width:1.8;fill:none}

    /* Zone messages */
    .chat-msgs{flex:1;overflow-y:auto;padding:1.1rem 1.4rem;display:flex;flex-direction:column;gap:.1rem;min-height:0;background:#fff}

    /* Séparateur de date style pill */
    .chat-date-sep{display:flex;align-items:center;justify-content:center;margin:.9rem 0 .7rem}
    .chat-date-sep span{padding:.25rem 1rem;border:1px solid #e8e8e8;border-radius:20px;font-size:.75rem;color:#888;font-weight:500;background:#fff}

    /* État vide */
    .chat-empty{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#ccc;text-align:center;padding:3rem;gap:.75rem}
    .chat-empty svg{width:52px;height:52px;opacity:.18;stroke:currentColor;stroke-width:1.2;fill:none}
    .chat-empty p{font-size:.9rem;color:#bbb;margin:0}

    /* Lignes de messages */
    .chat-row{display:flex;gap:.75rem;align-items:flex-end;margin-bottom:.65rem}
    .chat-row.own{flex-direction:row-reverse}

    /* Avatar du message */
    .chat-msg-av{width:40px;height:40px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.76rem;color:#fff;align-self:flex-start;margin-top:.1rem}

    /* Contenu du message */
    .chat-msg-content{max-width:66%;display:flex;flex-direction:column}
    .chat-row.own .chat-msg-content{align-items:flex-end}

    .chat-msg-meta{display:flex;align-items:center;gap:.45rem;margin-bottom:.28rem}
    .chat-row.own .chat-msg-meta{flex-direction:row-reverse}
    .chat-msg-author{font-weight:600;font-size:.82rem;color:#1a1a2e}
    .chat-msg-time{font-size:.71rem;color:#b8b8c8}

    /* Bulle */
    .chat-bubble{display:inline-block;padding:.42rem .75rem;font-size:.78rem;line-height:1.48;color:#000;word-break:break-word;max-width:100%}
    .chat-row.other .chat-bubble{background:#f3f3f6;border-radius:4px 14px 14px 14px}
    .chat-row.own .chat-bubble{background:#eeeeff;border-radius:14px 4px 14px 14px}
    .chat-bubble.unread-bubble{background:#fff8e7;border:1px solid #f5c842}
    .act-new{font-size:.6rem;font-weight:800;color:#f5a623;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px;display:block}

    /* Barre de saisie */
    .chat-input{display:flex;gap:.6rem;align-items:flex-end;padding:.7rem 1.25rem;background:#fff;border-top:1px solid #f0f0f0}
    .chat-input-wrap{flex:1;border:1.5px solid #ebebeb;border-radius:12px;background:#fafafa;overflow:hidden;transition:border-color .15s,box-shadow .15s}
    .chat-input-wrap:focus-within{border-color:#7c6ff7;background:#fff;box-shadow:0 0 0 3px rgba(124,111,247,.1)}
    .chat-input-tools{display:flex;gap:.2rem;padding:.28rem .5rem .1rem;border-bottom:1px solid #f4f4f4}
    .chat-input-tools button{padding:2px 7px;font-size:.62rem;color:#bbb;background:none;border:none;border-radius:4px;cursor:pointer;transition:all .1s}
    .chat-input-tools button:hover{background:#f0f0f8;color:#5b5fc7}
    .chat-input textarea{display:block;width:100%;padding:.42rem .75rem;background:transparent;border:none;font-size:.85rem;outline:none;resize:none;min-height:34px;font-family:inherit;color:#1a1a2e;box-sizing:border-box}
    .chat-send-btn{width:40px;height:40px;border-radius:50%;background:#5b5fc7;border:none;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:background .15s,transform .1s}
    .chat-send-btn:hover:not(:disabled){background:#4a4eb5;transform:scale(1.07)}
    .chat-send-btn:disabled{background:#d0d5dd;cursor:not-allowed;transform:none}
    .chat-send-btn svg{width:16px;height:16px;stroke:currentColor;stroke-width:2.5;fill:none}

    /* ── Overlay Compose ── */
    .chat-overlay-backdrop{position:absolute;inset:0;background:rgba(15,30,60,.2);z-index:9;backdrop-filter:blur(2px)}
    .chat-overlay{position:absolute;top:70px;left:8px;width:295px;max-height:400px;background:#fff;z-index:10;display:flex;flex-direction:column;border-radius:14px;box-shadow:0 16px 48px rgba(0,0,0,.15);border:1px solid #ebebeb;overflow:hidden}
    .chat-overlay-header{display:flex;align-items:center;gap:.5rem;padding:.65rem 1rem;border-bottom:1px solid #f0f0f0}
    .chat-overlay-header h3{margin:0;font-size:.88rem;font-weight:700;flex:1;text-align:center;color:#1a1a2e}
    .chat-overlay-search{padding:.5rem .85rem;border-bottom:1px solid #f0f0f0}
    .chat-overlay-search input{width:100%;padding:.38rem .7rem;border:1.5px solid #ebebeb;border-radius:8px;font-size:.78rem;outline:none;box-sizing:border-box;background:#fafafa;color:#1a1a2e}
    .chat-overlay-search input:focus{border-color:#7c6ff7;background:#fff}
    .chat-overlay-list{flex:1;overflow-y:auto}
    .chat-overlay-user{display:flex;align-items:center;gap:.6rem;padding:.5rem .9rem;cursor:pointer;transition:background .08s}
    .chat-overlay-user:hover{background:#f3f3fb}
    .chat-overlay-user .ck{width:20px;height:20px;border-radius:50%;border:2px solid #d0d5dd;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .12s}
    .chat-overlay-user .ck.checked{background:#5b5fc7;border-color:#5b5fc7}
    .chat-overlay-user .ck.checked::after{content:'✓';color:#fff;font-size:11px;font-weight:700}
    .chat-overlay-user .avatar{width:34px;height:34px;font-size:.72rem;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
    .chat-overlay-user-info{flex:1;min-width:0}
    .chat-overlay-user-name{font-weight:600;font-size:.8rem;color:#1a1a2e}
    .chat-overlay-user-role{font-size:.68rem;color:#9e9e9e}
    .chat-overlay-btn{padding:.6rem .85rem;border-top:1px solid #f0f0f0}
    .chat-overlay-btn button{width:100%}
  </style>
</head>
<body>
<div class="app-layout">
  <div class="main">
    <header class="header">
      <div class="header-info"><div class="header-title">Messages</div></div>
      <div class="header-right">
        <span id="convCount" style="font-size:.8rem;color:var(--muted)"></span>
        <button class="btn btn-accent btn-sm" onclick="openCompose(null)">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:13px;height:13px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouveau
        </button>
      </div>
    </header>

    <main class="content" style="padding-bottom:0">
      <div class="msg-wrap" style="position:relative">

        <!-- ── PANNEAU GAUCHE ── -->
        <div class="msg-left">
          <!-- Dropdown All Chat -->
          <div class="ml-dropdown">
            <span>All Chat</span>
            <svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg>
          </div>

          <!-- Recherche -->
          <div class="ml-search">
            <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
            <input type="text" id="convSearch" placeholder="Search messages" oninput="renderConvs()"/>
          </div>

          <!-- Onglet All uniquement -->
          <div class="ml-tabs">
            <div class="ml-tab" id="mlTabAll">All <span id="convCount2" style="font-weight:400;opacity:.7"></span></div>
          </div>

          <!-- Liste conversations -->
          <div class="chat-convs" id="chatConvs"></div>
        </div>

        <!-- ── PANNEAU DROIT ── -->
        <div class="msg-right" id="chatMain">

          <!-- Header conversation -->
          <div class="chat-main-header" id="chatMainHeader">
            <div class="chat-main-hav" id="chatMainAvatar">?</div>
            <div class="chat-main-hinfo">
              <div class="chat-main-hname" id="chatMainName">—</div>
              <div class="chat-main-hstatus" id="chatMainStatus"></div>
            </div>
            <div class="chat-main-hactions">
              <button class="chat-hbtn" title="Appeler">
                <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.39 2 2 0 0 1 3.59 1h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.55a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
              </button>
              <button class="chat-hbtn" title="Rechercher">
                <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
              </button>
              <button class="chat-hbtn" id="addParticipantBtn" style="display:none" onclick="openCompose(currentConvId)" title="Ajouter un participant">
                <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              </button>
              <button class="chat-hbtn" title="Plus">
                <svg viewBox="0 0 24 24"><circle cx="12" cy="5" r="1"/><circle cx="12" cy="12" r="1"/><circle cx="12" cy="19" r="1"/></svg>
              </button>
            </div>
          </div>

          <!-- Fil de messages -->
          <div class="chat-msgs" id="chatMsgs">
            <div class="chat-empty">
              <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
              <p>Sélectionnez une conversation<br>ou démarrez-en une nouvelle</p>
            </div>
          </div>

          <!-- Barre de saisie -->
          <div class="chat-input" id="chatInputBar">
            <div class="chat-input-wrap">
              <div class="chat-input-tools">
                <button onclick="aiAssistMessage('redaction')">✍ Rédiger</button>
                <button onclick="aiAssistMessage('correction')">✓ Corriger</button>
                <button onclick="aiAssistMessage('reformulation')">↺ Reformuler</button>
              </div>
              <textarea id="chatInput" rows="1" placeholder="Écrire un message…" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChatMsg()}" disabled style="width:100%;box-sizing:border-box"></textarea>
            </div>
            <button class="chat-send-btn" onclick="sendChatMsg()" id="sendBtn" disabled>
              <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>

          <!-- Overlay compose -->
          <div class="chat-overlay-backdrop" id="composeBackdrop" style="display:none" onclick="closeCompose()"></div>
          <div class="chat-overlay" id="composeOverlay" style="display:none">
            <div class="chat-overlay-header">
              <button class="btn btn-ghost btn-sm" onclick="closeCompose()">Annuler</button>
              <h3>Nouveau message</h3>
              <div style="width:64px"></div>
            </div>
            <div class="chat-overlay-search">
              <input type="text" id="composeSearch" placeholder="Rechercher un utilisateur…" oninput="renderComposeUsers()"/>
            </div>
            <div class="chat-overlay-list" id="composeList"></div>
            <div class="chat-overlay-btn">
              <button class="btn btn-primary" id="composeStartBtn" disabled onclick="startComposeConv()">Démarrer</button>
            </div>
          </div>
        </div>

      </div>
    </main>
  </div>
</div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script>Auth.requireAuth(); if (!requireModule('access_messages')) { document.querySelector('.content').innerHTML = ''; }</script>
<script src="js/messages.js"></script>
</body>
</html>
