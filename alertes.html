<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Alertes — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
.al-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:.75rem;margin-bottom:1.25rem}
.al-stat{background:#fff;border:1px solid var(--border);border-radius:10px;padding:.65rem .85rem;text-align:center}
.al-stat-num{font-size:1.5rem;font-weight:800;line-height:1}
.al-stat-lbl{font-size:.7rem;color:var(--muted);margin-top:3px}
.al-filter-bar{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:1.25rem}
.al-filter-btn{font-size:.75rem;padding:.3rem .75rem;border-radius:999px;border:1px solid var(--border);background:#fff;cursor:pointer;color:var(--text);transition:all .15s;font-family:inherit;font-weight:500}
.al-filter-btn:hover{background:var(--g50)}
.al-filter-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.al-filter-btn span{opacity:.7;margin-left:2px}
@media(max-width:600px){.al-stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info">
      <div class="header-title">🔔 Alertes &amp; Notifications</div>
    </div>
    <div class="header-right">
      <button class="btn btn-ghost btn-sm" onclick="resetAlDismissed()" title="Réafficher toutes les alertes ignorées">↺ Réinitialiser</button>
    </div>
  </header>

  <main class="content">
    <div style="max-width:800px;margin:0 auto">

      <!-- Stats -->
      <div class="al-stats" id="alStats"></div>

      <!-- Filtres par type -->
      <div class="al-filter-bar" id="alFilters"></div>

      <!-- Liste des alertes -->
      <div id="alList"></div>

    </div>
  </main>
</div></div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/medicaments-supabase.js"></script>
<script src="js/alertes.js"></script>
</body>
</html>
