<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Entretiens professionnels — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info"><div class="header-title">Entretiens professionnels</div></div>
    <div class="header-right"></div>
  </header>
  <main class="content" style="max-width:1280px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
      <div>
        <div style="font-weight:700;font-size:1rem">🧑‍💼 Entretiens & formations</div>
        <div style="font-size:.78rem;color:var(--muted)">Suivi des entretiens professionnels, bilans et plans de formation</div>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn btn-primary admin-only" onclick="openEntretienModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouvel entretien
        </button>
      </div>
    </div>

    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;gap:1rem;padding:.75rem 1rem;flex-wrap:wrap">
        <div style="flex:1;text-align:center;min-width:90px"><div id="etStatPlanifies" style="font-weight:800;font-size:1.4rem;color:#d97706">0</div><div style="font-size:.72rem;color:var(--muted)">Planifiés</div></div>
        <div style="flex:1;text-align:center;min-width:90px"><div id="etStatRealises" style="font-weight:800;font-size:1.4rem;color:#16a34a">0</div><div style="font-size:.72rem;color:var(--muted)">Réalisés</div></div>
        <div style="flex:1;text-align:center;min-width:90px"><div id="etStatTotal" style="font-weight:800;font-size:1.4rem;color:#0f2b4a">0</div><div style="font-size:.72rem;color:var(--muted)">Total</div></div>
      </div>
    </div>

    <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap">
      <select id="etFiltreEmploye" class="form-input admin-only" style="width:200px;display:none" onchange="renderEntretiens()"><option value="">Tous les employés</option></select>
      <select id="etFiltreType" class="form-input" style="width:180px" onchange="renderEntretiens()">
        <option value="">Tous les types</option>
        <option value="annuel">Entretien annuel</option>
        <option value="professionnel">Entretien professionnel</option>
        <option value="suivi">Entretien de suivi</option>
      </select>
      <select id="etFiltreStatut" class="form-input" style="width:160px" onchange="renderEntretiens()">
        <option value="">Tous les statuts</option>
        <option value="planifie">Planifié</option>
        <option value="realise">Réalisé</option>
      </select>
    </div>

    <div id="etList"><div class="empty" style="padding:3rem;text-align:center"><p>Aucun entretien</p></div></div>
  </main>
</div></div>
<div id="toast-container" class="toast-container"></div>

<div class="modal-overlay" id="modalEntretien">
  <div class="modal" style="max-width:540px;--mc:#9333ea">
    <div class="mdx-hero">
      <button class="mdx-close" onclick="closeModal('modalEntretien')" aria-label="Fermer">✕</button>
      <div class="mdx-badge">🧑‍💼</div>
      <div class="mdx-hero-txt">
        <div class="mdx-title" id="etModalTitle">Nouvel entretien</div>
        <div class="mdx-sub">Entretien professionnel</div>
      </div>
    </div>
    <div class="modal-body mdx-body">
      <div class="mdx-section">
        <div class="mdx-sec-head"><span>🧑‍💼</span> L'entretien</div>
        <div class="form-row">
          <div class="form-group"><label>Employé *</label><select id="etFormEmploye" class="form-input" onchange="etModalSync()"></select></div>
          <div class="form-group"><label>Date *</label><input type="date" id="etFormDate" class="form-input"/></div>
        </div>
        <div class="form-row">
          <div class="form-group"><label>Type *</label>
            <select id="etFormType" class="form-input" onchange="etModalSync()">
              <option value="annuel">Entretien annuel</option>
              <option value="professionnel">Entretien professionnel</option>
              <option value="suivi">Entretien de suivi</option>
            </select>
          </div>
          <div class="form-group"><label>Statut *</label>
            <select id="etFormStatut" class="form-input" onchange="etModalSync()">
              <option value="planifie">Planifié</option>
              <option value="realise">Réalisé</option>
            </select>
          </div>
        </div>
        <div class="form-group"><label>Évaluateur</label><input type="text" id="etFormEvaluateur" class="form-input" placeholder="Nom du responsable"/></div>
      </div>

      <div class="mdx-section">
        <div class="mdx-sec-head"><span>⭐</span> Grille de compétences</div>
        <div id="etGrilleLive" style="padding:.5rem .75rem;background:#f8fafc;border-radius:8px;border:1px solid var(--border);text-align:center;font-size:.85rem">Notez chaque item ci-dessous…</div>
        <div id="etGrilleBody"></div>
      </div>

      <div class="mdx-section">
        <div class="mdx-sec-head"><span>📝</span> Compte rendu</div>
        <div class="form-group"><label>Bilan</label><textarea id="etFormBilan" class="form-input" rows="3" placeholder="Bilan de la période écoulée…"></textarea></div>
        <div class="form-group"><label>Objectifs fixés</label><textarea id="etFormObjectifs" class="form-input" rows="3" placeholder="Objectifs pour la période à venir…"></textarea></div>
        <div class="form-group"><label>Besoins en formation</label><textarea id="etFormFormations" class="form-input" rows="2" placeholder="Formations souhaitées ou prévues…"></textarea></div>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="etExportBtn" style="margin-right:auto;display:none" onclick="exportEntretienPdf(document.getElementById('modalEntretien').dataset.editId)">🖨 Export PDF</button>
      <button class="btn btn-ghost" onclick="closeModal('modalEntretien')">Annuler</button>
      <button class="btn btn-primary" onclick="saveEntretien()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/employes-supabase.js"></script>
<script src="js/entretiens-supabase.js"></script>
<script src="js/entretiens.js"></script>
<script>Auth.requireAuth(); if (!requireModule('access_entretiens')) { document.querySelector('.content').innerHTML = ''; }</script>
</body></html>
