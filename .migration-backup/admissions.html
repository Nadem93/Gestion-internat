<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Admissions — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info"><div class="header-title">Admissions</div></div>
    <div class="header-right"><button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button></div>
  </header>
  <main class="content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;gap:1rem;flex-wrap:wrap">
      <div>
        <div style="font-weight:700;font-size:1rem">📥 Admissions & liste d'attente</div>
        <div style="font-size:.78rem;color:var(--muted)">Suivi des demandes d'admission, de l'étude du dossier jusqu'à l'entrée du résident</div>
      </div>
      <div style="display:flex;gap:.5rem;flex-wrap:wrap">
        <button class="btn btn-primary admin-only" onclick="openAdmissionModal()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:15px;height:15px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Nouvelle demande
        </button>
      </div>
    </div>

    <div class="card" style="margin-bottom:1rem">
      <div style="display:flex;gap:1rem;padding:.75rem 1rem;flex-wrap:wrap">
        <div style="flex:1;text-align:center;min-width:90px"><div id="admStatEnAttente" style="font-weight:800;font-size:1.4rem;color:#d97706">0</div><div style="font-size:.72rem;color:var(--muted)">En attente</div></div>
        <div style="flex:1;text-align:center;min-width:90px"><div id="admStatEtude" style="font-weight:800;font-size:1.4rem;color:#0284c7">0</div><div style="font-size:.72rem;color:var(--muted)">En étude</div></div>
        <div style="flex:1;text-align:center;min-width:90px"><div id="admStatAdmis" style="font-weight:800;font-size:1.4rem;color:#16a34a">0</div><div style="font-size:.72rem;color:var(--muted)">Admis</div></div>
        <div style="flex:1;text-align:center;min-width:90px"><div id="admStatTotal" style="font-weight:800;font-size:1.4rem;color:#0f2b4a">0</div><div style="font-size:.72rem;color:var(--muted)">Total</div></div>
      </div>
    </div>

    <div style="display:flex;gap:.5rem;margin-bottom:1rem;flex-wrap:wrap">
      <input type="search" id="admSearch" class="form-input" style="flex:1;min-width:180px" placeholder="Rechercher un candidat…" oninput="renderAdmissions()"/>
      <select id="admFiltreStatut" class="form-input" style="width:180px" onchange="renderAdmissions()">
        <option value="">Tous les statuts</option>
        <option value="en_attente">En attente</option>
        <option value="etude">En étude</option>
        <option value="admis">Admis</option>
        <option value="refuse">Refusé</option>
        <option value="abandon">Désistement</option>
      </select>
    </div>

    <div id="admList"><div class="empty" style="padding:3rem;text-align:center"><p>Aucune demande d'admission</p></div></div>
  </main>
</div></div>
<div id="toast-container" class="toast-container"></div>

<div class="modal-overlay" id="modalAdmission">
  <div class="modal" style="max-width:540px">
    <div class="modal-header">
      <span class="modal-title" id="admModalTitle">📥 Nouvelle demande d'admission</span>
      <button class="modal-close" onclick="closeModal('modalAdmission')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </div>
    <div class="modal-body" style="display:flex;flex-direction:column;gap:.75rem">
      <div class="form-row">
        <div class="form-group"><label>Prénom *</label><input type="text" id="admFormPrenom" class="form-input"/></div>
        <div class="form-group"><label>Nom *</label><input type="text" id="admFormNom" class="form-input"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date de naissance</label><input type="date" id="admFormDateNaissance" class="form-input"/></div>
        <div class="form-group"><label>Date de la demande</label><input type="date" id="admFormDateDemande" class="form-input"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Date d'entrée prévue</label><input type="date" id="admFormDateEntree" class="form-input"/></div>
        <div class="form-group"><label>Numéro de dossier MDPH</label><input type="text" id="admFormDossier" class="form-input" placeholder="Ex : 75-2024-XXXXX"/></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Orientation par</label>
          <select id="admFormOrigine" class="form-input">
            <option value="MDPH">MDPH</option>
            <option value="ASE">ASE</option>
            <option value="Famille">Famille / demande directe</option>
            <option value="Établissement">Établissement (réorientation)</option>
            <option value="Autre">Autre</option>
          </select>
        </div>
        <div class="form-group"><label>Statut</label>
          <select id="admFormStatut" class="form-input">
            <option value="en_attente">En attente</option>
            <option value="etude">En étude</option>
            <option value="admis">Admis</option>
            <option value="refuse">Refusé</option>
            <option value="abandon">Désistement</option>
          </select>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Contact (famille/référent)</label><input type="text" id="admFormContactNom" class="form-input" placeholder="Nom du contact"/></div>
        <div class="form-group"><label>Téléphone</label><input type="text" id="admFormContactTel" class="form-input"/></div>
      </div>
      <div class="form-group"><label>Notes / motif de la demande</label><textarea id="admFormNotes" class="form-input" rows="3" placeholder="Éléments du dossier, urgence, particularités…"></textarea></div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-ghost" id="admDeleteBtn" style="color:var(--red);margin-right:auto;display:none" onclick="supprimerAdmission()">Supprimer</button>
      <button class="btn btn-ghost" onclick="closeModal('modalAdmission')">Annuler</button>
      <button class="btn btn-primary" onclick="saveAdmission()">💾 Enregistrer</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script src="js/admissions.js"></script>
<script>Auth.requireAuth(); if (!requireModule('access_admissions')) { document.querySelector('.content').innerHTML = ''; }</script>
</body></html>
