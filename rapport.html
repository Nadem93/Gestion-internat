<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Rapport d'activité — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
@media print{.header,.rap-toolbar,.no-print{display:none!important}.content{padding:0!important}}
</style>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info">
      <div class="header-title">📈 Rapport d'activité</div>
    </div>
    <div class="header-right">
      <button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button>
      <button class="btn btn-ghost btn-sm no-print" onclick="printRapport()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimer
      </button>
    </div>
  </header>

  <main class="content">
    <div style="max-width:960px;margin:0 auto">

      <!-- Paramètres -->
      <div class="rap-toolbar" style="display:flex;align-items:center;gap:.75rem;flex-wrap:wrap;margin-bottom:1.25rem;padding:.65rem .9rem;background:#fff;border:1px solid var(--border);border-radius:10px">
        <label style="font-size:.82rem;font-weight:600">Année :</label>
        <select id="rapAnnee" style="font-size:.85rem;padding:.3rem .6rem;border:1px solid var(--border);border-radius:8px">
          <option value="2025">2025</option>
          <option value="2026" selected>2026</option>
          <option value="2027">2027</option>
        </select>
        <label style="font-size:.82rem;font-weight:600;margin-left:.5rem">Capacité :</label>
        <input type="number" id="rapCapacite" value="20" min="1" max="200" style="width:70px;font-size:.85rem;padding:.3rem .6rem;border:1px solid var(--border);border-radius:8px" oninput="renderRapport()"/>
        <span style="font-size:.75rem;color:var(--muted)">places autorisées</span>
        <button class="btn btn-accent btn-sm no-print" style="margin-left:auto" onclick="renderRapport()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:13px;height:13px"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
          Actualiser
        </button>
      </div>

      <div id="rapContent"></div>

    </div>
  </main>
</div></div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/rapport.js"></script>
</body>
</html>
