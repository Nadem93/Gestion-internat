<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Fiche de liaison hospitalière — FTR</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
@media print {
  .header, .fl-toolbar, .no-print { display:none!important; }
  .content { padding:0!important; }
  #flPrintZone { border:none!important; box-shadow:none!important; }
}
</style>
</head>
<body>
<div class="app-layout"><div class="main">
  <header class="header">
    <div class="header-info">
      <div class="header-title">🏥 Fiche de liaison hospitalière</div>
    </div>
    <div class="header-right">
      <button class="btn btn-outline btn-sm" onclick="history.back()">← Retour</button>
      <button class="btn btn-ghost btn-sm no-print" onclick="printFiche()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
        Imprimer
      </button>
    </div>
  </header>

  <main class="content">
    <div style="max-width:780px;margin:0 auto">

      <!-- Sélecteur résident -->
      <div class="fl-toolbar" style="display:flex;align-items:center;gap:.75rem;margin-bottom:1.25rem;padding:.65rem .9rem;background:#fff;border:1px solid var(--border);border-radius:10px">
        <label style="font-size:.82rem;font-weight:600;color:var(--text);white-space:nowrap">Résident :</label>
        <select id="flResident" style="flex:1;font-size:.85rem;padding:.35rem .6rem;border:1px solid var(--border);border-radius:8px">
          <option value="">— Choisir un résident —</option>
        </select>
        <button class="btn btn-accent btn-sm no-print" onclick="loadFicheLiaison()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" style="width:13px;height:13px"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-4.5"/></svg>
          Actualiser
        </button>
      </div>

      <!-- Contenu de la fiche -->
      <div id="flContent">
        <div class="empty" style="padding:4rem;text-align:center">
          <div style="font-size:3rem;margin-bottom:.5rem">🏥</div>
          <p style="font-weight:600;color:var(--text)">Sélectionnez un résident</p>
          <p style="font-size:.83rem;color:var(--muted)">La fiche de liaison sera générée automatiquement depuis son dossier.</p>
        </div>
      </div>

    </div>
  </main>
</div></div>

<div id="toast-container" class="toast-container"></div>
<script src="js/app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/supabase-client.js"></script>
<script src="js/residents-supabase.js"></script>
<script src="js/evaluations.js"></script>
<script src="js/fiche-liaison.js"></script>
</body>
</html>
